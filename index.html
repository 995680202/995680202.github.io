<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>尐念·超维空间 | XIAONIAN CYBER SPACE</title>
    <style>
        /* --- 核心变量与重置 --- */
        :root {
            --bg-color: #000205;
            --card-bg: rgba(6, 12, 24, 0.75);
            --primary: #00f9ff; /* 青色 */
            --secondary: #bc13fe; /* 紫色 */
            --accent: #ffe600; /* 黄色警告色 */
            --text-main: #e0f7fa;
            --text-dim: #5c7c8a;
            --border-glow: 0 0 10px rgba(0, 249, 255, 0.3);
            --font-tech: 'Courier New', Courier, monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        /* --- 动态科技背景 --- */
        .cyber-grid {
            position: fixed;
            top: 0; left: 0; width: 200%; height: 200%;
            background-image: 
                linear-gradient(rgba(0, 249, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 249, 255, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
            animation: gridMove 20s linear infinite;
            z-index: -2;
            pointer-events: none;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(40px) translateZ(-200px); }
        }

        .scan-line {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 5px;
            background: rgba(0, 249, 255, 0.3);
            opacity: 0.5;
            animation: scan 3s linear infinite;
            z-index: -1;
            pointer-events: none;
            box-shadow: 0 0 15px var(--primary);
        }

        @keyframes scan {
            0% { top: -10%; opacity: 0; }
            50% { opacity: 0.5; }
            100% { top: 110%; opacity: 0; }
        }

        /* --- 布局容器 --- */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            position: relative;
            z-index: 1;
        }

        /* --- 标题头 --- */
        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid var(--primary);
            position: relative;
            background: linear-gradient(180deg, rgba(0,249,255,0.1) 0%, transparent 100%);
            clip-path: polygon(0 0, 100% 0, 100% 80%, 50% 100%, 0 80%);
            margin-bottom: 20px;
        }

        h1 {
            font-family: var(--font-tech);
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #fff;
            text-shadow: 0 0 10px var(--primary), 0 0 20px var(--primary);
            position: relative;
            display: inline-block;
        }

        h1::after {
            content: 'SYSTEM ONLINE';
            position: absolute;
            bottom: -20px; left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            color: var(--primary);
            letter-spacing: 2px;
            white-space: nowrap;
        }

        /* --- 通用卡片样式 (HUD 风格) --- */
        .hud-card {
            background: var(--card-bg);
            border: 1px solid rgba(0, 249, 255, 0.3);
            position: relative;
            padding: 20px;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            clip-path: polygon(
                20px 0, 100% 0, 
                100% calc(100% - 20px), calc(100% - 20px) 100%, 
                0 100%, 0 20px
            );
        }

        .hud-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            animation: glowLine 2s infinite;
        }

        @keyframes glowLine {
            0% { opacity: 0.3; }
            50% { opacity: 1; box-shadow: 0 0 10px var(--primary); }
            100% { opacity: 0.3; }
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }

        .card-title {
            font-family: var(--font-tech);
            color: var(--primary);
            font-size: 1.2rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 8px; height: 8px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 5px var(--primary);
            animation: blink 1s infinite;
        }

        @keyframes blink { 50% { opacity: 0.3; } }

        /* --- 输入框与按钮 --- */
        input[type="text"], input[type="password"] {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--text-dim);
            color: var(--primary);
            padding: 10px 15px;
            font-family: var(--font-tech);
            width: 100%;
            margin-bottom: 10px;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 249, 255, 0.2);
        }

        .btn-cyber {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 8px 20px;
            font-family: var(--font-tech);
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .btn-cyber:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 20px var(--primary);
        }

        /* --- 模块 1: 书籍阅读 --- */
        .book-list {
            max-height: 300px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            padding-right: 5px;
        }
        
        /* 滚动条样式 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }

        .book-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }

        .book-item:hover {
            border-color: var(--secondary);
            background: rgba(188, 19, 254, 0.1);
            transform: translateY(-3px);
        }

        .book-cover {
            width: 100%;
            aspect-ratio: 3/4;
            background: #222;
            margin-bottom: 8px;
            object-fit: cover;
            border: 1px solid #444;
        }

        .book-title { font-size: 0.9rem; color: #fff; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .book-author { font-size: 0.7rem; color: var(--text-dim); }

        /* 阅读器弹窗 */
        .reader-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            display: none;
            flex-direction: column;
            padding: 20px;
        }
        .reader-content {
            flex: 1;
            background: #111;
            color: #ccc;
            padding: 20px;
            overflow-y: auto;
            font-family: 'Georgia', serif;
            line-height: 1.8;
            border: 1px solid var(--text-dim);
            margin-top: 10px;
        }

        /* --- 模块 2: 音乐播放 (修复版) --- */
        .music-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
        }

        .visualizer {
            flex: 1;
            height: 30px;
            display: flex;
            align-items: flex-end;
            gap: 3px;
        }

        .bar {
            flex: 1;
            background: var(--secondary);
            animation: bounce 0.5s infinite ease-in-out alternate;
            box-shadow: 0 0 5px var(--secondary);
        }
        @keyframes bounce { 0% { height: 10%; } 100% { height: 100%; } }

        .music-btn {
            width: 40px; height: 40px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            background: transparent;
            color: var(--primary);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
        }
        .music-btn.playing { background: var(--primary); color: #000; }

        /* --- 模块 3: 文件传输 (实装) --- */
        .drop-zone {
            border: 2px dashed var(--text-dim);
            background: rgba(0,0,0,0.3);
            padding: 40px 20px;
            text-align: center;
            transition: 0.3s;
            cursor: pointer;
            position: relative;
        }

        .drop-zone.dragover {
            border-color: var(--primary);
            background: rgba(0, 249, 255, 0.1);
            box-shadow: inset 0 0 20px rgba(0, 249, 255, 0.2);
        }

        .drop-zone i { font-size: 3rem; color: var(--text-dim); margin-bottom: 10px; display: block; }
        .drop-zone p { color: var(--text-dim); font-family: var(--font-tech); }

        .file-list {
            margin-top: 15px;
            max-height: 150px;
            overflow-y: auto;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            background: rgba(255,255,255,0.05);
            margin-bottom: 5px;
            font-size: 0.85rem;
            border-left: 3px solid var(--primary);
        }

        .progress-container {
            width: 100%;
            height: 4px;
            background: #333;
            margin-top: 5px;
            position: relative;
        }
        .progress-bar {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.1s;
            box-shadow: 0 0 10px var(--primary);
        }

        /* --- 模块 4: 影院 --- */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        .video-thumb {
            aspect-ratio: 16/9;
            background: #000;
            position: relative;
            cursor: pointer;
            border: 1px solid #333;
            overflow: hidden;
        }
        .video-thumb img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; transition: 0.3s; }
        .video-thumb:hover img { opacity: 1; transform: scale(1.1); }
        .play-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; color: #fff; text-shadow: 0 0 10px #000;
        }

        /* --- 模态框通用 --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 3000;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .modal-box {
            background: #050a10;
            border: 1px solid var(--primary);
            padding: 30px;
            width: 90%; max-width: 400px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 249, 255, 0.2);
            position: relative;
        }
        .modal-box::before {
            content: 'SECURE ACCESS';
            position: absolute; top: -10px; left: 20px;
            background: #050a10; padding: 0 10px;
            color: var(--primary); font-size: 0.8rem;
            font-family: var(--font-tech);
        }

        /* 响应式调整 */
        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .book-list { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <div class="cyber-grid"></div>
    <div class="scan-line"></div>

    <header>
        <h1>尐念·超维空间</h1>
    </header>

    <div class="container">

        <!-- 1. 书籍阅读模块 -->
        <div class="hud-card">
            <div class="card-header">
                <div class="card-title"><span class="status-dot"></span> 云端书库接入点</div>
                <div style="font-size: 0.8rem; color: var(--text-dim); font-family: var(--font-tech);">API: CONNECTED</div>
            </div>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="bookSearchInput" placeholder="输入书名或作者...">
                <button class="btn-cyber" onclick="searchBooks()">检索</button>
            </div>
            <div id="bookResults" class="book-list" style="margin-top: 15px;">
                <div style="grid-column: 1/-1; text-align: center; color: var(--text-dim); padding: 20px;">等待指令...</div>
            </div>
        </div>

        <!-- 2. 音乐播放模块 (修复版) -->
        <div class="hud-card">
            <div class="card-header">
                <div class="card-title"><span class="status-dot" style="background: var(--secondary); box-shadow: 0 0 5px var(--secondary);"></span> 音频解码终端</div>
            </div>
            
            <div class="music-controls">
                <button class="music-btn" id="playPauseBtn" onclick="toggleMusic()">▶</button>
                <div style="flex: 1;">
                    <div id="trackName" style="color: #fff; font-size: 0.9rem; margin-bottom: 5px;">未选择音源</div>
                    <div class="visualizer" id="visualizer">
                        <!-- JS 生成波形条 -->
                    </div>
                </div>
                <input type="text" id="mp3Link" placeholder="粘贴 MP3 链接..." style="width: 150px; margin:0; font-size: 0.8rem;">
                <button class="btn-cyber" style="padding: 5px 10px; font-size: 0.8rem;" onclick="loadCustomMp3()">加载</button>
            </div>
            
            <audio id="audioPlayer"></audio>
            
            <div style="margin-top: 10px;">
                <p style="font-size: 0.8rem; color: var(--text-dim); margin-bottom: 5px;">预设曲目:</p>
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <button class="btn-cyber" style="font-size: 0.7rem; padding: 4px 8px;" onclick="playPreset('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3')">赛博朋克风</button>
                    <button class="btn-cyber" style="font-size: 0.7rem; padding: 4px 8px;" onclick="playPreset('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3')">深空探索</button>
                    <button class="btn-cyber" style="font-size: 0.7rem; padding: 4px 8px;" onclick="playPreset('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3')">霓虹夜景</button>
                </div>
            </div>
        </div>

        <!-- 3. 文件传输模块 (实装) -->
        <div class="hud-card">
            <div class="card-header">
                <div class="card-title"><span class="status-dot" style="background: var(--accent); box-shadow: 0 0 5px var(--accent);"></span> 量子文件传输</div>
            </div>
            <div class="drop-zone" id="dropZone">
                <i>📡</i>
                <p>拖拽文件至此 或 点击选择</p>
                <p style="font-size: 0.7rem; margin-top: 5px; opacity: 0.6;">支持任意格式 | 加密通道</p>
                <input type="file" id="fileInput" hidden multiple>
            </div>
            <div class="file-list" id="fileList"></div>
        </div>

        <!-- 4. 沉浸式影院 -->
        <div class="hud-card">
            <div class="card-header">
                <div class="card-title">全息影像回放</div>
            </div>
            <div class="video-grid">
                <div class="video-thumb" onclick="openVideo('https://media.w3.org/2010/05/sintel/trailer.mp4')">
                    <img src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=60" alt="Movie 1">
                    <div class="play-overlay">▶</div>
                </div>
                <div class="video-thumb" onclick="openVideo('https://media.w3.org/2010/05/bunny/trailer.mp4')">
                    <img src="https://images.unsplash.com/photo-1478720568477-152d9b164e63?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=60" alt="Movie 2">
                    <div class="play-overlay">▶</div>
                </div>
                <div class="video-thumb" onclick="openVideo('https://www.w3schools.com/html/mov_bbb.mp4')">
                    <img src="https://images.unsplash.com/photo-1517604931442-71053641333a?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=60" alt="Movie 3">
                    <div class="play-overlay">▶</div>
                </div>
            </div>
        </div>

        <!-- 后台入口 -->
        <div class="hud-card" style="text-align: center; cursor: pointer; border-color: var(--secondary);" onclick="openAdmin()">
            <div style="color: var(--secondary); font-family: var(--font-tech);">⚠️ 系统管理终端 [受限访问]</div>
        </div>

    </div>

    <!-- 视频播放器弹窗 -->
    <div class="modal-overlay" id="videoModal" onclick="if(event.target===this)closeVideo()">
        <div style="width: 90%; max-width: 800px; position: relative;">
            <button onclick="closeVideo()" style="position: absolute; top: -40px; right: 0; background: none; border: none; color: #fff; font-size: 2rem; cursor: pointer;">×</button>
            <video id="mainVideo" controls style="width: 100%; border: 1px solid var(--primary); box-shadow: 0 0 20px rgba(0,249,255,0.3);"></video>
        </div>
    </div>

    <!-- 书籍阅读器弹窗 -->
    <div class="reader-modal" id="readerModal">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px;">
            <h2 id="readerTitle" style="color: var(--primary); font-family: var(--font-tech);">书名</h2>
            <button onclick="closeReader()" class="btn-cyber">关闭阅读</button>
        </div>
        <div id="readerContent" class="reader-content">加载中...</div>
    </div>

    <!-- 后台登录弹窗 -->
    <div class="modal-overlay" id="adminModal">
        <div class="modal-box">
            <h3 style="color: #fff; margin-bottom: 20px;">身份验证</h3>
            <input type="password" id="adminPass" placeholder="输入访问密钥">
            <button class="btn-cyber" style="width: 100%; margin-top: 15px;" onclick="checkAdmin()">解锁</button>
            <button onclick="document.getElementById('adminModal').style.display='none'" style="background:none; border:none; color: #666; margin-top: 10px; cursor: pointer;">取消</button>
        </div>
    </div>

    <script>
        // --- 1. 书籍功能逻辑 ---
        const BOOK_API = 'https://shuyuan-api.yiove.com/redirect/shuyuan/20250813120526.json';
        
        async function searchBooks() {
            const query = document.getElementById('bookSearchInput').value;
            const resultDiv = document.getElementById('bookResults');
            
            if(!query) { alert('请输入搜索关键词'); return; }
            
            resultDiv.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:var(--primary);">正在检索数据库...</div>';

            try {
                // 注意：实际使用中可能需要代理解决 CORS，这里假设 API 支持跨域或直接访问
                // 由于这是一个静态 JSON 地址，我们直接 fetch
                const response = await fetch(BOOK_API);
                const data = await response.json();
                
                // 模拟搜索过滤 (因为这是一个固定 JSON，我们从中筛选或展示全部)
                // 假设 data 是一个数组，或者 data.books 是数组
                let books = [];
                if(Array.isArray(data)) books = data;
                else if(data.books && Array.isArray(data.books)) books = data.books;
                else if(data.data && Array.isArray(data.data)) books = data.data;
                
                // 简单过滤
                const filtered = books.filter(b => b.title && b.title.includes(query) || (b.author && b.author.includes(query)));
                
                if(filtered.length === 0) {
                    resultDiv.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:var(--text-dim);">未找到相关书籍，尝试其他关键词</div>';
                    return;
                }

                let html = '';
                filtered.slice(0, 20).forEach(book => {
                    // 兼容不同字段名
                    const title = book.title || book.name || '未知书名';
                    const author = book.author || '佚名';
                    const cover = book.cover || book.image || 'https://via.placeholder.com/150x200?text=No+Cover';
                    const url = book.url || book.link || '#';
                    
                    html += `
                        <div class="book-item" onclick="openReader('${title}', '${url}')">
                            <img src="${cover}" class="book-cover" alt="${title}" onerror="this.src='https://via.placeholder.com/150x200?text=Error'">
                            <div class="book-title">${title}</div>
                            <div class="book-author">${author}</div>
                        </div>
                    `;
                });
                resultDiv.innerHTML = html;

            } catch (error) {
                console.error(error);
                resultDiv.innerHTML = `<div style="grid-column:1/-1; text-align:center; color:red;">连接失败：${error.message}<br>提示：如果是跨域问题，请在本地服务器运行或使用代理</div>`;
            }
        }

        function openReader(title, url) {
            document.getElementById('readerTitle').innerText = title;
            document.getElementById('readerModal').style.display = 'flex';
            const contentDiv = document.getElementById('readerContent');
            contentDiv.innerHTML = '正在加载章节内容...';
            
            // 尝试加载内容 (如果是文本链接)
            // 注意：很多小说网站有反爬，这里仅做演示，实际可能需要后端解析
            fetch(url)
                .then(res => res.text())
                .then(html => {
                    // 简单提取正文 (需要根据具体网站结构调整，这里做通用处理)
                    // 如果无法提取，直接显示链接提示
                    contentDiv.innerHTML = `<p>内容加载成功 (模拟显示)。</p><p>实际阅读需跳转或解析：</p><a href="${url}" target="_blank" style="color:var(--primary)">点击在新窗口阅读完整章节</a>`;
                })
                .catch(() => {
                    contentDiv.innerHTML = `<p>直接阅读受限，请跳转：</p><a href="${url}" target="_blank" style="color:var(--primary)">前往源站点阅读</a>`;
                });
        }

        function closeReader() {
            document.getElementById('readerModal').style.display = 'none';
        }

        // --- 2. 音乐播放逻辑 (修复版) ---
        const audio = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('playPauseBtn');
        const trackName = document.getElementById('trackName');
        let isPlaying = false;

        // 初始化波形图
        const visualizer = document.getElementById('visualizer');
        for(let i=0; i<20; i++) {
            let bar = document.createElement('div');
            bar.className = 'bar';
            bar.style.animationDuration = (0.4 + Math.random() * 0.4) + 's';
            bar.style.height = '10%';
            visualizer.appendChild(bar);
        }

        function playPreset(url) {
            audio.src = url;
            trackName.innerText = "正在播放：预设曲目";
            startMusic();
        }

        function loadCustomMp3() {
            const url = document.getElementById('mp3Link').value;
            if(url) {
                audio.src = url;
                trackName.innerText = "正在播放：自定义链接";
                startMusic();
            } else {
                alert('请输入 MP3 链接');
            }
        }

        function toggleMusic() {
            if(audio.src) {
                if(isPlaying) {
                    audio.pause();
                    playBtn.innerText = '▶';
                    playBtn.classList.remove('playing');
                    isPlaying = false;
                    // 停止波形动画
                    document.querySelectorAll('.bar').forEach(b => b.style.animationPlayState = 'paused');
                } else {
                    audio.play();
                    playBtn.innerText = '⏸';
                    playBtn.classList.add('playing');
                    isPlaying = true;
                    document.querySelectorAll('.bar').forEach(b => b.style.animationPlayState = 'running');
                }
            } else {
                alert('请先选择或加载音乐');
            }
        }

        function startMusic() {
            audio.play().then(() => {
                isPlaying = true;
                playBtn.innerText = '⏸';
                playBtn.classList.add('playing');
                document.querySelectorAll('.bar').forEach(b => b.style.animationPlayState = 'running');
            }).catch(e => {
                alert('播放失败，请检查链接有效性或浏览器策略');
            });
        }

        // --- 3. 文件传输逻辑 (实装) ---
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');

        dropZone.addEventListener('click', () => fileInput.click());
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(files) {
            Array.from(files).forEach(file => {
                const item = document.createElement('div');
                item.className = 'file-item';
                item.innerHTML = `
                    <span>${file.name} (${(file.size/1024).toFixed(1)} KB)</span>
                    <span style="color:var(--primary)">上传中...</span>
                `;
                
                const progressCont = document.createElement('div');
                progressCont.className = 'progress-container';
                const progressBar = document.createElement('div');
                progressBar.className = 'progress-bar';
                progressCont.appendChild(progressBar);
                
                item.appendChild(progressCont);
                fileList.prepend(item);

                // 模拟上传进度
                let width = 0;
                const interval = setInterval(() => {
                    if(width >= 100) {
                        clearInterval(interval);
                        item.querySelector('span:last-child').innerText = '完成';
                        item.querySelector('span:last-child').style.color = '#0f0';
                        progressBar.style.boxShadow = '0 0 10px #0f0';
                    } else {
                        width += Math.random() * 10;
                        if(width > 100) width = 100;
                        progressBar.style.width = width + '%';
                    }
                }, 200);
            });
        }

        // --- 4. 视频与后台 ---
        function openVideo(url) {
            const modal = document.getElementById('videoModal');
            const video = document.getElementById('mainVideo');
            video.src = url;
            modal.style.display = 'flex';
            video.play();
        }

        function closeVideo() {
            const modal = document.getElementById('videoModal');
            const video = document.getElementById('mainVideo');
            video.pause();
            video.src = '';
            modal.style.display = 'none';
        }

        function openAdmin() {
            document.getElementById('adminModal').style.display = 'flex';
        }

        function checkAdmin() {
            const pass = document.getElementById('adminPass').value;
            if(pass === 'qingnanliu') {
                alert('✅ 身份确认。管理员权限已授予。');
                document.getElementById('adminModal').style.display = 'none';
                // 这里可以添加解锁更多功能的逻辑
                document.body.style.border = "2px solid var(--accent)";
            } else {
                alert('❌ 访问拒绝：密钥错误');
            }
        }
    </script>
</body>
</html>
