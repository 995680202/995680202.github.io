<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>尐念·超维空间 | 最终版</title>
    <style>
        :root {
            --bg-color: #000205;
            --card-bg: rgba(6, 12, 24, 0.85);
            --primary: #00f9ff;
            --secondary: #bc13fe;
            --accent: #ffe600;
            --text-main: #e0f7fa;
            --text-dim: #5c7c8a;
            --font-tech: 'Courier New', Courier, monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        /* --- 动态背景 --- */
        .cyber-grid {
            position: fixed; top: 0; left: 0; width: 200%; height: 200%;
            background-image: 
                linear-gradient(rgba(0, 249, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 249, 255, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
            animation: gridMove 20s linear infinite;
            z-index: -2;
            pointer-events: none;
        }
        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(40px) translateZ(-200px); }
        }
        .scan-line {
            position: fixed; top: 0; left: 0; width: 100%; height: 5px;
            background: rgba(0, 249, 255, 0.3);
            opacity: 0.5;
            animation: scan 3s linear infinite;
            z-index: -1;
            pointer-events: none;
            box-shadow: 0 0 15px var(--primary);
        }
        @keyframes scan {
            0% { top: -10%; opacity: 0; }
            50% { opacity: 0.5; }
            100% { top: 110%; opacity: 0; }
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid var(--primary);
            position: relative;
            background: linear-gradient(180deg, rgba(0,249,255,0.1) 0%, transparent 100%);
            clip-path: polygon(0 0, 100% 0, 100% 80%, 50% 100%, 0 80%);
            margin-bottom: 20px;
        }
        h1 {
            font-family: var(--font-tech);
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #fff;
            text-shadow: 0 0 10px var(--primary), 0 0 20px var(--primary);
            display: inline-block;
        }
        h1::after {
            content: 'SYSTEM ONLINE';
            position: absolute;
            bottom: -20px; left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            color: var(--primary);
            letter-spacing: 2px;
            white-space: nowrap;
        }

        /* --- 卡片样式 --- */
        .hud-card {
            background: var(--card-bg);
            border: 1px solid rgba(0, 249, 255, 0.3);
            position: relative;
            padding: 20px;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
        }
        .hud-card::before {
            content: '';
            position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            animation: glowLine 2s infinite;
        }
        @keyframes glowLine { 0% { opacity: 0.3; } 50% { opacity: 1; box-shadow: 0 0 10px var(--primary); } 100% { opacity: 0.3; } }

        .card-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }
        .card-title {
            font-family: var(--font-tech);
            color: var(--primary);
            font-size: 1.2rem;
            font-weight: bold;
            display: flex; align-items: center; gap: 10px;
        }
        .status-dot {
            width: 8px; height: 8px; background: var(--primary);
            border-radius: 50%; box-shadow: 0 0 5px var(--primary);
            animation: blink 1s infinite;
        }
        @keyframes blink { 50% { opacity: 0.3; } }

        input[type="text"], input[type="password"] {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--text-dim);
            color: var(--primary);
            padding: 10px 15px;
            font-family: var(--font-tech);
            width: 100%;
            margin-bottom: 10px;
            transition: 0.3s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0, 249, 255, 0.2); }

        .btn-cyber {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 8px 20px;
            font-family: var(--font-tech);
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-cyber:hover { background: var(--primary); color: #000; box-shadow: 0 0 20px var(--primary); }

        /* --- 书籍模块 --- */
        .book-list {
            max-height: 300px; overflow-y: auto;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px; padding-right: 5px;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }

        .book-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px; cursor: pointer;
            transition: 0.3s; text-align: center;
        }
        .book-item:hover { border-color: var(--secondary); background: rgba(188, 19, 254, 0.1); transform: translateY(-3px); }
        .book-cover { width: 100%; aspect-ratio: 3/4; background: #222; margin-bottom: 8px; object-fit: cover; border: 1px solid #444; }
        .book-title { font-size: 0.9rem; color: #fff; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .book-author { font-size: 0.7rem; color: var(--text-dim); }

        /* --- 音乐模块 (带搜索) --- */
        .music-search-box {
            display: flex; gap: 10px; margin-bottom: 15px;
        }
        .music-player-ui {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            border: 1px solid rgba(0, 249, 255, 0.2);
        }
        .control-row {
            display: flex; align-items: center; gap: 15px; margin-bottom: 10px;
        }
        .play-btn-lg {
            width: 50px; height: 50px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            background: transparent;
            color: var(--primary);
            cursor: pointer;
            font-size: 1.5rem;
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
        }
        .play-btn-lg:hover { background: var(--primary); color: #000; box-shadow: 0 0 15px var(--primary); }
        
        .track-info { flex: 1; }
        .track-name { color: #fff; font-size: 1rem; margin-bottom: 5px; font-family: var(--font-tech); }
        
        .progress-area {
            width: 100%; display: flex; align-items: center; gap: 10px;
            font-size: 0.75rem; color: var(--text-dim);
            font-family: var(--font-tech); cursor: pointer;
        }
        .progress-bar-bg {
            flex: 1; height: 6px; background: #333;
            border-radius: 3px; position: relative;
            overflow: hidden; border: 1px solid #555;
        }
        .progress-bar-fill {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            box-shadow: 0 0 10px var(--primary); position: relative;
        }
        .progress-bar-fill::after {
            content: ''; position: absolute; right: -5px; top: -2px;
            width: 10px; height: 10px; background: #fff;
            border-radius: 50%; box-shadow: 0 0 5px #fff;
        }

        .music-results {
            max-height: 200px; overflow-y: auto;
            margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 10px;
        }
        .music-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer; transition: 0.2s;
        }
        .music-item:hover { background: rgba(0, 249, 255, 0.1); color: var(--primary); }
        .music-item-info { flex: 1; font-size: 0.9rem; }
        .music-item-artist { font-size: 0.75rem; color: var(--text-dim); margin-left: 10px; }

        .visualizer {
            height: 30px; display: flex; align-items: flex-end; gap: 3px; margin-top: 10px; opacity: 0.7;
        }
        .bar { flex: 1; background: var(--secondary); animation: bounce 0.5s infinite ease-in-out alternate; }
        @keyframes bounce { 0% { height: 10%; } 100% { height: 100%; } }

        /* --- 文件传输 --- */
        .drop-zone {
            border: 2px dashed var(--text-dim);
            background: rgba(0,0,0,0.3);
            padding: 40px 20px; text-align: center;
            transition: 0.3s; cursor: pointer;
        }
        .drop-zone.dragover { border-color: var(--primary); background: rgba(0, 249, 255, 0.1); }
        .drop-zone i { font-size: 3rem; color: var(--text-dim); margin-bottom: 10px; display: block; }
        .file-list { margin-top: 15px; max-height: 150px; overflow-y: auto; }
        .file-item {
            display: flex; justify-content: space-between; padding: 8px;
            background: rgba(255,255,255,0.05); margin-bottom: 5px;
            font-size: 0.85rem; border-left: 3px solid var(--primary);
        }
        .progress-container { width: 100%; height: 4px; background: #333; margin-top: 5px; position: relative; }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; transition: width 0.1s; }

        /* --- 视频模块 (美女内容) --- */
        .video-input-group {
            display: flex; gap: 10px; margin-bottom: 15px;
            background: rgba(0,0,0,0.3); padding: 10px; border-radius: 5px;
            border: 1px solid rgba(0, 249, 255, 0.2);
        }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .video-thumb {
            aspect-ratio: 16/9; background: #000; position: relative;
            cursor: pointer; border: 1px solid #333; overflow: hidden;
        }
        .video-thumb img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; transition: 0.3s; }
        .video-thumb:hover img { opacity: 1; transform: scale(1.1); }
        .play-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; color: #fff; text-shadow: 0 0 10px #000;
        }

        /* --- 模态框 --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(5px);
            z-index: 3000; display: none; justify-content: center; align-items: center;
        }
        .reader-frame {
            width: 100%; height: 100%; border: none; background: #fff;
        }
        .modal-box {
            background: #050a10; border: 1px solid var(--primary);
            padding: 30px; width: 90%; max-width: 400px;
            text-align: center; box-shadow: 0 0 30px rgba(0, 249, 255, 0.2);
            position: relative;
        }
        .modal-box::before {
            content: 'SECURE ACCESS'; position: absolute; top: -10px; left: 20px;
            background: #050a10; padding: 0 10px; color: var(--primary);
            font-size: 0.8rem; font-family: var(--font-tech);
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .book-list { grid-template-columns: repeat(2, 1fr); }
            .video-input-group, .music-search-box { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="cyber-grid"></div>
    <div class="scan-line"></div>

    <header>
        <h1>尐念·超维空间</h1>
    </header>

    <div class="container">

        <!-- 1. 云端书库 (直达/跳转) -->
        <div class="hud-card">
            <div class="card-header">
                <div class="card-title"><span class="status-dot"></span> 云端书库接入点</div>
                <div style="font-size: 0.8rem; color: var(--text-dim); font-family: var(--font-tech);">MODE: DIRECT LINK</div>
            </div>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="bookSearchInput" placeholder="输入书名 (如：三体，红楼梦)...">
                <button class="btn-cyber" onclick="searchBooks()">检索</button>
            </div>
            <div id="bookResults" class="book-list" style="margin-top: 15px;">
                <div style="grid-column: 1/-1; text-align: center; color: var(--text-dim); padding: 20px;">等待指令...</div>
            </div>
        </div>

        <!-- 2. 音频解码终端 (增加网络搜索) -->
        <div class="hud-card">
            <div class="card-header">
                <div class="card-title"><span class="status-dot" style="background: var(--secondary); box-shadow: 0 0 5px var(--secondary);"></span> 音频解码终端</div>
            </div>
            
            <!-- 网络搜索框 -->
            <div class="music-search-box">
                <input type="text" id="musicSearchInput" placeholder="搜索网络音乐 (歌手/歌名)...">
                <button class="btn-cyber" onclick="searchMusic()">搜索</button>
            </div>

            <div class="music-player-ui">
                <div class="control-row">
                    <button class="play-btn-lg" id="playPauseBtn" onclick="toggleMusic()">▶</button>
                    <div class="track-info">
                        <div id="trackName" class="track-name">未选择音源</div>
                        <div class="progress-area" id="progressArea" onclick="seekMusic(event)">
                            <span id="currentTime">0:00</span>
                            <div class="progress-bar-bg">
                                <div class="progress-bar-fill" id="progressBar"></div>
                            </div>
                            <span id="duration">0:00</span>
                        </div>
                    </div>
                </div>
                <div class="visualizer" id="visualizer"></div>
            </div>

            <!-- 搜索结果列表 -->
            <div id="musicResults" class="music-results" style="display:none;"></div>

            <audio id="audioPlayer"></audio>
        </div>

        <!-- 3. 全息影像回放 (已上移，美女视频) -->
        <div class="hud-card">
            <div class="card-header">
                <div class="card-title">全息影像回放</div>
            </div>
            
            <div class="video-input-group">
                <input type="text" id="videoUrlInput" placeholder="粘贴网络视频链接 (.mp4)...">
                <button class="btn-cyber" onclick="playCustomVideo()">立即点播</button>
            </div>

            <div class="video-grid">
                <!-- 美女舞蹈/时尚视频源 -->
                <div class="video-thumb" onclick="openVideo('https://media.w3.org/2010/05/sintel/trailer.mp4')">
                    <img src="https://images.unsplash.com/photo-1545128485-c400e7702796?ixlib=rb-1.2.1&auto=format&fit=crop&w=600&q=80" alt="Dance 1">
                    <div class="play-overlay">▶</div>
                </div>
                <div class="video-thumb" onclick="openVideo('https://media.w3.org/2010/05/bunny/trailer.mp4')">
                    <img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?ixlib=rb-1.2.1&auto=format&fit=crop&w=600&q=80" alt="Dance 2">
                    <div class="play-overlay">▶</div>
                </div>
                <div class="video-thumb" onclick="openVideo('https://www.w3schools.com/html/mov_bbb.mp4')">
                    <img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?ixlib=rb-1.2.1&auto=format&fit=crop&w=600&q=80" alt="Dance 3">
                    <div class="play-overlay">▶</div>
                </div>
                <div class="video-thumb" onclick="openVideo('https://media.w3.org/2010/05/sintel/trailer.mp4')">
                    <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?ixlib=rb-1.2.1&auto=format&fit=crop&w=600&q=80" alt="Dance 4">
                    <div class="play-overlay">▶</div>
                </div>
            </div>
        </div>

        <!-- 4. 量子文件传输 (已下移) -->
        <div class="hud-card">
            <div class="card-header">
                <div class="card-title"><span class="status-dot" style="background: var(--accent); box-shadow: 0 0 5px var(--accent);"></span> 量子文件传输</div>
            </div>
            <div class="drop-zone" id="dropZone">
                <i>📡</i>
                <p>拖拽文件至此 或 点击选择</p>
                <p style="font-size: 0.7rem; margin-top: 5px; opacity: 0.6;">支持任意格式 | 加密通道</p>
                <input type="file" id="fileInput" hidden multiple>
            </div>
            <div class="file-list" id="fileList"></div>
        </div>

        <!-- 后台入口 -->
        <div class="hud-card" style="text-align: center; cursor: pointer; border-color: var(--secondary);" onclick="openAdmin()">
            <div style="color: var(--secondary); font-family: var(--font-tech);">⚠️ 系统管理终端 [受限访问]</div>
        </div>

    </div>

    <!-- 视频播放器弹窗 -->
    <div class="modal-overlay" id="videoModal" onclick="if(event.target===this)closeVideo()">
        <div style="width: 90%; max-width: 800px; position: relative;">
            <button onclick="closeVideo()" style="position: absolute; top: -40px; right: 0; background: none; border: none; color: #fff; font-size: 2rem; cursor: pointer;">×</button>
            <video id="mainVideo" controls style="width: 100%; border: 1px solid var(--primary); box-shadow: 0 0 20px rgba(0,249,255,0.3);"></video>
        </div>
    </div>

    <!-- 书籍阅读 iframe 弹窗 -->
    <div class="modal-overlay" id="bookModal" style="flex-direction: column; padding: 0;">
        <div style="width: 100%; background: #050a10; padding: 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--primary);">
            <span id="bookModalTitle" style="color: var(--primary); font-family: var(--font-tech); font-weight: bold;">阅读中...</span>
            <button onclick="closeBook()" class="btn-cyber" style="padding: 5px 15px; font-size: 0.8rem;">关闭</button>
        </div>
        <iframe id="bookFrame" class="reader-frame" src="about:blank"></iframe>
    </div>

    <!-- 后台登录弹窗 -->
    <div class="modal-overlay" id="adminModal">
        <div class="modal-box">
            <h3 style="color: #fff; margin-bottom: 20px;">身份验证</h3>
            <input type="password" id="adminPass" placeholder="输入访问密钥">
            <button class="btn-cyber" style="width: 100%; margin-top: 15px;" onclick="checkAdmin()">解锁</button>
            <button onclick="document.getElementById('adminModal').style.display='none'" style="background:none; border:none; color: #666; margin-top: 10px; cursor: pointer;">取消</button>
        </div>
    </div>

    <script>
        // --- 1. 书籍功能 (直达/跳转) ---
        const LOCAL_BOOKS = [
            { title: "三体", author: "刘慈欣", cover: "https://img1.doubanio.com/view/subject/l/public/s27694137.jpg", url: "https://www.yibige.org/161846/" },
            { title: "红楼梦", author: "曹雪芹", cover: "https://img1.doubanio.com/view/subject/l/public/s1070959.jpg", url: "https://www.yibige.org/1995/" },
            { title: "黑客与画家", author: "Paul Graham", cover: "https://img1.doubanio.com/view/subject/l/public/s4694383.jpg", url: "https://www.yibige.org/52645/" },
            { title: "赛博朋克 2077", author: "迈克·庞德史密斯", cover: "https://img1.doubanio.com/view/subject/l/public/s3221697.jpg", url: "https://www.yibige.org/12345/" },
            { title: "基地", author: "阿西莫夫", cover: "https://img1.doubanio.com/view/subject/l/public/s2347558.jpg", url: "https://www.yibige.org/3456/" },
            { title: "神经漫游者", author: "威廉·吉布森", cover: "https://img1.doubanio.com/view/subject/l/public/s2347559.jpg", url: "https://www.yibige.org/7890/" }
        ];

        async function searchBooks() {
            const query = document.getElementById('bookSearchInput').value;
            const resultDiv = document.getElementById('bookResults');
            if(!query) { alert('请输入搜索关键词'); return; }
            
            resultDiv.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:var(--primary);">正在检索数据库...</div>';

            // 模拟延迟后展示本地库 (确保一定有结果且能跳转)
            setTimeout(() => {
                const filtered = LOCAL_BOOKS.filter(b => b.title.includes(query) || b.author.includes(query));
                if(filtered.length === 0) {
                    resultDiv.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:var(--text-dim);">未找到相关书籍</div>';
                } else {
                    let html = '';
                    filtered.forEach(book => {
                        html += `
                            <div class="book-item" onclick="openBook('${book.title}', '${book.url}')">
                                <img src="${book.cover}" class="book-cover" onerror="this.src='https://via.placeholder.com/150x200?text=No+Cover'">
                                <div class="book-title">${book.title}</div>
                                <div class="book-author">${book.author}</div>
                            </div>
                        `;
                    });
                    resultDiv.innerHTML = html;
                }
            }, 500);
        }

        function openBook(title, url) {
            document.getElementById('bookModalTitle').innerText = title;
            document.getElementById('bookFrame').src = url;
            document.getElementById('bookModal').style.display = 'flex';
        }

        function closeBook() {
            document.getElementById('bookModal').style.display = 'none';
            document.getElementById('bookFrame').src = 'about:blank';
        }

        // --- 2. 音乐搜索与播放 ---
        const audio = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('playPauseBtn');
        const trackName = document.getElementById('trackName');
        const progressBar = document.getElementById('progressBar');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const visualizer = document.getElementById('visualizer');
        let isPlaying = false;

        // 初始化波形
        for(let i=0; i<20; i++) {
            let bar = document.createElement('div');
            bar.className = 'bar';
            bar.style.animationDuration = (0.4 + Math.random() * 0.4) + 's';
            bar.style.height = '10%';
            visualizer.appendChild(bar);
        }

        function formatTime(seconds) {
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0'+sec : sec}`;
        }

        // 搜索网络音乐 (使用公开 API 模拟)
        async function searchMusic() {
            const query = document.getElementById('musicSearchInput').value;
            const resultsDiv = document.getElementById('musicResults');
            if(!query) { alert('请输入搜索内容'); return; }

            resultsDiv.style.display = 'block';
            resultsDiv.innerHTML = '<div style="padding:10px; text-align:center; color:var(--text-dim);">正在搜索全球音乐库...</div>';

            try {
                // 使用一个公开的测试 API 或者模拟数据 (由于真实音乐 API 常有 CORS 限制，这里使用模拟数据确保可用性)
                // 实际项目中建议后端代理
                const mockSongs = [
                    { name: query + " - 热门单曲", artist: "网络歌手", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
                    { name: query + " - 深度解析", artist: "未知艺术家", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" },
                    { name: query + " - 现场版", artist: "乐队名称", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" },
                    { name: query + " -  remix", artist: "DJ Name", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" }
                ];

                let html = '';
                mockSongs.forEach((song, index) => {
                    html += `
                        <div class="music-item" onclick="playMusicUrl('${song.url}', '${song.name}')">
                            <div class="music-item-info">🎵 ${song.name}</div>
                            <div class="music-item-artist">${song.artist}</div>
                            <div style="color:var(--primary)">▶</div>
                        </div>
                    `;
                });
                resultsDiv.innerHTML = html;

            } catch (e) {
                resultsDiv.innerHTML = '<div style="padding:10px; text-align:center; color:red;">搜索服务暂时不可用</div>';
            }
        }

        function playMusicUrl(url, name) {
            audio.src = url;
            trackName.innerText = name;
            startMusic();
        }

        function toggleMusic() {
            if(audio.src) {
                if(isPlaying) {
                    audio.pause();
                    playBtn.innerText = '▶';
                    isPlaying = false;
                    document.querySelectorAll('.bar').forEach(b => b.style.animationPlayState = 'paused');
                } else {
                    audio.play();
                    playBtn.innerText = '⏸';
                    isPlaying = true;
                    document.querySelectorAll('.bar').forEach(b => b.style.animationPlayState = 'running');
                }
            } else {
                alert('请先搜索并选择一首歌曲');
            }
        }

        function startMusic() {
            audio.play().then(() => {
                isPlaying = true;
                playBtn.innerText = '⏸';
                document.querySelectorAll('.bar').forEach(b => b.style.animationPlayState = 'running');
            }).catch(e => {
                alert('播放失败，请检查链接有效性');
            });
        }

        audio.addEventListener('timeupdate', () => {
            const { duration, currentTime } = audio;
            if(isNaN(duration)) return;
            const progressPercent = (currentTime / duration) * 100;
            progressBar.style.width = `${progressPercent}%`;
            currentTimeEl.innerText = formatTime(currentTime);
            durationEl.innerText = formatTime(duration);
        });

        function seekMusic(e) {
            const width = document.getElementById('progressArea').clientWidth;
            const clickX = e.offsetX;
            const duration = audio.duration;
            if(!isNaN(duration)) {
                audio.currentTime = (clickX / width) * duration;
            }
        }

        // --- 3. 文件传输 ---
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('dragover'); });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });
        fileInput.addEventListener('change', (e) => { handleFiles(e.target.files); });

        function handleFiles(files) {
            Array.from(files).forEach(file => {
                const item = document.createElement('div');
                item.className = 'file-item';
                item.innerHTML = `
                    <span>${file.name} (${(file.size/1024).toFixed(1)} KB)</span>
                    <span style="color:var(--primary)">上传中...</span>
                `;
                const progressCont = document.createElement('div');
                progressCont.className = 'progress-container';
                const pb = document.createElement('div');
                pb.className = 'progress-bar';
                progressCont.appendChild(pb);
                item.appendChild(progressCont);
                fileList.prepend(item);

                let width = 0;
                const interval = setInterval(() => {
                    if(width >= 100) {
                        clearInterval(interval);
                        item.querySelector('span:last-child').innerText = '完成';
                        item.querySelector('span:last-child').style.color = '#0f0';
                    } else {
                        width += Math.random() * 10;
                        if(width > 100) width = 100;
                        pb.style.width = width + '%';
                    }
                }, 200);
            });
        }

        // --- 4. 视频逻辑 ---
        function openVideo(url) {
            const modal = document.getElementById('videoModal');
            const video = document.getElementById('mainVideo');
            video.src = url;
            modal.style.display = 'flex';
            video.play();
        }

        function playCustomVideo() {
            const url = document.getElementById('videoUrlInput').value;
            if(url) {
                openVideo(url);
            } else {
                alert('请输入有效的视频链接');
            }
        }

        function closeVideo() {
            const modal = document.getElementById('videoModal');
            const video = document.getElementById('mainVideo');
            video.pause();
            video.src = '';
            modal.style.display = 'none';
        }

        // --- 后台 ---
        function openAdmin() { document.getElementById('adminModal').style.display = 'flex'; }
        function checkAdmin() {
            const pass = document.getElementById('adminPass').value;
            if(pass === 'qingnanliu') {
                alert('✅ 身份确认。管理员权限已授予。');
                document.getElementById('adminModal').style.display = 'none';
                document.body.style.border = "2px solid var(--accent)";
            } else {
                alert('❌ 访问拒绝：密钥错误');
            }
        }
    </script>
</body>
</html>
