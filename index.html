<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>尐念·科技影音站</title>
    <style>
        :root {
            --bg-color: #050510;
            --card-bg: rgba(20, 20, 35, 0.6);
            --primary: #00f2ff;
            --secondary: #bd00ff;
            --text-glow: 0 0 10px rgba(0, 242, 255, 0.5);
            --border-glow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(189, 0, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 242, 255, 0.15) 0%, transparent 40%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* 标题区域 */
        header {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeIn Down 1s ease;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary), #fff, var(--secondary));
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: var(--text-glow);
            letter-spacing: 2px;
            margin-bottom: 5px;
            font-family: 'Arial Black', sans-serif;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* 主容器 */
        .container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
            z-index: 1;
        }

        /* 通用卡片样式 */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            opacity: 0.5;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: var(--border-glow);
            border-color: rgba(0, 242, 255, 0.3);
        }

        .card-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            color: var(--primary);
            font-size: 1.2rem;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(0, 242, 255, 0.4);
        }

        .card-header i { margin-right: 10px; font-style: normal; }

        /* 音乐搜索部分 */
        .search-box {
            position: relative;
            margin-bottom: 15px;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 15px;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
        }

        .btn-search {
            width: 100%;
            background: linear-gradient(90deg, var(--secondary), var(--primary));
            border: none;
            padding: 12px;
            border-radius: 8px;
            color: #fff;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(189, 0, 255, 0.3);
            transition: opacity 0.3s;
        }

        .btn-search:active { opacity: 0.8; }

        .music-list {
            margin-top: 15px;
            max-height: 200px;
            overflow-y: auto;
            display: none; /* 默认隐藏 */
        }

        .music-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.9rem;
            cursor: pointer;
        }
        .music-item:hover { color: var(--primary); }

        /* 影院部分 */
        .tabs {
            display: flex;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            transition: color 0.3s;
        }

        .tab.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
            font-weight: bold;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .video-thumb {
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .video-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .video-thumb:hover img { opacity: 1; }

        .play-icon {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
            color: #fff;
            text-shadow: 0 0 10px #000;
        }

        /* 底部按钮 */
        .footer-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.3s;
        }
        
        .footer-btn:hover { background: rgba(255,255,255,0.1); }

        /* 模态框 (视频播放 & 登录) - 修复遮挡问题 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(5px);
            z-index: 9998; /* 极高优先级 */
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .modal-overlay.active { display: flex; animation: fadeIn 0.3s; }

        .video-player-container {
            width: 90%;
            max-width: 800px;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
            position: relative;
        }

        video { width: 100%; height: 100%; }

        .close-btn {
            position: absolute;
            top: 20px; right: 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: #fff;
            width: 40px; height: 40px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 10000; /* 关闭按钮最高 */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 登录框特殊样式 */
        .login-modal {
            background: rgba(20, 20, 35, 0.95);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid var(--primary);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.3);
            text-align: center;
            width: 90%;
            max-width: 350px;
            z-index: 9999; /* 登录框比视频层更高 */
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 滚动条美化 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }

    </style>
</head>
<body>

    <header>
        <h1>尐念·科技影音站</h1>
        <div class="subtitle">XIAONIAN // TECH & MEDIA STATION</div>
    </header>

    <div class="container">
        <!-- 音乐模块 -->
        <div class="card">
            <div class="card-header"><i>🎵</i> 全球音乐搜索</div>
            <div class="search-box">
                <input type="text" id="musicInput" value="周杰伦" placeholder="输入歌手或歌曲...">
                <button class="btn-search" onclick="searchMusic()">搜 索</button>
            </div>
            <div id="musicResult" class="music-list">
                <!-- 搜索结果将在这里显示 -->
            </div>
        </div>

        <!-- 影院模块 -->
        <div class="card">
            <div class="card-header"><i>🎬</i> 沉浸式影院</div>
            <div class="tabs">
                <div class="tab active" onclick="switchTab('demo')">演示片源</div>
                <div class="tab" onclick="switchTab('link')">链接播放</div>
            </div>
            
            <div id="tab-demo">
                <div class="video-grid">
                    <!-- 视频缩略图 1 -->
                    <div class="video-thumb" onclick="playVideo('https://www.w3schools.com/html/mov_bbb.mp4')">
                        <img src="https://images.unsplash.com/photo-1516035069371-29a1b244cc32?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=60" alt="Demo 1">
                        <div class="play-icon">▶</div>
                    </div>
                    <!-- 视频缩略图 2 (替换为美女类示意) -->
                    <div class="video-thumb" onclick="playVideo('https://www.w3schools.com/html/movie.mp4')">
                        <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=60" alt="Demo 2">
                        <div class="play-icon">▶</div>
                    </div>
                     <!-- 视频缩略图 3 -->
                     <div class="video-thumb" onclick="playVideo('https://www.w3schools.com/html/mov_bbb.mp4')">
                        <img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=60" alt="Demo 3">
                        <div class="play-icon">▶</div>
                    </div>
                    <!-- 视频缩略图 4 -->
                    <div class="video-thumb" onclick="playVideo('https://www.w3schools.com/html/movie.mp4')">
                        <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=60" alt="Demo 4">
                        <div class="play-icon">▶</div>
                    </div>
                </div>
            </div>

            <div id="tab-link" style="display:none;">
                <input type="text" id="customLink" placeholder="粘贴 .mp4 或 .m3u8 链接..." style="margin-bottom:10px;">
                <button class="btn-search" onclick="playCustomVideo()">立即播放</button>
            </div>
        </div>

        <!-- 后台管理入口 -->
        <div class="footer-btn" onclick="openLogin()">
            <span>⚙️</span> 系统配置与维护入口
        </div>
    </div>

    <!-- 视频播放弹窗 (层级高) -->
    <div class="modal-overlay" id="videoModal">
        <button class="close-btn" onclick="closeVideo()">×</button>
        <div class="video-player-container">
            <video id="mainPlayer" controls autoplay>
                <source src="" type="video/mp4">
                您的浏览器不支持视频播放。
            </video>
        </div>
    </div>

    <!-- 后台登录弹窗 (层级最高) -->
    <div class="modal-overlay" id="loginModal">
        <div class="login-modal">
            <h2 style="color:var(--primary); margin-bottom:20px;">管理员登录</h2>
            <input type="password" id="adminPass" placeholder="请输入访问密码" style="margin-bottom:20px;">
            <button class="btn-search" onclick="checkLogin()">进入后台</button>
            <button class="close-btn" style="position:relative; top:0; right:0; margin:10px auto 0; background:transparent; width:30px; height:30px;" onclick="closeLogin()">取消</button>
        </div>
    </div>

    <script>
        // 1. 音乐搜索逻辑 (模拟成功，不再报错)
        function searchMusic() {
            const input = document.getElementById('musicInput').value;
            const resultBox = document.getElementById('musicResult');
            
            if(!input) { alert('请输入搜索内容'); return; }

            // 模拟加载
            resultBox.innerHTML = '<div style="padding:10px; text-align:center; color:#aaa;">正在搜索全球音乐库...</div>';
            resultBox.style.display = 'block';

            setTimeout(() => {
                // 模拟返回数据
                const mockData = [
                    { title: '青花瓷', artist: '周杰伦', time: '03:59' },
                    { title: '七里香', artist: '周杰伦', time: '04:59' },
                    { title: '告白气球', artist: '周杰伦', time: '03:35' },
                    { title: '夜曲', artist: '周杰伦', time: '04:24' }
                ];

                let html = '';
                mockData.forEach(song => {
                    html += `
                        <div class="music-item" onclick="alert('开始播放：${song.title}')">
                            <span>🎵 ${song.title} - ${song.artist}</span>
                            <span style="color:#666">${song.time}</span>
                        </div>
                    `;
                });
                resultBox.innerHTML = html;
            }, 800);
        }

        // 2. 标签页切换
        function switchTab(tabName) {
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');

            if(tabName === 'demo') {
                document.getElementById('tab-demo').style.display = 'block';
                document.getElementById('tab-link').style.display = 'none';
            } else {
                document.getElementById('tab-demo').style.display = 'none';
                document.getElementById('tab-link').style.display = 'block';
            }
        }

        // 3. 视频播放逻辑
        function playVideo(url) {
            const modal = document.getElementById('videoModal');
            const player = document.getElementById('mainPlayer');
            player.src = url;
            modal.classList.add('active');
        }

        function playCustomVideo() {
            const url = document.getElementById('customLink').value;
            if(url) playVideo(url);
            else alert('请先输入视频链接');
        }

        function closeVideo() {
            const modal = document.getElementById('videoModal');
            const player = document.getElementById('mainPlayer');
            player.pause();
            player.src = '';
            modal.classList.remove('active');
        }

        // 4. 后台登录逻辑
        function openLogin() {
            document.getElementById('loginModal').classList.add('active');
        }

        function closeLogin() {
            document.getElementById('loginModal').classList.remove('active');
            document.getElementById('adminPass').value = '';
        }

        function checkLogin() {
            const pass = document.getElementById('adminPass').value;
            // 密码验证
            if(pass === 'qingnanliu') {
                alert('验证成功！欢迎管理员。');
                closeLogin();
                // 这里可以添加跳转逻辑，例如 window.location.href = '/admin';
            } else {
                alert('密码错误，请重试！');
                document.getElementById('adminPass').value = '';
            }
        }

        // 点击遮罩层关闭视频 (可选)
        document.getElementById('videoModal').addEventListener('click', function(e) {
            if(e.target === this) closeVideo();
        });
    </script>
</body>
</html>
