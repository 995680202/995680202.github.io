<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>科技感影音直播站</title>
  <link rel="stylesheet" href="style.css">
  <!-- 粒子背景插件（无广告，直接用） -->
  <script src="https://cdn.jsdelivr.net/gh/hustcc/canvas-nest.js@1.0.1/canvas-nest.min.js" type="text/javascript"></script>
</head>
<body>
  <!-- 粒子科技背景（自动加载） -->
  <canvas id="canvas-nest" style="position:fixed;top:0;left:0;z-index:-1;"></canvas>

  <!-- 开机动画 -->
  <div class="loader" id="loader">
    <div class="loader-text">🎵 科技影音直播站</div>
    <div class="loader-line"></div>
  </div>

  <!-- 极简封面（玻璃拟态+光效） -->
  <div class="banner">
    <div class="banner-content">
      <h1>科技感影音直播站</h1>
      <p>995680202.xyz | 音乐·视频·直播</p>
    </div>
  </div>

  <div class="container">
    <!-- 播放器区域 + 上一首/下一首（玻璃拟态+光效） -->
    <div class="player-box">
      <h3>🎵 当前播放</h3>
      <div class="player-controls">
        <button id="prevBtn">⏮ 上一首</button>
        <button id="playBtn">⏯ 播放/暂停</button>
        <button id="nextBtn">⏭ 下一首</button>
      </div>
      <audio id="main-player" controls class="audio-style">
      <div id="now-playing" class="now-playing">未播放</div>
    </div>

    <!-- 音乐列表（带分类，玻璃拟态） -->
    <div class="card">
      <h2>🎶 音乐列表</h2>
      <div class="category-tabs">
        <button class="category-tab active" data-category="all">全部</button>
        <button class="category-tab" data-category="chinese">华语流行</button>
        <button class="category-tab" data-category="classic">经典老歌</button>
        <button class="category-tab" data-category="instrumental">纯音乐</button>
        <button class="category-tab" data-category="english">英文热门</button>
      </div>
      <div class="list" id="music-list"></div>
    </div>

    <!-- 视频列表（带分类，玻璃拟态） -->
    <div class="card">
      <h2>🎬 视频列表</h2>
      <div class="category-tabs video-tabs">
        <button class="video-tab active" data-video-category="all">全部</button>
        <button class="video-tab" data-video-category="short">短视频</button>
        <button class="video-tab" data-video-category="movie">电影片段</button>
      </div>
      <div class="list" id="video-list"></div>
    </div>

    <!-- 流媒体/直播列表（和饭太硬.tv一致，直接打开） -->
    <div class="card">
      <h2>📺 直播/流媒体</h2>
      <div class="list" id="live-list"></div>
    </div>
  </div>

  <!-- 后台管理（玻璃拟态+光效） -->
  <div class="admin-btn" onclick="toggleAdmin()">⚙️ 后台管理</div>
  <div class="admin-panel" id="adminPanel">
    <h3>后台管理 | 密码：995680202</h3>
    <input type="password" id="adminPwd" placeholder="输入管理密码">
    <button onclick="checkAdmin()">解锁管理</button>
    <div id="adminContent" style="display:none;margin-top:15px;">
      <h4>🎶 音乐链接（一行一条，格式：歌名-歌手|直链）</h4>
      <textarea id="musicData" rows="4" placeholder="例：晴天-周杰伦|https://xxx.mp3"></textarea>
      <h4>🎬 视频链接（一行一条，格式：视频名|直链）</h4>
      <textarea id="videoData" rows="4" placeholder="例：大兔子|https://xxx.mp4"></textarea>
      <h4>📺 直播/流媒体（一行一条，格式：直播名|直链）</h4>
      <textarea id="liveData" rows="4" placeholder="例：饭太硬直播|http://www.饭太硬.com/tv"></textarea>
      <button onclick="saveAllData()">保存并刷新</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
