<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>尐念·超维空间</title>
    <meta name="description" content="尐念的赛博朋克数字终端 - 音乐、书籍、全息影像与加密传输">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <!-- Open Graph for social sharing -->
    <meta property="og:title" content="尐念·超维空间" />
    <meta property="og:description" content="欢迎进入我的数字世界：量子书库、音频矩阵、全息频道与加密传输。" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://995680202.xyz" />
    <style>
        /* ===== 全局重置与基础样式 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a12 url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="%230a0a12"/><path d="M0 50 L100 50 M50 0 L50 100" stroke="%231a1a2e" stroke-width="0.5"/></svg>');
            color: #e0e0ff;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(106, 27, 154, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(29, 161, 242, 0.1) 0%, transparent 40%);
            pointer-events: none;
        }

        /* ===== HUD 容器 ===== */
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }
        .hud-card {
            background: rgba(10, 10, 20, 0.7);
            border: 1px solid #3a3a6e;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(106, 27, 154, 0.3);
            overflow: hidden;
        }
        .card-header {
            padding: 1rem 1.5rem;
            background: rgba(20, 20, 40, 0.8);
            border-bottom: 1px solid #3a3a6e;
            display: flex;
            align-items: center;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            background: #4caf50;
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 8px #4caf50;
        }
        .card-title {
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* ===== 输入框 & 按钮 ===== */
        input, button {
            background: rgba(30, 30, 60, 0.8);
            border: 1px solid #4a4a8a;
            color: #e0e0ff;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            font-family: inherit;
        }
        input {
            width: 100%;
            margin: 0.5rem 0;
        }
        button {
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover {
            background: rgba(60, 60, 120, 0.9);
            border-color: #6a4b9a;
            transform: translateY(-1px);
        }

        /* ===== 进度条 ===== */
        .progress-container {
            height: 6px;
            background: rgba(50, 50, 90, 0.6);
            border-radius: 3px;
            margin: 1rem 0;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #6a1b9a, #1d9bf0);
            transition: width 0.3s ease;
        }

        /* ===== 视频网格 ===== */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1rem;
            padding: 1rem 1.5rem;
        }
        .video-thumb {
            position: relative;
            border-radius: 6px;
            overflow: hidden;
            aspect-ratio: 9/16;
            background: #111;
            cursor: pointer;
        }
        .video-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .play-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .video-thumb:hover .play-overlay {
            opacity: 1;
        }

        /* ===== 图书列表 ===== */
        .book-list {
            padding: 1rem 1.5rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
        }
        .book-item {
            background: rgba(25, 25, 50, 0.6);
            padding: 1rem;
            border-radius: 6px;
            border: 1px solid #2a2a5a;
        }
        .book-title {
            font-weight: bold;
            margin-bottom: 0.5rem;
            color: #bb86fc;
        }

        /* ===== 音频播放器 ===== */
        .music-player-ui {
            padding: 1rem 1.5rem;
        }
        .music-track {
            display: flex;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(100,100,150,0.2);
        }
        .track-name {
            flex: 1;
        }
        .track-actions button {
            margin-left: 0.5rem;
            padding: 0.25rem 0.5rem;
            font-size: 0.8rem;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .container { margin: 1rem auto; }
            .video-grid { grid-template-columns: repeat(2, 1fr); }
            .book-list { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 量子书库 -->
        <div class="hud-card">
            <div class="card-header">
                <div class="status-dot"></div>
                <div class="card-title">📚 量子书库</div>
            </div>
            <div class="book-list">
                <div class="book-item">
                    <div class="book-title">《三体》</div>
                    <div>刘慈欣 · 科幻</div>
                </div>
                <div class="book-item">
                    <div class="book-title">《神经漫游者》</div>
                    <div>威廉·吉布森 · 赛博朋克</div>
                </div>
                <div class="book-item">
                    <div class="book-title">《基地》</div>
                    <div>艾萨克·阿西莫夫 · 太空史诗</div>
                </div>
                <div class="book-item">
                    <div class="book-title">《雪崩》</div>
                    <div>尼尔·斯蒂芬森 · 元宇宙先驱</div>
                </div>
            </div>
        </div>

        <!-- 音频矩阵 -->
        <div class="hud-card">
            <div class="card-header">
                <div class="status-dot"></div>
                <div class="card-title">🎧 音频矩阵</div>
            </div>
            <div class="music-player-ui">
                <div class="music-track">
                    <div class="track-name">Cyberpunk Pulse</div>
                    <div class="track-actions">
                        <button onclick="alert('试听功能待激活')">▶ 播放</button>
                    </div>
                </div>
                <div class="music-track">
                    <div class="track-name">Neon Dreams</div>
                    <div class="track-actions">
                        <button onclick="alert('试听功能待激活')">▶ 播放</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 美女热舞 · 全息频道 -->
        <div class="hud-card">
            <div class="card-header">
                <div class="status-dot"></div>
                <div class="card-title">💃 美女热舞 · 全息频道</div>
            </div>
            <div class="video-grid">
                <div class="video-thumb">
                    <div style="background:#222;display:flex;align-items:center;justify-content:center;color:#666;height:100%">K-Pop</div>
                    <div class="play-overlay">▶</div>
                </div>
                <div class="video-thumb">
                    <div style="background:#222;display:flex;align-items:center;justify-content:center;color:#666;height:100%">街舞</div>
                    <div class="play-overlay">▶</div>
                </div>
                <div class="video-thumb">
                    <div style="background:#222;display:flex;align-items:center;justify-content:center;color:#666;height:100%">爵士</div>
                    <div class="play-overlay">▶</div>
                </div>
                <div class="video-thumb">
                    <div style="background:#222;display:flex;align-items:center;justify-content:center;color:#666;height:100%">啦啦队</div>
                    <div class="play-overlay">▶</div>
                </div>
            </div>
        </div>

        <!-- 量子传输 -->
        <div class="hud-card">
            <div class="card-header">
                <div class="status-dot"></div>
                <div class="card-title">🔐 量子传输 [AES-256]</div>
            </div>
            <div style="padding: 1.5rem;">
                <p>请输入密钥以解锁传输协议：</p>
                <input type="password" id="passInput" placeholder="输入6位数字密钥..." maxlength="10">
                <button onclick="unlockTransfer()">验证并启动</button>
                
                <div id="transferPanel" style="display:none; margin-top: 1.5rem;">
                    <p>拖拽文件至此区域或点击下方按钮上传：</p>
                    <div id="dropZone" style="border: 2px dashed #4a4a8a; border-radius: 8px; padding: 2rem; text-align: center; margin: 1rem 0; cursor: pointer;">
                        📤 释放文件以上传
                    </div>
                    <input type="file" id="fileInput" style="display:none;">
                    <button onclick="document.getElementById('fileInput').click()">选择文件</button>
                    
                    <div class="progress-container">
                        <div class="progress-bar" id="progressBar"></div>
                    </div>
                    <div id="fileInfo" style="margin-top: 1rem; font-size: 0.9rem;"></div>
                    <button id="downloadBtn" onclick="downloadFile()" style="display:none; margin-top: 1rem;">⬇ 下载接收的文件</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let uploadedFile = null;

        function unlockTransfer() {
            const pass = document.getElementById('passInput').value;
            if (pass === '995680202') {
                document.getElementById('transferPanel').style.display = 'block';
                alert('✅ 协议已激活！请上传文件。');
            } else {
                alert('❌ 密钥错误。提示：6位数字。');
            }
        }

        // 拖拽上传
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, highlight, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, unhighlight, false);
        });

        function highlight() {
            dropZone.style.borderColor = '#bb86fc';
            dropZone.style.backgroundColor = 'rgba(91, 52, 138, 0.2)';
        }

        function unhighlight() {
            dropZone.style.borderColor = '#4a4a8a';
            dropZone.style.backgroundColor = '';
        }

        dropZone.addEventListener('drop', handleDrop, false);
        fileInput.addEventListener('change', handleFiles, false);

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            handleFiles({ target: { files } });
        }

        function handleFiles(e) {
            const fileList = e.target.files;
            if (fileList.length > 0) {
                const file = fileList;
                uploadedFile = file;
                simulateUpload(file);
            }
        }

        function simulateUpload(file) {
            const progressBar = document.getElementById('progressBar');
            const fileInfo = document.getElementById('fileInfo');
            const downloadBtn = document.getElementById('downloadBtn');

            fileInfo.innerHTML = `📁 ${file.name} | ${(file.size / 1024).toFixed(2)} KB`;
            progressBar.style.width = '0%';

            // 模拟上传进度
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 15;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    downloadBtn.style.display = 'inline-block';
                    alert('✅ 文件已加密接收！');
                }
                progressBar.style.width = progress + '%';
            }, 200);
        }

        function downloadFile() {
            if (!uploadedFile) return;
            const url = URL.createObjectURL(uploadedFile);
            const a = document.createElement('a');
            a.href = url;
            a.download = uploadedFile.name;
            document.body.appendChild(a);
            a.click();
            setTimeout(() => {
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 100);
        }
    </script>
</body>
</html>
