<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>尐念 · 科技影音站</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/gh/hustcc/canvas-nest.js@1.0.1/canvas-nest.min.js" defer></script>
</head>
<body>

<canvas id="canvas-nest" style="position:fixed;top:0;left:0;z-index:-1;"></canvas>

<header class="header">
  <div class="header-glow"></div>
  <div class="header-light"></div>
  <div class="header-content">
    <h1 class="header-title">尐念 · 科技影音站</h1>
    <p class="header-subtitle">995680202.xyz</p>
    <div class="header-divider"></div>
  </div>
</header>

<div class="container">

  <!-- 音乐播放器 -->
  <div class="card player-card">
    <h3>🎵 音乐播放器</h3>
    <div class="player-info" id="now-playing">未播放音乐</div>
    <input type="range" id="progress" class="progress-bar" value="0" min="0" max="100">
    <div class="player-controls">
      <button id="prevBtn">⏮ 上一首</button>
      <button id="playBtn">▶ 播放</button>
      <button id="nextBtn">⏭ 下一首</button>
    </div>
    <audio id="main-player">
  </div>

  <!-- 音乐库（默认民谣） -->
  <div class="card">
    <h2>🎶 音乐库</h2>
    <select id="music-category" class="select-box">
      <option value="all">全部</option>
      <option value="chinese">华语</option>
      <option value="classic">古典</option>
      <option value="pop">流行</option>
      <option value="folk" selected>民谣</option>
    </select>
    <div class="list" id="music-list" style="margin-top:12px;"></div>
  </div>

  <!-- 直播/流媒体 -->
  <div class="card">
    <h2>📺 直播/流媒体</h2>
    <div class="list" id="live-list"></div>
  </div>

  <!-- 文件夹（默认工作） -->
  <div class="card">
    <h2>📁 文件夹</h2>
    <select id="folder-select" class="select-box">
      <option value="">请选择文件夹</option>
      <option value="work" selected>工作</option>
      <option value="private">私人（需密码）</option>
    </select>
    <div class="list" id="file-list" style="margin-top:12px;"></div>
  </div>

</div>

<!-- 自动背景音乐 -->
<audio id="bg-music" loop>

<!-- 双击打开后台 -->
<div id="admin-btn" style="position:fixed;right:24px;bottom:24px;z-index:999;">
  <div style="padding:12px 20px;background:#003377;color:#00d8ff;border-radius:12px;cursor:pointer;">⚙️ 后台管理</div>
</div>

<!-- 后台面板 -->
<div id="admin-panel" style="display:none;position:fixed;right:20px;bottom:80px;width:360px;background:#001a3a;border:1px solid #00d8ff;border-radius:16px;padding:20px;z-index:9999;color:#fff;">
  <div id="admin-login" style="margin-bottom:10px;">
    <input type="password" id="admin-pwd" placeholder="输入后台密码" style="width:100%;padding:8px;margin-bottom:8px;border-radius:8px;">
    <button onclick="adminLogin()" style="width:100%;padding:8px;border-radius:8px;background:#00d8ff;color:#002;">登录</button>
  </div>

  <div id="admin-menu" style="display:none;">
    <div style="margin-bottom:10px;font-weight:bold;color:#00d8ff;">📁 工作文件夹</div>
    <input type="file" id="work-upload" multiple>
    <button onclick="uploadWork()" style="margin-top:5px;width:100%;padding:6px;">上传工作文件</button>
    <div id="work-list" style="margin-top:8px;max-height:100px;overflow-y:auto;"></div>

    <div style="margin:12px 0;font-weight:bold;color:#00d8ff;">🔒 私人文件夹</div>
    <input type="file" id="private-upload" multiple>
    <button onclick="uploadPrivate()" style="margin-top:5px;width:100%;padding:6px;">上传私人文件</button>
    <div id="private-list" style="margin-top:8px;max-height:100px;overflow-y:auto;"></div>

    <div style="margin:12px 0;font-weight:bold;color:#00d8ff;">🎵 背景音乐（自动播放）</div>
    <input type="file" id="bg-music-upload" accept="audio/*">
    <button onclick="setBgMusic()" style="margin-top:5px;width:100%;padding:6px;">设置背景音乐</button>
    <button onclick="delBgMusic()" style="margin-top:5px;width:100%;padding:6px;background:#c22;">删除背景音乐</button>

    <div style="text-align:center;margin-top:10px;">
      <button onclick="closeAdmin()" style="padding:6px 12px;">关闭</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
