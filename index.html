<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统控制台 - 状态监控与修复</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-sub: #a0a0a0;
            --success: #00c853;
            --error: #ff3d00;
            --warning: #ffd600;
            --primary: #2979ff;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
        }

        h1 { margin: 0; font-size: 1.8rem; }
        p.subtitle { color: var(--text-sub); font-size: 0.9rem; margin-top: 5px; }

        /* 状态卡片网格 */
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .status-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }

        .status-card:hover { transform: translateY(-2px); }

        .status-icon { font-size: 2rem; margin-bottom: 10px; display: block; }
        .status-label { font-size: 0.9rem; color: var(--text-sub); display: block; margin-bottom: 5px; }
        .status-value { font-weight: bold; font-size: 1.1rem; }

        .status-ok { color: var(--success); }
        .status-err { color: var(--error); }
        .status-warn { color: var(--warning); }

        /* 操作区域 */
        .action-section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 1.2rem;
            margin-bottom: 15px;
            border-left: 4px solid var(--primary);
            padding-left: 10px;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        button {
            background: #333;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s;
            flex: 1;
            min-width: 120px;
        }

        button:hover { background: #444; }
        button.primary { background: var(--primary); }
        button.primary:hover { background: #1565c0; }
        button.danger { background: #c62828; }
        button.danger:hover { background: #b71c1c; }

        /* 日志/终端区域 */
        .terminal-box {
            background: #000;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            padding: 15px;
            border-radius: 5px;
            height: 200px;
            overflow-y: auto;
            font-size: 0.85rem;
            border: 1px solid #333;
        }

        .log-entry { margin-bottom: 5px; border-bottom: 1px dashed #333; padding-bottom: 2px; }
        .log-time { color: #888; margin-right: 10px; }

        /* 针对特定问题的提示 */
        .alert-box {
            background: rgba(255, 61, 0, 0.1);
            border: 1px solid var(--error);
            color: #ffab91;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none; /* 默认隐藏，JS 控制显示 */
        }

        @media (max-width: 600px) {
            .status-grid { grid-template-columns: 1fr 1fr; }
            button { min-width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>系统运维控制台</h1>
        <p class="subtitle">实时监控 | 故障诊断 | 快速修复</p>
    </header>

    <!-- 全局警报 -->
    <div id="globalAlert" class="alert-box">
        <strong>⚠️ 检测到服务异常：</strong> <span id="alertMsg"></span>
    </div>

    <!-- 状态概览 -->
    <div class="status-grid">
        <div class="status-card">
            <span class="status-icon" id="icon-search">🔍</span>
            <span class="status-label">搜索服务</span>
            <span class="status-value" id="val-search">检测中...</span>
        </div>
        <div class="status-card">
            <span class="status-icon" id="icon-media">🎬</span>
            <span class="status-label">演示片源</span>
            <span class="status-value" id="val-media">检测中...</span>
        </div>
        <div class="status-card">
            <span class="status-icon" id="icon-cloud">☁️</span>
            <span class="status-label">云端资料库</span>
            <span class="status-value" id="val-cloud">检测中...</span>
        </div>
        <div class="status-card">
            <span class="status-icon" id="icon-admin">⚙️</span>
            <span class="status-label">后台管理</span>
            <span class="status-value" id="val-admin">检测中...</span>
        </div>
    </div>

    <!-- 快速修复操作 -->
    <div class="action-section">
        <div class="section-title">🛠️ 快速修复工具</div>
        <div class="btn-group">
            <button class="primary" onclick="runDiagnostics()">🔄 重新诊断网络</button>
            <button onclick="clearCache()">🧹 清理本地缓存</button>
            <button onclick="restartServices()">♻️ 重启核心服务</button>
            <button class="danger" onclick="resetConfig()">⚠️ 重置配置文件</button>
        </div>
        <p style="font-size: 0.8rem; color: #666; margin-top: 10px;">
            * 点击“重启核心服务”将尝试调用后端 API 重启 Docker 容器或 Systemd 服务。
        </p>
    </div>

    <!-- 实时日志 -->
    <div class="action-section">
        <div class="section-title">📜 系统运行日志</div>
        <div class="terminal-box" id="terminal">
            <div class="log-entry"><span class="log-time">[SYSTEM]</span> 控制台已加载，正在初始化检测...</div>
        </div>
    </div>
</div>

<script>
    // 配置项：请根据实际部署情况修改这些地址
    const CONFIG = {
        searchApi: '/api/search/status', // 搜索接口
        mediaUrl: '/assets/demo.mp4',    // 演示视频地址
        cloudApi: '/api/cloud/status',   // 云端接口
        adminUrl: '/admin'               // 后台地址
    };

    const terminal = document.getElementById('terminal');
    const alertBox = document.getElementById('globalAlert');
    const alertMsg = document.getElementById('alertMsg');

    // 写入日志函数
    function log(msg, type = 'info') {
        const now = new Date().toLocaleTimeString();
        const div = document.createElement('div');
        div.className = 'log-entry';
        let color = '#00ff00';
        if (type === 'error') color = '#ff3d00';
        if (type === 'warn') color = '#ffd600';
        
        div.innerHTML = `<span class="log-time">[${now}]</span><span style="color:${color}">${msg}</span>`;
        terminal.appendChild(div);
        terminal.scrollTop = terminal.scrollHeight;
    }

    // 更新状态 UI
    function updateStatus(id, status, message) {
        const valEl = document.getElementById(`val-${id}`);
        const iconEl = document.getElementById(`icon-${id}`);
        
        if (status === 'ok') {
            valEl.textContent = '正常';
            valEl.className = 'status-value status-ok';
            iconEl.textContent = '✅';
        } else if (status === 'error') {
            valEl.textContent = '异常';
            valEl.className = 'status-value status-err';
            iconEl.textContent = '❌';
            return message; // 返回错误信息用于汇总
        } else {
            valEl.textContent = message || '未知';
            valEl.className = 'status-value status-warn';
            iconEl.textContent = '⚠️';
        }
        return null;
    }

    // 核心诊断逻辑
    async function runDiagnostics() {
        log('开始全面系统诊断...', 'info');
        alertBox.style.display = 'none';
        let errors = [];

        // 1. 检测搜索服务
        try {
            // 模拟检测：实际使用时请取消注释并替换为真实 fetch
            // const res = await fetch(CONFIG.searchApi); 
            // if (!res.ok) throw new Error('API 无响应');
            setTimeout(() => {
                // 模拟随机结果，实际请替换为真实逻辑
                const isUp = Math.random() > 0.3; 
                const err = updateStatus('search', isUp ? 'ok' : 'error', 'API 限制或超时');
                if (err) errors.push('搜索服务不可用');
                log(isUp ? '搜索服务连接正常' : '搜索服务连接失败：API 限制或网络波动', isUp ? 'info' : 'error');
                checkFinalStatus(errors);
            }, 800);
        } catch (e) {
            updateStatus('search', 'error', e.message);
            errors.push('搜索服务异常');
        }

        // 2. 检测片源 (尝试加载一个小资源)
        setTimeout(() => {
            const img = new Image();
            img.src = CONFIG.mediaUrl;
            img.onload = () => {
                updateStatus('media', 'ok');
                log('演示片源资源加载正常', 'info');
            };
            img.onerror = () => {
                updateStatus('media', 'error', '资源丢失或 CORS 错误');
                errors.push('演示片源无法加载');
                log('演示片源加载失败：文件不存在或权限不足', 'error');
            };
            checkFinalStatus(errors);
        }, 1000);

        // 3. 检测云端
        setTimeout(() => {
            // 模拟云端检测
            const cloudUp = false; // 模拟故障
            updateStatus('cloud', cloudUp ? 'ok' : 'error', '连接超时');
            if (!cloudUp) {
                errors.push('云端资料库无法连接');
                log('云端资料库连接失败：请检查同步服务或存储空间', 'error');
            }
            checkFinalStatus(errors);
        }, 1200);

        // 4. 检测后台
        setTimeout(() => {
             // 简单检测当前页面是否能访问 admin 路径
             fetch(CONFIG.adminUrl, { method: 'HEAD' })
                .then(res => {
                    if (res.ok || res.status === 401) { // 401 也算服务活着
                        updateStatus('admin', 'ok');
                        log('后台管理服务响应正常', 'info');
                    } else {
                        throw new Error('HTTP ' + res.status);
                    }
                })
                .catch(() => {
                    updateStatus('admin', 'error', '服务未启动');
                    errors.push('后台管理服务无响应');
                    log('后台管理服务无法访问：端口可能被封锁或服务崩溃', 'error');
                })
                .finally(() => checkFinalStatus(errors));
        }, 1500);
    }

    function checkFinalStatus(errors) {
        if (errors.length > 0) {
            alertMsg.textContent = errors.join('; ');
            alertBox.style.display = 'block';
        } else {
            // 只有当所有检测都完成后（这里简化处理），如果没错误则隐藏
            // 实际逻辑需计数器，此处仅为演示
        }
    }

    // 按钮功能实现
    function clearCache() {
        log('正在清理浏览器缓存与本地存储...', 'warn');
        localStorage.clear();
        sessionStorage.clear();
        // 强制刷新
        setTimeout(() => {
            location.reload(true);
        }, 1000);
    }

    function restartServices() {
        log('正在发送重启指令到后端...', 'warn');
        // 这里需要对接真实的后端重启 API
        // fetch('/api/system/restart', { method: 'POST' })
        setTimeout(() => {
            log('指令已发送。请在 Termux 中确认服务是否重新启动。', 'info');
            alert('重启指令已下发。\n\n如果是 Docker 部署，请检查容器状态。\n如果是直接运行，请查看终端输出。');
        }, 1500);
    }

    function resetConfig() {
        if(confirm('确定要重置配置文件吗？此操作可能导致自定义设置丢失！')) {
            log('正在重置配置...', 'error');
            // 对接重置 API
            setTimeout(() => {
                log('配置已重置，请手动重启服务生效。', 'warn');
            }, 1000);
        }
    }

    // 页面加载自动运行
    window.onload = runDiagnostics;

</script>

</body>
</html>
