<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>尐念 · 科技影音站</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/gh/hustcc/canvas-nest.js@1.0.1/canvas-nest.min.js" defer></script>
</head>
<body>

<canvas id="canvas-nest" style="position:fixed;top:0;left:0;z-index:-1;"></canvas>

<!-- 头部 -->
<header class="header">
  <div class="header-glow"></div>
  <div class="header-light"></div>
  <div class="header-content">
    <h1 class="header-title">尐念 · 科技影音站</h1>
    <p class="header-subtitle">995680202.xyz</p>
    <div class="header-divider"></div>
  </div>
</header>

<div class="container">

  <!-- 音乐播放器 -->
  <div class="card player-card">
    <h3>🎵 音乐播放器</h3>
    <div class="player-controls">
      <button id="prevBtn">⏮ 上一首</button>
      <button id="playBtn">⏯ 播放</button>
      <button id="nextBtn">⏭ 下一首</button>
    </div>
    <audio id="main-player" controls class="audio-style">
    <div id="now-playing" class="now-playing">未播放音乐</div>
  </div>

  <!-- 音乐库 -->
  <div class="card">
    <h2>🎶 音乐库</h2>
    <div class="category-tabs">
      <button class="category-tab active" data-category="all">全部</button>
      <button class="category-tab" data-category="chinese">华语</button>
      <button class="category-tab" data-category="classic">经典</button>
    </div>
    <div class="list" id="music-list"></div>
  </div>

  <!-- 视频库 -->
  <div class="card">
    <h2>🎬 视频库</h2>
    <div class="category-tabs video-tabs">
      <button class="video-tab active" data-video-category="all">全部</button>
      <button class="video-tab" data-video-category="short">短视频</button>
      <button class="video-tab" data-video-category="movie">电影片段</button>
    </div>
    <div class="list" id="video-list"></div>
  </div>

  <!-- 直播 -->
  <div class="card">
    <h2>📺 直播/流媒体</h2>
    <div class="list" id="live-list"></div>
  </div>

  <!-- 文件库 -->
  <div class="card">
    <h2>📁 文档文件库</h2>
    <p class="file-tip">上传文件到GitHub根目录，复制Raw链接即可在此访问</p>
    <div class="list" id="file-list"></div>
  </div>

</div>

<!-- 视频弹窗 -->
<div id="video-modal" class="video-modal">
  <div class="modal-backdrop" onclick="closeVideo()"></div>
  <div class="modal-content">
    <div class="modal-header">
      <span id="video-title">视频播放</span>
      <button class="modal-close" onclick="closeVideo()">✕</button>
    </div>
    <video id="modal-video" controls autoplay></video>
  </div>
</div>

<!-- 后台 -->
<div class="admin-btn" onclick="toggleAdmin()">⚙️ 后台</div>
<div class="admin-panel" id="adminPanel">
  <h3>后台管理</h3>
  <input type="password" id="adminPwd" placeholder="密码">
  <button onclick="checkAdmin()">解锁</button>
  <div id="adminContent" style="display:none;margin-top:15px;">
    <h4>🎶 音乐（歌名|链接）</h4>
    <textarea id="musicData" rows="3"></textarea>
    <h4>🎬 视频（视频名|链接）</h4>
    <textarea id="videoData" rows="3"></textarea>
    <h4>📺 直播（名称|链接）</h4>
    <textarea id="liveData" rows="3"></textarea>
    <h4>📁 文件（名称|链接）</h4>
    <textarea id="fileData" rows="3"></textarea>
    <button onclick="saveAllData()">保存并刷新</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
