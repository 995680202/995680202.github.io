<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>尐念·科技影音站</title>
    <style>
        :root {
            --primary: #00f3ff;
            --secondary: #bc13fe;
            --accent: #ffe600;
            --bg: #050510;
            --glass: rgba(16, 20, 40, 0.7);
            --border: rgba(0, 243, 255, 0.3);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        /* 动态背景 */
        .cyber-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                linear-gradient(rgba(5, 5, 16, 0.9), rgba(5, 5, 16, 0.9)),
                repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(0, 243, 255, 0.03) 1px, rgba(0, 243, 255, 0.03) 2px),
                repeating-linear-gradient(90deg, transparent, transparent 1px, rgba(188, 19, 254, 0.03) 1px, rgba(188, 19, 254, 0.03) 2px);
            z-index: -1;
            animation: scanline 10s linear infinite;
        }
        
        @keyframes scanline {
            0% { background-position: 0 0; }
            100% { background-position: 0 100%; }
        }

        /* 头部特效 */
        header {
            text-align: center;
            padding: 30px 20px;
            position: relative;
        }

        h1 {
            font-size: 2rem;
            margin: 0;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 
                0 0 5px var(--primary),
                0 0 10px var(--primary),
                0 0 20px var(--secondary);
            animation: glitch 3s infinite;
            position: relative;
            display: inline-block;
        }

        @keyframes glitch {
            0% { text-shadow: 0 0 5px var(--primary), 0 0 10px var(--primary); }
            95% { text-shadow: 0 0 5px var(--primary), 0 0 10px var(--primary); }
            96% { text-shadow: 2px 0 5px var(--secondary), -2px 0 5px var(--primary); transform: skewX(10deg); }
            97% { text-shadow: -2px 0 5px var(--secondary), 2px 0 5px var(--primary); transform: skewX(-10deg); }
            98% { text-shadow: 0 0 5px var(--primary), 0 0 10px var(--primary); transform: skewX(0); }
            100% { text-shadow: 0 0 5px var(--primary), 0 0 10px var(--primary); }
        }

        .subtitle {
            color: var(--primary);
            font-size: 0.8rem;
            letter-spacing: 2px;
            margin-top: 10px;
            opacity: 0.8;
        }

        /* 容器与卡片 */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 15px 80px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            animation: slide 3s infinite;
        }

        @keyframes slide {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .card-title {
            color: var(--primary);
            font-size: 1.2rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(0, 243, 255, 0.5);
        }

        .card-title i { margin-right: 10px; font-style: normal; }

        /* 输入框与按钮优化 */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input, select {
            flex: 1;
            padding: 14px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            color: #fff;
            border-radius: 8px;
            outline: none;
            font-size: 16px;
            transition: all 0.3s;
        }

        input:focus {
            border-color: var(--secondary);
            box-shadow: 0 0 10px rgba(188, 19, 254, 0.3);
        }

        button {
            padding: 14px 24px;
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            border: none;
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            white-space: nowrap;
        }

        button:active {
            transform: scale(0.95);
        }

        button::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button:active::after {
            width: 300px; height: 300px;
        }

        /* 列表样式 */
        .list-container {
            max-height: 400px;
            overflow-y: auto;
            padding-right: 5px;
        }

        /* 自定义滚动条 */
        .list-container::-webkit-scrollbar { width: 6px; }
        .list-container::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); border-radius: 3px; }
        .list-container::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }

        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: all 0.2s;
            border-radius: 8px;
            margin-bottom: 5px;
        }

        .item:hover {
            background: rgba(0, 243, 255, 0.1);
            transform: translateX(5px);
        }

        .item-info {
            flex: 1;
            overflow: hidden;
        }

        .item-name { 
            font-weight: bold; 
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 1rem;
        }

        .item-meta { 
            font-size: 0.75rem; 
            color: #aaa; 
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .action-btn {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 8px 16px;
            font-size: 0.85rem;
            min-width: 80px;
            text-align: center;
        }
        
        .action-btn.danger {
            border-color: #ff4444;
            color: #ff4444;
        }

        /* 播放器样式 */
        .player-wrapper {
            margin-top: 20px;
            background: rgba(0,0,0,0.5);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        audio, video {
            width: 100%;
            border-radius: 8px;
            outline: none;
        }
        
        /* 强化音频控件在手机上的表现 */
        audio::-webkit-media-controls-panel {
            background-color: rgba(30, 30, 50, 0.9);
        }

        .now-playing {
            text-align: center;
            margin-bottom: 10px;
            color: var(--accent);
            font-size: 0.9rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        /* 模态框 (密码/后台) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: #1a1a2e;
            border: 1px solid var(--primary);
            padding: 30px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.2);
            text-align: center;
        }

        .modal h2 { margin-top: 0; color: var(--primary); }

        .admin-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            border: 1px solid var(--primary);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            z-index: 900;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
        }

        /* 标签页切换 */
        .tabs {
            display: flex;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            color: #888;
            transition: 0.3s;
            border-bottom: 2px solid transparent;
        }
        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
            font-weight: bold;
        }

        /* 响应式调整 */
        @media (max-width: 600px) {
            h1 { font-size: 1.6rem; }
            .input-group { flex-direction: column; }
            button { width: 100%; }
            .item { flex-direction: column; align-items: flex-start; gap: 10px; }
            .action-btn { width: 100%; }
        }
    </style>
</head>
<body>

<div class="cyber-bg"></div>

<header>
    <h1>尐念·科技影音站</h1>
    <div class="subtitle">QING NAN LIU // TECH & MEDIA STATION</div>
</header>

<div class="container">

    <!-- 音乐模块 -->
    <div class="card">
        <div class="card-title">🎵 全球音乐搜索</div>
        <div class="input-group">
            <input type="text" id="music-input" placeholder="输入歌名、歌手...">
            <button onclick="searchMusic()">搜索</button>
        </div>
        
        <div class="player-wrapper" id="music-player-box" style="display:none;">
            <div class="now-playing" id="now-playing-text">准备播放...</div>
            <audio id="audio-player" controls></audio>
        </div>

        <div class="list-container" id="music-results" style="margin-top: 20px;">
            <!-- 提示信息 -->
            <div style="text-align:center; color:#ff4444; padding:20px; background:rgba(255,68,68,0.1); border-radius:8px;">
                <strong>搜索服务暂时不可用</strong><br>
                可能是网络波动或 API 限制
            </div>
        </div>
    </div>

    <!-- 视频模块 -->
    <div class="card">
        <div class="card-title">🎬 沉浸式影院</div>
        <div class="tabs">
            <div class="tab active" onclick="switchVideoTab('link')">链接播放</div>
            <div class="tab" onclick="switchVideoTab('demo')">演示片源</div>
        </div>

        <div id="video-link-panel">
            <div class="input-group">
                <input type="text" id="video-input" placeholder="粘贴 .mp4 或 .m3u8 链接...">
                <button onclick="playVideo()">播放</button>
            </div>
        </div>

        <div id="video-demo-panel" style="display:none;">
            <div class="list-container">
                <!-- 新增的美女/风景视频 -->
                <div class="item" onclick="loadDemoVideo('https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4', '火辣美女')">
                    <div class="item-info">
                        <div class="item-name">🔥 火辣美女 (ForBiggerBlazes)</div>
                        <div class="item-meta">4K Demo | 15s</div>
                    </div>
                    <button class="action-btn">播放</button>
                </div>
                <div class="item" onclick="loadDemoVideo('https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerEscapes.mp4', '海岛女神')">
                    <div class="item-info">
                        <div class="item-name">🏝️ 海岛女神 (ForBiggerEscapes)</div>
                        <div class="item-meta">4K Demo | 20s</div>
                    </div>
                    <button class="action-btn">播放</button>
                </div>
                <div class="item" onclick="loadDemoVideo('https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/Sintel.mp4', '奇幻美女')">
                    <div class="item-info">
                        <div class="item-name">🧙 奇幻美女 (Sintel)</div>
                        <div class="item-meta">开源电影 | 8min</div>
                    </div>
                    <button class="action-btn">播放</button>
                </div>
                <!-- 原有的备用视频 -->
                <div class="item" onclick="loadDemoVideo('https://www.w3schools.com/html/mov_bbb.mp4', '大雄兔')">
                    <div class="item-info">
                        <div class="item-name">🐰 大雄兔 (Big Buck Bunny)</div>
                        <div class="item-meta">开源动画 | 10min</div>
                    </div>
                    <button class="action-btn">播放</button>
                </div>
            </div>
        </div>

        <div class="player-wrapper">
            <video id="video-player" controls poster="https://via.placeholder.com/800x450/000000/00f3ff?text=READY+TO+PLAY"></video>
        </div>
    </div>

    <!-- 网盘资源模块 -->
    <div class="card">
        <div class="card-title">☁️ 云端资源库</div>
        <div class="list-container" id="cloud-list">
            <!-- 动态加载 -->
        </div>
    </div>

</div>

<!-- 后台管理按钮 -->
<div class="admin-toggle" onclick="openAdminLogin()">⚙️</div>

<!-- 密码验证模态框 -->
<div id="login-modal" class="modal">
    <div class="modal-content">
        <h2>系统安全验证</h2>
        <p style="color:#aaa; font-size:0.9rem;">请输入管理员密码</p>
        <input type="password" id="admin-pwd" placeholder="Password" style="width:100%; margin: 15px 0;">
        <button onclick="checkPassword()" style="width:100%;">进入系统</button>
        <button onclick="closeModal('login-modal')" style="background:transparent; border:1px solid #666; margin-top:10px; width:100%;">取消</button>
    </div>
</div>

<!-- 后台管理面板模态框 -->
<div id="admin-modal" class="modal">
    <div class="modal-content" style="max-width: 500px; text-align: left;">
        <h2 style="text-align: center;">🛠️ 资源管理后台</h2>
        
        <div style="margin-bottom: 20px;">
            <label style="color:var(--primary); display:block; margin-bottom:5px;">添加网盘资源</label>
            <input type="text" id="res-name" placeholder="资源名称 (例：精选合集)" style="margin-bottom:10px;">
            <input type="text" id="res-url" placeholder="分享链接 (例：pan.baidu.com...)" style="margin-bottom:10px;">
            <select id="res-type" style="margin-bottom:10px; width:100%; padding:12px; background:rgba(0,0,0,0.4); color:#fff; border:1px solid var(--border); border-radius:8px;">
                <option value="baidu">百度网盘</option>
                <option value="ali">阿里云盘</option>
                <option value="quark">夸克网盘</option>
                <option value="other">其他链接</option>
            </select>
            <button onclick="addResource()" style="width:100%;">添加资源</button>
        </div>

        <div style="border-top:1px solid #333; padding-top:15px;">
