<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>心念 · 超维空间 | 赛博纪元</title>
    <style>
        /* ===== 科技感重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Share Tech Mono', 'Courier New', monospace;
        }

        body {
            background: #0a0c0f;
            color: #c0e0ff;
            line-height: 1.5;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* 动态背景网格 + 扫描线 */
        .cyber-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -2;
            pointer-events: none;
        }

        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 10px;
            background: linear-gradient(to bottom, transparent, rgba(0, 255, 255, 0.4), transparent);
            animation: scan 6s linear infinite;
            z-index: -1;
            opacity: 0.5;
        }

        @keyframes scan {
            0% { top: -10%; }
            100% { top: 110%; }
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 2;
        }

        /* 标题区 */
        .header {
            text-align: center;
            margin: 30px 0 40px;
            position: relative;
        }

        h1 {
            font-size: 3.2rem;
            font-weight: 400;
            letter-spacing: 8px;
            text-transform: uppercase;
            text-shadow: 0 0 10px cyan, 0 0 20px blue, 0 0 30px purple;
            color: white;
            animation: flicker 3s infinite;
        }

        @keyframes flicker {
            0% { opacity: 1; text-shadow: 0 0 10px cyan, 0 0 20px blue; }
            50% { opacity: 0.95; text-shadow: 0 0 12px magenta, 0 0 25px cyan; }
            100% { opacity: 1; text-shadow: 0 0 10px cyan, 0 0 20px blue; }
        }

        .subhead {
            color: #6cf;
            font-size: 1rem;
            letter-spacing: 2px;
            margin-top: -10px;
            border-bottom: 1px solid cyan;
            display: inline-block;
            padding-bottom: 5px;
        }

        /* 卡片通用样式 — 全息投影 + 霓虹边框 */
        .card {
            background: rgba(10, 20, 30, 0.7);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2), inset 0 0 20px rgba(0, 255, 255, 0.1);
            padding: 20px;
            margin-bottom: 30px;
            position: relative;
            transition: 0.3s;
            clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
        }

        .card:hover {
            border-color: magenta;
            box-shadow: 0 0 30px magenta, inset 0 0 30px rgba(255, 0, 255, 0.2);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, cyan, magenta, transparent);
            animation: glowPulse 2s infinite;
        }

        @keyframes glowPulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            border-bottom: 1px dashed rgba(0, 255, 255, 0.5);
            padding-bottom: 10px;
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 400;
            color: cyan;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .status {
            font-size: 0.7rem;
            background: #0a1a2a;
            padding: 2px 8px;
            border: 1px solid cyan;
            border-radius: 20px;
            color: cyan;
        }

        /* 输入框和按钮 */
        .input-group {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }

        .cyber-input {
            background: #0a121c;
            border: 1px solid #2c5f7a;
            color: cyan;
            padding: 10px 15px;
            flex: 1;
            font-size: 0.9rem;
            transition: 0.2s;
            caret-color: magenta;
        }

        .cyber-input:focus {
            border-color: magenta;
            box-shadow: 0 0 15px magenta;
            outline: none;
        }

        .cyber-btn {
            background: transparent;
            border: 1px solid cyan;
            color: cyan;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.2s;
            box-shadow: 0 0 10px cyan;
            white-space: nowrap;
        }

        .cyber-btn:hover {
            background: cyan;
            color: #000;
            box-shadow: 0 0 30px cyan;
        }

        /* 书库网格 */
        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 5px;
            margin-top: 15px;
        }

        .book-item {
            background: rgba(0, 30, 40, 0.6);
            border: 1px solid #0ff;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .book-item:hover {
            border-color: magenta;
            transform: translateY(-2px);
            box-shadow: 0 0 20px magenta;
        }

        .book-cover {
            width: 100%;
            aspect-ratio: 3/4;
            background: #112233;
            object-fit: cover;
            border: 1px solid #0ff;
            margin-bottom: 5px;
        }

        .book-title {
            font-size: 0.8rem;
            color: white;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .book-author {
            font-size: 0.65rem;
            color: #6cf;
        }

        /* 音乐播放器 */
        .music-tabs {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }

        .tab {
            padding: 5px 15px;
            border: 1px solid cyan;
            color: cyan;
            cursor: pointer;
            transition: 0.2s;
        }

        .tab.active {
            background: cyan;
            color: black;
            font-weight: bold;
            box-shadow: 0 0 20px cyan;
        }

        .player-ui {
            background: #0a141e;
            border: 1px solid cyan;
            padding: 15px;
            margin: 15px 0;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .play-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid cyan;
            background: transparent;
            color: cyan;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .play-btn:hover {
            background: cyan;
            color: black;
            box-shadow: 0 0 30px cyan;
        }

        .track-info {
            flex: 1;
        }

        .track-name {
            font-size: 1rem;
            color: #fff;
            margin-bottom: 5px;
        }

        .progress-area {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .progress-bg {
            flex: 1;
            height: 6px;
            background: #1a2a3a;
            border: 1px solid #3cf;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, cyan, magenta);
            box-shadow: 0 0 10px cyan;
        }

        .music-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .music-item {
            display: flex;
            align-items: center;
            padding: 8px;
            border-bottom: 1px solid rgba(0,255,255,0.2);
            cursor: pointer;
        }

        .music-item:hover {
            background: rgba(0,255,255,0.1);
        }

        .music-cover {
            width: 40px;
            height: 40px;
            object-fit: cover;
            margin-right: 10px;
            border: 1px solid cyan;
        }

        .music-meta {
            flex: 1;
        }

        .music-title {
            font-size: 0.9rem;
            color: white;
        }

        .music-artist {
            font-size: 0.7rem;
            color: #6cf;
        }

        .music-play {
            border: 1px solid cyan;
            padding: 3px 10px;
            font-size: 0.7rem;
            color: cyan;
        }

        /* 视频网格 */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .video-card {
            aspect-ratio: 16/9;
            background: #000;
            border: 1px solid cyan;
            position: relative;
            cursor: pointer;
            overflow: hidden;
        }

        .video-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.7;
            transition: 0.3s;
        }

        .video-card:hover img {
            opacity: 1;
            transform: scale(1.1);
        }

        .video-card .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: cyan;
            text-shadow: 0 0 20px magenta;
        }

        /* 文件传输 */
        .drop-zone {
            border: 2px dashed cyan;
            padding: 30px;
            text-align: center;
            margin: 15px 0;
            cursor: pointer;
            transition: 0.2s;
        }

        .drop-zone.dragover {
            border-color: magenta;
            background: rgba(255,0,255,0.1);
        }

        .file-list {
            max-height: 150px;
            overflow-y: auto;
        }

        .file-item {
            background: #0a141e;
            border-left: 3px solid cyan;
            padding: 8px;
            margin: 5px 0;
            font-size: 0.8rem;
            display: flex;
            flex-direction: column;
        }

        .file-row {
            display: flex;
            justify-content: space-between;
        }

        .file-progress {
            height: 3px;
            background: #1a2a3a;
            margin-top: 5px;
        }

        .file-progress-fill {
            height: 100%;
            background: cyan;
            width: 0%;
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #0a121c;
            border: 2px solid cyan;
            padding: 20px;
            max-width: 800px;
            width: 90%;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            border-bottom: 1px solid cyan;
            padding-bottom: 10px;
        }

        .close-btn {
            background: none;
            border: none;
            color: cyan;
            font-size: 2rem;
            cursor: pointer;
        }

        video, iframe {
            width: 100%;
            height: 400px;
            border: none;
        }

        /* 系统终端入口 */
        .admin-entry {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            border: 1px solid magenta;
            cursor: pointer;
            transition: 0.2s;
        }

        .admin-entry:hover {
            background: rgba(255,0,255,0.1);
            box-shadow: 0 0 30px magenta;
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #0a1a2a;
        }

        ::-webkit-scrollbar-thumb {
            background: cyan;
            border-radius: 3px;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
            .input-group { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="cyber-bg"></div>
    <div class="scan-line"></div>

    <div class="container">
        <div class="header">
            <h1>心念 · 超维空间</h1>
            <div class="subhead">// 赛博纪元 // 接入系统 //</div>
        </div>

        <!-- 云端书库 -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">📡 云端书库接入点</span>
                <span class="status">ONLINE</span>
            </div>
            <div class="input-group">
                <input type="text" class="cyber-input" id="bookSearchInput" placeholder="输入书名 (如：三体，红楼梦)...">
                <button class="cyber-btn" onclick="searchBooks()">检索</button>
            </div>
            <div id="bookResults" class="book-grid">
                <div style="grid-column:1/-1; text-align:center; color:#6cf; padding:20px;">等待指令...</div>
            </div>
        </div>

        <!-- 音频解码终端 -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">🎧 音频解码终端</span>
                <span class="status">ACTIVE</span>
            </div>
            <div class="music-tabs">
                <div class="tab active" onclick="switchTab('playlist')">精选歌单</div>
                <div class="tab" onclick="switchTab('search')">网络搜索</div>
            </div>
            <div id="searchBox" style="display:none;" class="input-group">
                <input type="text" class="cyber-input" id="musicSearchInput" placeholder="搜索歌手或歌曲...">
                <button class="cyber-btn" onclick="searchMusic()">搜索</button>
            </div>

            <div class="player-ui">
                <button class="play-btn" id="playPauseBtn" onclick="toggleMusic()">▶</button>
                <div class="track-info">
                    <div id="trackName" class="track-name">未选择音源</div>
                    <div class="progress-area" id="progressArea" onclick="seekMusic(event)">
                        <span id="currentTime">0:00</span>
                        <div class="progress-bg">
                            <div class="progress-fill" id="progressBar"></div>
                        </div>
                        <span id="duration">0:00</span>
                    </div>
                </div>
            </div>

            <div id="musicListContainer" class="music-list"></div>
            <audio id="audioPlayer"></audio>
        </div>

        <!-- 全息影像回放 -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">📽️ 全息影像回放</span>
                <span class="status">STREAM</span>
            </div>
            <div class="input-group">
                <input type="text" class="cyber-input" id="videoUrlInput" placeholder="粘贴网络视频链接 (.mp4)...">
                <button class="cyber-btn" onclick="playCustomVideo()">立即点播</button>
            </div>
            <div class="video-grid">
                <div class="video-card" onclick="openVideo('https://test-videos.co.uk/vids/bigbuckbunny/mp4/h264/720/Big_Buck_Bunny_720_10s_1MB.mp4')">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Big_buck_bunny_poster_big.jpg/800px-Big_buck_bunny_poster_big.jpg" alt="Big Buck Bunny">
                    <div class="overlay">▶</div>
                </div>
                <div class="video-card" onclick="openVideo('https://test-videos.co.uk/vids/sintel/mp4/h264/720/Sintel_720_10s_1MB.mp4')">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/82/Sintel_poster.jpg/800px-Sintel_poster.jpg" alt="Sintel">
                    <div class="overlay">▶</div>
                </div>
                <div class="video-card" onclick="openVideo('https://test-videos.co.uk/vids/tearsofsteel/mp4/h264/720/Tears_of_Steel_720_10s_1MB.mp4')">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d4/Tears_of_Steel_poster.jpg/800px-Tears_of_Steel_poster.jpg" alt="Tears of Steel">
                    <div class="overlay">▶</div>
                </div>
                <div class="video-card" onclick="openVideo('https://test-videos.co.uk/vids/jellyfish/mp4/h264/720/Jellyfish_720_10s_1MB.mp4')">
                    <img src="https://images.unsplash.com/photo-1544551763-46a8723ba3f9?ixlib=rb-1.2.1&auto=format&fit=crop&w=600&q=80" alt="Ocean">
                    <div class="overlay">▶</div>
                </div>
            </div>
        </div>

        <!-- 量子文件传输 -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">📁 量子文件传输</span>
                <span class="status">ENCRYPTED</span>
            </div>
            <div class="drop-zone" id="dropZone">
                <div style="font-size:3rem;">📡</div>
                <p>拖拽文件至此 或 点击选择</p>
                <p style="font-size:0.7rem; opacity:0.7;">支持任意格式 | 加密通道 (模拟)</p>
                <input type="file" id="fileInput" hidden multiple>
            </div>
            <div class="file-list" id="fileList"></div>
        </div>

        <!-- 系统管理终端入口 -->
        <div class="admin-entry" onclick="openAdmin()">
            <span style="color:magenta;">⚡ 系统管理终端 [受限访问] ⚡</span>
        </div>
    </div>

    <!-- 视频模态框 -->
    <div class="modal" id="videoModal" onclick="if(event.target===this) closeVideo()">
        <div class="modal-content">
            <div class="modal-header">
                <span style="color:cyan;">▶ 全息播放</span>
                <button class="close-btn" onclick="closeVideo()">×</button>
            </div>
            <video id="mainVideo" controls></video>
        </div>
    </div>

    <!-- 书籍模态框 -->
    <div class="modal" id="bookModal">
        <div class="modal-content" style="max-width:900px;">
            <div class="modal-header">
                <span id="bookModalTitle" style="color:cyan;">阅读中</span>
                <div>
                    <button class="cyber-btn" onclick="openBookInNewWindow()" style="margin-right:5px;">新窗口</button>
                    <button class="close-btn" onclick="closeBook()">×</button>
                </div>
            </div>
            <iframe id="bookFrame" style="width:100%; height:70vh; background:white;"></iframe>
        </div>
    </div>

    <!-- 后台登录模态框 -->
    <div class="modal" id="adminModal">
        <div class="modal-content" style="max-width:400px;">
            <div class="modal-header">
                <span style="color:magenta;">🔐 身份验证</span>
                <button class="close-btn" onclick="closeAdmin()">×</button>
            </div>
            <input type="password" id="adminPass" class="cyber-input" placeholder="输入访问密钥">
            <button class="cyber-btn" style="width:100%; margin-top:15px;" onclick="checkAdmin()">解锁</button>
        </div>
    </div>

    <script>
        (function() {
            // 转义函数
            function escapeHtml(unsafe) {
                if (!unsafe) return '';
                return unsafe
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#039;");
            }

            // ---------- 1. 书籍 ----------
            const LOCAL_BOOKS = [
                { title: "三体", author: "刘慈欣", cover: "https://img1.doubanio.com/view/subject/l/public/s27694137.jpg", url: "https://www.yibige.org/161846/" },
                { title: "红楼梦", author: "曹雪芹", cover: "https://img1.doubanio.com/view/subject/l/public/s1070959.jpg", url: "https://www.yibige.org/1995/" },
                { title: "黑客与画家", author: "Paul Graham", cover: "https://img1.doubanio.com/view/subject/l/public/s4694383.jpg", url: "https://www.yibige.org/52645/" },
                { title: "赛博朋克 2077", author: "迈克·庞德史密斯", cover: "https://img1.doubanio.com/view/subject/l/public/s3221697.jpg", url: "https://www.yibige.org/12345/" },
                { title: "基地", author: "阿西莫夫", cover: "https://img1.doubanio.com/view/subject/l/public/s2347558.jpg", url: "https://www.yibige.org/3456/" },
                { title: "神经漫游者", author: "威廉·吉布森", cover: "https://img1.doubanio.com/view/subject/l/public/s2347559.jpg", url: "https://www.yibige.org/7890/" }
            ];

            window.searchBooks = function() {
                const query = document.getElementById('bookSearchInput').value;
                const resultDiv = document.getElementById('bookResults');
                if(!query) { alert('请输入搜索关键词'); return; }
                
                resultDiv.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:cyan;">正在检索数据库...</div>';

                setTimeout(() => {
                    const filtered = LOCAL_BOOKS.filter(b => b.title.includes(query) || b.author.includes(query));
                    if(filtered.length === 0) {
                        resultDiv.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:#6cf;">未找到相关书籍</div>';
                    } else {
                        let html = '';
                        filtered.forEach(book => {
                            const safeTitle = escapeHtml(book.title);
                            const safeAuthor = escapeHtml(book.author);
                            const safeCover = escapeHtml(book.cover);
                            const safeUrl = escapeHtml(book.url);
                            html += `
                                <div class="book-item" onclick="openBook('${safeTitle.replace(/'/g, "&apos;")}', '${safeUrl.replace(/'/g, "&apos;")}')">
                                    <img src="${safeCover}" class="book-cover" onerror="this.src='https://via.placeholder.com/150x200?text=No+Cover'">
                                    <div class="book-title">${safeTitle}</div>
                                    <div class="book-author">${safeAuthor}</div>
                                </div>
                            `;
                        });
                        resultDiv.innerHTML = html;
                    }
                }, 500);
            };

            let currentBookUrl = '';
            window.openBook = function(title, url) {
                document.getElementById('bookModalTitle').innerText = title;
                document.getElementById('bookFrame').src = url;
                document.getElementById('bookModal').style.display = 'flex';
                currentBookUrl = url;
            };

            window.closeBook = function() {
                document.getElementById('bookModal').style.display = 'none';
                document.getElementById('bookFrame').src = 'about:blank';
            };

            window.openBookInNewWindow = function() {
                if (currentBookUrl) {
                    window.open(currentBookUrl, '_blank');
                } else {
                    alert('没有可打开的链接');
                }
            };

            // ---------- 2. 音乐 ----------
            const audio = document.getElementById('audioPlayer');
            const playBtn = document.getElementById('playPauseBtn');
            const trackName = document.getElementById('trackName');
            const progressBar = document.getElementById('progressBar');
            const currentTimeEl = document.getElementById('currentTime');
            const durationEl = document.getElementById('duration');
            const listContainer = document.getElementById('musicListContainer');
            let isPlaying = false;

            const PLAYLIST = [
                { title: "Cyberpunk City", artist: "Lexin", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", cover: "https://images.unsplash.com/photo-1515630278258-407f66498911?w=100" },
                { title: "Neon Night", artist: "Kai Engel", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3", cover: "https://images.unsplash.com/photo-1493225255756-d9584f8606e9?w=100" },
                { title: "Future Bass", artist: "Qube", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3", cover: "https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=100" },
                { title: "Deep Space", artist: "Holizna", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3", cover: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=100" },
                { title: "Robot Rock", artist: "Audionautix", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3", cover: "https://images.unsplash.com/photo-1514525253440-b393452e8d26?w=100" }
            ];

            function renderPlaylist() {
                let html = '';
                PLAYLIST.forEach(song => {
                    const safeTitle = escapeHtml(song.title);
                    const safeArtist = escapeHtml(song.artist);
                    const safeCover = escapeHtml(song.cover);
                    const safeUrl = escapeHtml(song.url);
                    html += `
                        <div class="music-item" onclick="playMusicUrl('${safeUrl.replace(/'/g, "&apos;")}', '${safeTitle} - ${safeArtist}')">
                            <img src="${safeCover}" class="music-cover">
                            <div class="music-meta">
                                <div class="music-title">${safeTitle}</div>
                                <div class="music-artist">${safeArtist}</div>
                            </div>
                            <div class="music-play">播放</div>
                        </div>
                    `;
                });
                listContainer.innerHTML = html;
            }

            window.switchTab = function(tab) {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                if (tab === 'playlist') {
                    document.querySelectorAll('.tab')[0].classList.add('active');
                    document.getElementById('searchBox').style.display = 'none';
                    renderPlaylist();
                } else {
                    document.querySelectorAll('.tab')[1].classList.add('active');
                    document.getElementById('searchBox').style.display = 'flex';
                    listContainer.innerHTML = '<div style="padding:20px; text-align:center; color:#6cf;">请输入关键词搜索</div>';
                }
            };

            function formatTime(seconds) {
                if (isNaN(seconds)) return '0:00';
                const m = Math.floor(seconds/60);
                const s = Math.floor(seconds%60);
                return m+':'+(s<10?'0'+s:s);
            }

            window.searchMusic = async function() {
                const query = document.getElementById('musicSearchInput').value;
                if(!query) return alert('输入关键词');
                listContainer.innerHTML = '<div style="padding:10px; text-align:center;">搜索中...</div>';
                try {
                    const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&media=music&limit=10`);
                    const data = await res.json();
                    if(data.resultCount>0) {
                        let html = '';
                        data.results.forEach(song => {
                            if(!song.previewUrl) return;
                            const name = song.trackName || '未知';
                            const artist = song.artistName || '未知';
                            const cover = song.artworkUrl100 ? song.artworkUrl100.replace('100x100','200x200') : '';
                            html += `
                                <div class="music-item" onclick="playMusicUrl('${song.previewUrl}', '${escapeHtml(name)} - ${escapeHtml(artist)}')">
                                    <img src="${cover}" class="music-cover" onerror="this.src='https://via.placeholder.com/40?text=Music'">
                                    <div class="music-meta">
                                        <div class="music-title">${escapeHtml(name)}</div>
                                        <div class="music-artist">${escapeHtml(artist)}</div>
                                    </div>
                                    <div class="music-play">试听</div>
                                </div>
                            `;
                        });
                        listContainer.innerHTML = html || '<div>无试听</div>';
                    } else {
                        listContainer.innerHTML = '<div>未找到</div>';
                    }
                } catch {
                    listContainer.innerHTML = '<div>网络错误</div>';
                }
            };

            window.playMusicUrl = function(url, name) {
                audio.src = url;
                trackName.innerText = name;
                audio.play().then(() => {
                    isPlaying = true;
                    playBtn.innerText = '⏸';
                }).catch(() => alert('播放失败'));
            };

            window.toggleMusic = function() {
                if(!audio.src) return alert('先选歌曲');
                if(isPlaying) {
                    audio.pause();
                    playBtn.innerText = '▶';
                } else {
                    audio.play();
                    playBtn.innerText = '⏸';
                }
                isPlaying = !isPlaying;
            };

            audio.addEventListener('timeupdate', () => {
                if(audio.duration) {
                    progressBar.style.width = (audio.currentTime/audio.duration*100)+'%';
                    currentTimeEl.innerText = formatTime(audio.currentTime);
                    durationEl.innerText = formatTime(audio.duration);
                }
            });
            audio.addEventListener('ended', () => {
                playBtn.innerText = '▶';
                isPlaying = false;
                progressBar.style.width = '0%';
                currentTimeEl.innerText = '0:00';
            });

            window.seekMusic = function(e) {
                const bg = document.querySelector('.progress-bg');
                const rect = bg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                if(audio.duration && x>=0 && x<=rect.width) {
                    audio.currentTime = (x/rect.width)*audio.duration;
                }
            };

            renderPlaylist();

            // ---------- 3. 视频 ----------
            window.openVideo = function(url) {
                const modal = document.getElementById('videoModal');
                const video = document.getElementById('mainVideo');
                video.src = url;
                modal.style.display = 'flex';
                video.play();
            };
            window.playCustomVideo = function() {
                const url = document.getElementById('videoUrlInput').value;
                if(url) openVideo(url);
                else alert('输入链接');
            };
            window.closeVideo = function() {
                const modal = document.getElementById('videoModal');
                const video = document.getElementById('mainVideo');
                video.pause();
                video.src = '';
                modal.style.display = 'none';
            };

            // ---------- 4. 文件传输 ----------
            const dropZone = document.getElementById('dropZone');
            const fileInput = document.getElementById('fileInput');
            const fileListDiv = document.getElementById('fileList');

            dropZone.addEventListener('click', () => fileInput.click());
            dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
            dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
                handleFiles(e.dataTransfer.files);
            });
            fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

            function handleFiles(files) {
                Array.from(files).forEach(file => {
                    const item = document.createElement('div');
                    item.className = 'file-item';
                    item.innerHTML = `
                        <div class="file-row">
                            <span>${escapeHtml(file.name)} (${(file.size/1024).toFixed(1)} KB)</span>
                            <span style="color:cyan;">上传中</span>
                        </div>
                        <div class="file-progress"><div class="file-progress-fill" style="width:0%"></div></div>
                    `;
                    fileListDiv.prepend(item);
                    const fill = item.querySelector('.file-progress-fill');
                    let w = 0;
                    const interval = setInterval(() => {
                        if(w>=100) {
                            clearInterval(interval);
                            item.querySelector('.file-row span:last-child').innerText = '完成';
                        } else {
                            w += Math.random()*10;
                            if(w>100) w=100;
                            fill.style.width = w+'%';
                        }
                    }, 200);
                });
            }

            // ---------- 5. 后台管理 (密码 qingnanliu) ----------
            window.openAdmin = function() {
                document.getElementById('adminModal').style.display = 'flex';
            };
            window.closeAdmin = function() {
                document.getElementById('adminModal').style.display = 'none';
            };
            window.checkAdmin = function() {
                const pass = document.getElementById('adminPass').value;
                if(pass === 'qingnanliu') {
                    alert('✅ 权限验证通过');
                    document.getElementById('adminModal').style.display = 'none';
                } else {
                    alert('❌ 密钥错误');
                }
            };

            // 点击模态背景关闭
            document.querySelectorAll('.modal').forEach(m => {
                m.addEventListener('click', function(e) {
                    if(e.target === this) this.style.display = 'none';
                });
            });
        })();
    </script>
</body>
</html>
