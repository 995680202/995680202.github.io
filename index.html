<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>尐念·超维空间 | 优化版</title>
    <style>
        :root {
            --bg-color: #000205;
            --card-bg: rgba(6, 12, 24, 0.9);
            --primary: #00f9ff;
            --secondary: #bc13fe;
            --accent: #ffe600;
            --text-main: #e0f7fa;
            --text-dim: #5c7c8a;
            --font-tech: 'Courier New', Courier, monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
            transition: border 0.3s ease;
        }
        body.admin-unlocked {
            border: 4px solid var(--accent);
        }

        .cyber-grid {
            position: fixed; top: 0; left: 0; width: 200%; height: 200%;
            background-image: 
                linear-gradient(rgba(0, 249, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 249, 255, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
            animation: gridMove 20s linear infinite;
            z-index: -2;
            pointer-events: none;
        }
        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(40px) translateZ(-200px); }
        }
        .scan-line {
            position: fixed; top: 0; left: 0; width: 100%; height: 5px;
            background: rgba(0, 249, 255, 0.3);
            opacity: 0.5;
            animation: scan 3s linear infinite;
            z-index: -1;
            pointer-events: none;
            box-shadow: 0 0 15px var(--primary);
        }
        @keyframes scan {
            0% { top: -10%; opacity: 0; }
            50% { opacity: 0.5; }
            100% { top: 110%; opacity: 0; }
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid var(--primary);
            position: relative;
            background: linear-gradient(180deg, rgba(0,249,255,0.1) 0%, transparent 100%);
            clip-path: polygon(0 0, 100% 0, 100% 80%, 50% 100%, 0 80%);
            margin-bottom: 20px;
        }
        h1 {
            font-family: var(--font-tech);
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #fff;
            text-shadow: 0 0 10px var(--primary), 0 0 20px var(--primary);
            display: inline-block;
        }
        h1::after {
            content: 'SYSTEM ONLINE';
            position: absolute;
            bottom: -20px; left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            color: var(--primary);
            letter-spacing: 2px;
            white-space: nowrap;
        }

        .hud-card {
            background: var(--card-bg);
            border: 1px solid rgba(0, 249, 255, 0.3);
            position: relative;
            padding: 20px;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
        }
        .hud-card::before {
            content: '';
            position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            animation: glowLine 2s infinite;
        }
        @keyframes glowLine { 0% { opacity: 0.3; } 50% { opacity: 1; box-shadow: 0 0 10px var(--primary); } 100% { opacity: 0.3; } }

        .card-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }
        .card-title {
            font-family: var(--font-tech);
            color: var(--primary);
            font-size: 1.2rem;
            font-weight: bold;
            display: flex; align-items: center; gap: 10px;
        }
        .status-dot {
            width: 8px; height: 8px; background: var(--primary);
            border-radius: 50%; box-shadow: 0 0 5px var(--primary);
            animation: blink 1s infinite;
        }
        @keyframes blink { 50% { opacity: 0.3; } }

        input[type="text"], input[type="password"] {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--text-dim);
            color: var(--primary);
            padding: 10px 15px;
            font-family: var(--font-tech);
            width: 100%;
            margin-bottom: 10px;
            transition: 0.3s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0, 249, 255, 0.2); }

        .btn-cyber {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 8px 20px;
            font-family: var(--font-tech);
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-cyber:hover { background: var(--primary); color: #000; box-shadow: 0 0 20px var(--primary); }
        .btn-accent { border-color: var(--accent); color: var(--accent); }
        .btn-accent:hover { background: var(--accent); color: #000; }

        .book-list {
            max-height: 300px; overflow-y: auto;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px; padding-right: 5px;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }

        .book-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px; cursor: pointer;
            transition: 0.3s; text-align: center;
        }
        .book-item:hover { border-color: var(--secondary); background: rgba(188, 19, 254, 0.1); transform: translateY(-3px); }
        .book-cover { width: 100%; aspect-ratio: 3/4; background: #222; margin-bottom: 8px; object-fit: cover; border: 1px solid #444; }
        .book-title { font-size: 0.9rem; color: #fff; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .book-author { font-size: 0.7rem; color: var(--text-dim); }

        .music-tabs {
            display: flex; gap: 10px; margin-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }
        .music-tab {
            flex: 1; text-align: center; padding: 8px;
            cursor: pointer; color: var(--text-dim);
            transition: 0.3s; font-family: var(--font-tech);
            font-size: 0.9rem;
        }
        .music-tab.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
            font-weight: bold;
            text-shadow: 0 0 5px var(--primary);
        }

        .music-search-box {
            display: flex; gap: 10px; margin-bottom: 15px;
        }
        .music-player-ui {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            border: 1px solid rgba(0, 249, 255, 0.2);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .control-row {
            display: flex; align-items: center; gap: 15px;
        }
        .play-btn-lg {
            width: 50px; height: 50px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            background: transparent;
            color: var(--primary);
            cursor: pointer;
            font-size: 1.5rem;
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
            flex-shrink: 0;
        }
        .play-btn-lg:hover { background: var(--primary); color: #000; box-shadow: 0 0 15px var(--primary); }
        
        .track-info { flex: 1; min-width: 0; }
        .track-name { color: #fff; font-size: 1rem; margin-bottom: 5px; font-family: var(--font-tech); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .progress-area {
            width: 100%; display: flex; align-items: center; gap: 10px;
            font-size: 0.75rem; color: var(--text-dim);
            font-family: var(--font-tech); cursor: pointer;
        }
        .progress-bar-bg {
            flex: 1; height: 6px; background: #333;
            border-radius: 3px; position: relative;
            overflow: hidden; border: 1px solid #555;
        }
        .progress-bar-fill {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            box-shadow: 0 0 10px var(--primary); position: relative;
        }
        .progress-bar-fill::after {
            content: ''; position: absolute; right: -5px; top: -2px;
            width: 10px; height: 10px; background: #fff;
            border-radius: 50%; box-shadow: 0 0 5px #fff;
        }

        .music-list-container {
            max-height: 250px; overflow-y: auto;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 10px;
        }
        .music-item {
            display: flex; align-items: center;
            padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer; transition: 0.2s;
        }
        .music-item:hover { background: rgba(0, 249, 255, 0.1); }
        .music-cover {
            width: 50px; height: 50px; border-radius: 4px;
            object-fit: cover; margin-right: 15px;
            border: 1px solid #444; flex-shrink: 0;
        }
        .music-item-info { flex: 1; min-width: 0; }
        .music-item-title { color: #fff; font-size: 0.95rem; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .music-item-artist { font-size: 0.75rem; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .music-item-btn {
            color: var(--primary); border: 1px solid var(--primary);
            padding: 4px 10px; border-radius: 4px; font-size: 0.7rem;
            flex-shrink: 0; margin-left: 10px;
        }

        .visualizer {
            height: 30px; display: flex; align-items: flex-end; gap: 3px; margin-top: 5px; opacity: 0.7;
        }
        .bar { flex: 1; background: var(--secondary); animation: bounce 0.5s infinite ease-in-out alternate; }
        @keyframes bounce { 0% { height: 10%; } 100% { height: 100%; } }

        .drop-zone {
            border: 2px dashed var(--text-dim);
            background: rgba(0,0,0,0.3);
            padding: 40px 20px; text-align: center;
            transition: 0.3s; cursor: pointer;
        }
        .drop-zone.dragover { border-color: var(--primary); background: rgba(0, 249, 255, 0.1); }
        .drop-zone i { font-size: 3rem; color: var(--text-dim); margin-bottom: 10px; display: block; }
        .file-list { margin-top: 15px; max-height: 300px; overflow-y: auto; }
        .file-item {
            display: flex; justify-content: space-between; padding: 8px;
            background: rgba(255,255,255,0.05); margin-bottom: 5px;
            font-size: 0.85rem; border-left: 3px solid var(--primary);
            align-items: center;
        }
        .progress-container { width: 100%; height: 4px; background: #333; margin-top: 5px; position: relative; }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; transition: width 0.1s; }

        .admin-panel { display: none; }
        .admin-header { color: var(--accent); font-weight: bold; margin-bottom: 10px; }
        .console-log {
            background: #000; color: #0f0; padding: 10px; font-family: monospace;
            height: 150px; overflow-y: auto; border: 1px solid #333; font-size: 0.8rem;
            margin-bottom: 10px; border-radius: 3px;
        }
        .log-entry { margin: 5px 0; opacity: 0.7; }
        .admin-actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .admin-action-btn {
            padding: 5px 10px; font-size: 0.8rem; background: rgba(188, 19, 254, 0.2);
            border: 1px solid var(--secondary); color: var(--secondary);
            cursor: pointer; border-radius: 3px;
        }
        .admin-action-btn:hover { background: var(--secondary); color: #000; }

        .video-input-group {
            display: flex; gap: 10px; margin-bottom: 15px;
            background: rgba(0,0,0,0.3); padding: 10px; border-radius: 5px;
            border: 1px solid rgba(0, 249, 255, 0.2);
        }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .video-thumb {
            aspect-ratio: 16/9; background: #000; position: relative;
            cursor: pointer; border: 1px solid #333; overflow: hidden;
        }
        .video-thumb img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; transition: 0.3s; }
        .video-thumb:hover img { opacity: 1; transform: scale(1.1); }
        .play-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; color: #fff; text-shadow: 0 0 10px #000;
        }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(5px);
            z-index: 3000; display: none; justify-content: center; align-items: center;
        }
        .reader-frame {
            width: 100%; height: 100%; border: none; background: #fff;
        }
        .modal-box {
            background: #050a10; border: 1px solid var(--primary);
            padding: 30px; width: 90%; max-width: 400px;
            text-align: center; box-shadow: 0 0 30px rgba(0, 249, 255, 0.2);
            position: relative;
        }
        .modal-box::before {
            content: 'ACCESS GRANTED'; position: absolute; top: -10px; left: 20px;
            background: var(--accent); color: #000; padding: 2px 10px;
            font-family: var(--font-tech); font-size: 0.7rem;
        }
        .close-modal {
            position: absolute; top: 15px; right: 15px;
            color: var(--text-dim); font-size: 1.5rem; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="cyber-grid"></div>
    <div class="scan-line"></div>

    <div class="container">
        <header>
            <h1>尐念·超维空间</h1>
        </header>

        <!-- 音频解码终端 -->
        <div class="hud-card">
            <div class="card-header">
                <div class="card-title"><span class="status-dot"></span> 音频解码终端</div>
            </div>
            <p>已尝试将指定歌曲设为背景音乐。由于版权限制，无法直接播放，请手动访问：</p>
            <a href="https://music.163.com/#/song?id=2603158055" target="_blank" class="btn-cyber" style="display: inline-block; margin-top: 10px;">打开歌曲链接</a>
        </div>

        <!-- 系统管理终端 -->
        <div class="hud-card">
            <div class="card-header">
                <div class="card-title"><span class="status-dot"></span> 系统管理终端</div>
            </div>
            <input type="password" id="adminPass" placeholder="输入管理密钥...">
            <button class="btn-cyber" onclick="unlockAdmin()">授权接入</button>
            
            <div class="admin-panel" id="adminPanel">
                <div class="admin-header">[ SYSTEM CONSOLE ]</div>
                <div class="console-log" id="consoleLog">
                    <div class="log-entry">> 系统初始化完成...</div>
                    <div class="log-entry">> 等待管理员指令...</div>
                </div>
                <div class="admin-actions">
                    <div class="admin-action-btn" onclick="logAction('重启核心服务...')">重启服务</div>
                    <div class="admin-action-btn" onclick="logAction('扫描全网节点...')">网络扫描</div>
                    <div class="admin-action-btn" onclick="logAction('同步量子数据库...')">数据同步</div>
                </div>
            </div>
        </div>

        <!-- 量子文件传输 -->
        <div class="hud-card">
            <div class="card-header">
                <div class="card-title"><span class="status-dot"></span> 量子文件传输</div>
            </div>
            <div class="drop-zone" id="dropZone">
                <div>📁 拖放文件至此 或 点击选择</div>
                <input type="file" id="fileInput" style="display: none;">
            </div>
            <div class="file-list" id="fileList"></div>
        </div>
    </div>

    <script>
        // === 背景音乐处理 ===
        window.onload = function() {
            // 页面加载时，自动提示用户
            console.log("提示：网易云音乐链接受版权限制，无法作为背景音乐自动播放。");
        };

        // === 系统管理终端 ===
        function unlockAdmin() {
            const pass = document.getElementById('adminPass').value;
            if (pass === 'qingnanliu') {
                document.body.classList.add('admin-unlocked');
                document.getElementById('adminPanel').style.display = 'block';
                logAction('> 管理权限已授予！');
            } else {
                alert('密钥错误！');
            }
        }

        function logAction(message) {
            const log = document.getElementById('consoleLog');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = '> ' + message;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }

        // === 量子文件传输 ===
        let uploadedFile = null;

        document.getElementById('dropZone').addEventListener('click', () => {
            document.getElementById('fileInput').click();
        });

        document.getElementById('dropZone').addEventListener('dragover', (e) => {
            e.preventDefault();
            e.currentTarget.classList.add('dragover');
        });

        document.getElementById('dropZone').addEventListener('dragleave', (e) => {
            e.currentTarget.classList.remove('dragover');
        });

        document.getElementById('dropZone').addEventListener('drop', (e) => {
            e.preventDefault();
            e.currentTarget.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                handleFile(e.dataTransfer.files);
            }
        });

        document.getElementById('fileInput').addEventListener('change', (e) => {
            if (e.target.files.length) {
                handleFile(e.target.files);
            }
        });

        function handleFile(file) {
            uploadedFile = file;
            const fileList = document.getElementById('fileList');
            fileList.innerHTML = '';

            const item = document.createElement('div');
            item.className = 'file-item';
            item.innerHTML = `
                <span>${file.name} (${(file.size / 1024).toFixed(2)} KB)</span>
                <button class="btn-cyber" style="padding: 3px 8px; font-size: 0.7rem;" onclick="downloadFile()">下载回传</button>
            `;
            fileList.appendChild(item);

            // 模拟进度条
            const progressContainer = document.createElement('div');
            progressContainer.className = 'progress-container';
            const progressBar = document.createElement('div');
            progressBar.className = 'progress-bar';
            progressContainer.appendChild(progressBar);
            item.appendChild(progressContainer);

            let width = 0;
            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    return;
                }
                width += 5;
                progressBar.style.width = width + '%';
            }, 50);
        }

        function downloadFile() {
            if (!uploadedFile) return;
            const url = URL.createObjectURL(uploadedFile);
            const a = document.createElement('a');
            a.href = url;
            a.download = uploadedFile.name;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
