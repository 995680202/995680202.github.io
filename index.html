<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>音乐空间</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }
    body {
      background: #111;
      color: #fff;
      padding: 20px;
    }
    .box {
      background: #222;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
    }
    input, button {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border-radius: 6px;
      border: none;
      font-size: 16px;
    }
    button {
      background: #007bff;
      color: #fff;
      cursor: pointer;
    }
    .file {
      padding: 10px;
      background: #333;
      margin-bottom: 6px;
      border-radius: 6px;
    }
    /* 固定按钮 */
    #bg-btn {
      position: fixed;
      left: 10px;
      bottom: 10px;
      width: auto;
      padding: 10px;
    }
    #admin-btn {
      position: fixed;
      right: 10px;
      bottom: 10px;
      width: auto;
      padding: 10px;
    }
    /* 后台页面 */
    #admin-page {
      display: none;
      position: fixed;
      top:0;left:0;
      width:100%;height:100%;
      background:#111;
      padding:20px;
    }
  </style>
</head>
<body>

<audio id="bg-music" loop>
<audio id="main-player">

<!-- 播放器 -->
<div class="box">
  <h2>🎵 播放器</h2>
  <div id="title">未播放</div>
  <span id="t-curr">0:00</span> / <span id="t-total">0:00</span>
  <input type="range" id="progress">
  <button id="prev">上一首</button>
  <button id="play">播放</button>
  <button id="next">下一首</button>
</div>

<!-- 搜索 -->
<div class="box">
  <h2>🔍 搜索音乐</h2>
  <input type="text" id="search" placeholder="输入歌曲名回车搜索">
</div>

<!-- 文件夹 -->
<div class="box">
  <h2>📁 文件夹</h2>
  <h3>工作文件</h3>
  <div id="work-list"></div>
  <h3>私人文件</h3>
  <button id="show-private">查看</button>
  <div id="private-list"></div>
</div>

<!-- 固定按钮 -->
<button id="bg-btn">⏸ 背景音乐</button>
<button id="admin-btn">⚙️ 后台</button>

<!-- 后台页面 -->
<div id="admin-page">
  <div class="box">
    <h2>后台登录</h2>
    <input type="password" id="pwd" placeholder="密码">
    <button onclick="login()">登录</button>
  </div>

  <div id="admin-body" style="display:none">
    <div class="box">
      <h3>背景音乐</h3>
      <input type="file" id="bg-file" accept="audio/*">
      <button onclick="setBg()">设置</button>
      <button onclick="delBg()">删除</button>
    </div>
    <div class="box">
      <h3>工作文件</h3>
      <input type="file" id="work-file" multiple>
      <button onclick="upWork()">上传</button>
      <div id="admin-work"></div>
    </div>
    <div class="box">
      <h3>私人文件</h3>
      <input type="file" id="private-file" multiple>
      <button onclick="upPrivate()">上传</button>
      <div id="admin-private"></div>
    </div>
    <button onclick="closeAdmin()">关闭</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
