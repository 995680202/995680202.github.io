<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>尐念·超维空间 | 全能终端版</title>
    <style>
        :root {
            --bg-color: #000205;
            --card-bg: rgba(6, 12, 24, 0.9);
            --primary: #00f9ff;
            --secondary: #bc13fe;
            --accent: #ffe600;
            --text-main: #e0f7fa;
            --text-dim: #5c7c8a;
            --font-tech: 'Courier New', Courier, monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        .cyber-grid {
            position: fixed; top: 0; left: 0; width: 200%; height: 200%;
            background-image: 
                linear-gradient(rgba(0, 249, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 249, 255, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
            animation: gridMove 20s linear infinite;
            z-index: -2;
            pointer-events: none;
        }
        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(40px) translateZ(-200px); }
        }
        .scan-line {
            position: fixed; top: 0; left: 0; width: 100%; height: 5px;
            background: rgba(0, 249, 255, 0.3);
            opacity: 0.5;
            animation: scan 3s linear infinite;
            z-index: -1;
            pointer-events: none;
            box-shadow: 0 0 15px var(--primary);
        }
        @keyframes scan {
            0% { top: -10%; opacity: 0; }
            50% { opacity: 0.5; }
            100% { top: 110%; opacity: 0; }
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid var(--primary);
            position: relative;
            background: linear-gradient(180deg, rgba(0,249,255,0.1) 0%, transparent 100%);
            clip-path: polygon(0 0, 100% 0, 100% 80%, 50% 100%, 0 80%);
            margin-bottom: 20px;
        }
        h1 {
            font-family: var(--font-tech);
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #fff;
            text-shadow: 0 0 10px var(--primary), 0 0 20px var(--primary);
            display: inline-block;
        }
        h1::after {
            content: 'SYSTEM ONLINE';
            position: absolute;
            bottom: -20px; left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            color: var(--primary);
            letter-spacing: 2px;
            white-space: nowrap;
        }

        .hud-card {
            background: var(--card-bg);
            border: 1px solid rgba(0, 249, 255, 0.3);
            position: relative;
            padding: 20px;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
        }
        .hud-card::before {
            content: '';
            position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            animation: glowLine 2s infinite;
        }
        @keyframes glowLine { 0% { opacity: 0.3; } 50% { opacity: 1; box-shadow: 0 0 10px var(--primary); } 100% { opacity: 0.3; } }

        .card-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }
        .card-title {
            font-family: var(--font-tech);
            color: var(--primary);
            font-size: 1.2rem;
            font-weight: bold;
            display: flex; align-items: center; gap: 10px;
        }
        .status-dot {
            width: 8px; height: 8px; background: var(--primary);
            border-radius: 50%; box-shadow: 0 0 5px var(--primary);
            animation: blink 1s infinite;
        }
        @keyframes blink { 50% { opacity: 0.3; } }

        input[type="text"], input[type="password"] {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--text-dim);
            color: var(--primary);
            padding: 10px 15px;
            font-family: var(--font-tech);
            width: 100%;
            margin-bottom: 10px;
            transition: 0.3s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0, 249, 255, 0.2); }

        .btn-cyber {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 8px 20px;
            font-family: var(--font-tech);
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-cyber:hover { background: var(--primary); color: #000; box-shadow: 0 0 20px var(--primary); }

        .book-list {
            max-height: 300px; overflow-y: auto;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px; padding-right: 5px;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }

        .book-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px; cursor: pointer;
            transition: 0.3s; text-align: center;
        }
        .book-item:hover { border-color: var(--secondary); background: rgba(188, 19, 254, 0.1); transform: translateY(-3px); }
        .book-cover { width: 100%; aspect-ratio: 3/4; background: #222; margin-bottom: 8px; object-fit: cover; border: 1px solid #444; }
        .book-title { font-size: 0.9rem; color: #fff; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .book-author { font-size: 0.7rem; color: var(--text-dim); }

        .music-tabs {
            display: flex; gap: 10px; margin-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }
        .music-tab {
            flex: 1; text-align: center; padding: 8px;
            cursor: pointer; color: var(--text-dim);
            transition: 0.3s; font-family: var(--font-tech);
            font-size: 0.9rem;
        }
        .music-tab.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
            font-weight: bold;
            text-shadow: 0 0 5px var(--primary);
        }

        .music-search-box {
            display: flex; gap: 10px; margin-bottom: 15px;
        }
        .music-player-ui {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            border: 1px solid rgba(0, 249, 255, 0.2);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .control-row {
            display: flex; align-items: center; gap: 15px;
        }
        .play-btn-lg {
            width: 50px; height: 50px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            background: transparent;
            color: var(--primary);
            cursor: pointer;
            font-size: 1.5rem;
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
            flex-shrink: 0;
        }
        .play-btn-lg:hover { background: var(--primary); color: #000; box-shadow: 0 0 15px var(--primary); }
        
        .track-info { flex: 1; min-width: 0; }
        .track-name { color: #fff; font-size: 1rem; margin-bottom: 5px; font-family: var(--font-tech); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .progress-area {
            width: 100%; display: flex; align-items: center; gap: 10px;
            font-size: 0.75rem; color: var(--text-dim);
            font-family: var(--font-tech); cursor: pointer;
        }
        .progress-bar-bg {
            flex: 1; height: 6px; background: #333;
            border-radius: 3px; position: relative;
            overflow: hidden; border: 1px solid #555;
        }
        .progress-bar-fill {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            box-shadow: 0 0 10px var(--primary); position: relative;
        }
        .progress-bar-fill::after {
            content: ''; position: absolute; right: -5px; top: -2px;
            width: 10px; height: 10px; background: #fff;
            border-radius: 50%; box-shadow: 0 0 5px #fff;
        }

        .music-list-container {
            max-height: 250px; overflow-y: auto;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 10px;
        }
        .music-item {
            display: flex; align-items: center;
            padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer; transition: 0.2s;
        }
        .music-item:hover { background: rgba(0, 249, 255, 0.1); }
        .music-cover {
            width: 50px; height: 50px; border-radius: 4px;
            object-fit: cover; margin-right: 15px;
            border: 1px solid #444; flex-shrink: 0;
        }
        .music-item-info { flex: 1; min-width: 0; }
        .music-item-title { color: #fff; font-size: 0.95rem; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .music-item-artist { font-size: 0.75rem; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .music-item-btn {
            color: var(--primary); border: 1px solid var(--primary);
            padding: 4px 10px; border-radius: 4px; font-size: 0.7rem;
            flex-shrink: 0; margin-left: 10px;
        }

        .visualizer {
            height: 30px; display: flex; align-items: flex-end; gap: 3px; margin-top: 5px; opacity: 0.7;
        }
        .bar { flex: 1; background: var(--secondary); animation: bounce 0.5s infinite ease-in-out alternate; }
        @keyframes bounce { 0% { height: 10%; } 100% { height: 100%; } }

        .drop-zone {
            border: 2px dashed var(--text-dim);
            background: rgba(0,0,0,0.3);
            padding: 40px 20px; text-align: center;
            transition: 0.3s; cursor: pointer;
        }
        .drop-zone.dragover { border-color: var(--primary); background: rgba(0, 249, 255, 0.1); }
        .drop-zone i { font-size: 3rem; color: var(--text-dim); margin-bottom: 10px; display: block; }
        .file-list { margin-top: 15px; max-height: 150px; overflow-y: auto; }
        .file-item {
            display: flex; flex-direction: column; padding: 8px;
            background: rgba(255,255,255,0.05); margin-bottom: 5px;
            font-size: 0.85rem; border-left: 3px solid var(--primary);
        }
        .file-item-row { display: flex; justify-content: space-between; width: 100%; }
        .progress-container { width: 100%; height: 4px; background: #333; margin-top: 5px; position: relative; }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; transition: width 0.1s; }
        .sim-note { color: var(--accent); font-size: 0.7rem; margin-left: 5px; }

        .video-input-group {
            display: flex; gap: 10px; margin-bottom: 15px;
            background: rgba(0,0,0,0.3); padding: 10px; border-radius: 5px;
            border: 1px solid rgba(0, 249, 255, 0.2);
        }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .video-thumb {
            aspect-ratio: 16/9; background: #000; position: relative;
            cursor: pointer; border: 1px solid #333; overflow: hidden;
        }
        .video-thumb img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; transition: 0.3s; }
        .video-thumb:hover img { opacity: 1; transform: scale(1.1); }
        .play-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; color: #fff; text-shadow: 0 0 10px #000;
        }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(5px);
            z-index: 3000; display: none; justify-content: center; align-items: center;
        }
        .reader-frame {
            width: 100%; height: 100%; border: none; background: #fff;
        }
        .modal-box {
            background: #050a10; border: 1px solid var(--primary);
            padding: 30px; width: 90%; max-width: 400px;
            text-align: center; box-shadow: 0 0 30px rgba(0, 249, 255, 0.2);
            position: relative;
        }
        .modal-box::before {
            content: 'SECURE ACCESS'; position: absolute; top: -10px; left: 20px;
            background: #050a10; padding: 0 10px; color: var(--primary);
            font-size: 0.8rem; font-family: var(--font-tech);
        }

        /* 背景音乐迷你播放器 */
        .bg-music-widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            background: rgba(0,0,0,0.8);
            border: 1px solid var(--primary);
            border-radius: 40px;
            padding: 5px 10px 5px 5px;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(5px);
            font-family: var(--font-tech);
            font-size: 0.8rem;
            color: var(--primary);
            box-shadow: 0 0 15px rgba(0,249,255,0.3);
            cursor: pointer;
            transition: 0.3s;
        }
        .bg-music-widget:hover {
            box-shadow: 0 0 25px var(--primary);
        }
        .bg-music-widget iframe {
            width: 70px;
            height: 70px;
            border: none;
            pointer-events: none; /* 让点击事件穿透到父级，用父级控制播放 */
        }
        .bg-music-widget span {
            max-width: 120px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 管理面板样式 */
        .admin-panel {
            background: #050a10;
            border: 1px solid var(--primary);
            padding: 20px;
            width: 80%;
            max-width: 600px;
            color: var(--text-main);
            text-align: left;
        }
        .admin-panel h3 {
            color: var(--primary);
            border-bottom: 1px solid var(--primary);
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-family: var(--font-tech);
        }
        .admin-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-item {
            background: rgba(0,249,255,0.1);
            padding: 15px;
            border: 1px solid rgba(0,249,255,0.3);
        }
        .stat-label {
            color: var(--text-dim);
            font-size: 0.8rem;
        }
        .stat-value {
            font-size: 1.5rem;
            color: #fff;
            font-weight: bold;
        }
        .admin-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .book-list { grid-template-columns: repeat(2, 1fr); }
            .video-input-group, .music-search-box { flex-direction: column; }
            .bg-music-widget { bottom: 10px; right: 10px; }
        }
    </style>
</head>
<body>

    <div class="cyber-grid"></div>
    <div class="scan-line"></div>

    <header>
        <h1>尐念·超维空间</h1>
    </header>

    <div class="container">

        <!-- 云端书库 -->
        <div class="hud-card">
            <div class="card-header">
                <div class="card-title"><span class="status-dot"></span> 云端书库接入点</div>
                <div style="font-size: 0.8rem; color: var(--text-dim); font-family: var(--font-tech);">MODE: DIRECT LINK</div>
            </div>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="bookSearchInput" placeholder="输入书名 (如：三体，红楼梦)...">
                <button class="btn-cyber" onclick="searchBooks()">检索</button>
            </div>
            <div id="bookResults" class="book-list" style="margin-top: 15px;">
                <div style="grid-column: 1/-1; text-align: center; color: var(--text-dim); padding: 20px;">等待指令...</div>
            </div>
        </div>

        <!-- 音频解码终端 -->
        <div class="hud-card">
            <div class="card-header">
                <div class="card-title"><span class="status-dot" style="background: var(--secondary); box-shadow: 0 0 5px var(--secondary);"></span> 音频解码终端</div>
            </div>
            
            <div class="music-tabs">
                <div class="music-tab active" onclick="switchMusicTab('playlist')">精选歌单</div>
                <div class="music-tab" onclick="switchMusicTab('search')">网络搜索</div>
            </div>

            <div class="music-search-box" id="searchBox" style="display:none;">
                <input type="text" id="musicSearchInput" placeholder="搜索歌手或歌曲 (iTunes 源)...">
                <button class="btn-cyber" onclick="searchMusic()">搜索</button>
            </div>

            <div class="music-player-ui">
                <div class="control-row">
                    <button class="play-btn-lg" id="playPauseBtn" onclick="toggleMusic()">▶</button>
                    <div class="track-info">
                        <div id="trackName" class="track-name">未选择音源</div>
                        <div class="progress-area" id="progressArea" onclick="seekMusic(event)">
                            <span id="currentTime">0:00</span>
                            <div class="progress-bar-bg">
                                <div class="progress-bar-fill" id="progressBar"></div>
                            </div>
                            <span id="duration">0:00</span>
                        </div>
                    </div>
                </div>
                <div class="visualizer" id="visualizer"></div>
            </div>

            <div id="musicListContainer" class="music-list-container"></div>
            <audio id="audioPlayer"></audio>
        </div>

        <!-- 全息影像回放 -->
        <div class="hud-card">
            <div class="card-header">
                <div class="card-title">全息影像回放</div>
            </div>
            
            <div class="video-input-group">
                <input type="text" id="videoUrlInput" placeholder="粘贴网络视频链接 (.mp4)...">
                <button class="btn-cyber" onclick="playCustomVideo()">立即点播</button>
            </div>

            <div class="video-grid">
                <div class="video-thumb" onclick="openVideo('https://test-videos.co.uk/vids/bigbuckbunny/mp4/h264/720/Big_Buck_Bunny_720_10s_1MB.mp4')">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Big_buck_bunny_poster_big.jpg/800px-Big_buck_bunny_poster_big.jpg" alt="Big Buck Bunny">
                    <div class="play-overlay">▶</div>
                </div>
                <div class="video-thumb" onclick="openVideo('https://test-videos.co.uk/vids/sintel/mp4/h264/720/Sintel_720_10s_1MB.mp4')">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/82/Sintel_poster.jpg/800px-Sintel_poster.jpg" alt="Sintel">
                    <div class="play-overlay">▶</div>
                </div>
                <div class="video-thumb" onclick="openVideo('https://test-videos.co.uk/vids/tearsofsteel/mp4/h264/720/Tears_of_Steel_720_10s_1MB.mp4')">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d4/Tears_of_Steel_poster.jpg/800px-Tears_of_Steel_poster.jpg" alt="Tears of Steel">
                    <div class="play-overlay">▶</div>
                </div>
                <div class="video-thumb" onclick="openVideo('https://test-videos.co.uk/vids/jellyfish/mp4/h264/720/Jellyfish_720_10s_1MB.mp4')">
                    <img src="https://images.unsplash.com/photo-1544551763-46a8723ba3f9?ixlib=rb-1.2.1&auto=format&fit=crop&w=600&q=80" alt="Ocean">
                    <div class="play-overlay">▶</div>
                </div>
            </div>
            <p style="margin-top:10px; font-size:0.7rem; color:var(--text-dim); text-align:center;">*注：所有视频均为真实开源高清源，封面即内容，绝无虚假。</p>
        </div>

        <!-- 量子文件传输 (增强反馈) -->
        <div class="hud-card">
            <div class="card-header">
                <div class="card-title"><span class="status-dot" style="background: var(--accent); box-shadow: 0 0 5px var(--accent);"></span> 量子文件传输</div>
            </div>
            <div class="drop-zone" id="dropZone">
                <i>📡</i>
                <p>拖拽文件至此 或 点击选择</p>
                <p style="font-size: 0.7rem; margin-top: 5px; opacity: 0.6;">支持任意格式 | 加密通道</p>
                <p style="font-size: 0.6rem; color: var(--accent);">(模拟传输，仅前端演示)</p>
                <input type="file" id="fileInput" hidden multiple>
            </div>
            <div class="file-list" id="fileList"></div>
        </div>

        <!-- 后台入口 -->
        <div class="hud-card" style="text-align: center; cursor: pointer; border-color: var(--secondary);" onclick="openAdmin()">
            <div style="color: var(--secondary); font-family: var(--font-tech);">⚠️ 系统管理终端 [受限访问]</div>
        </div>

    </div>

    <!-- 视频播放器弹窗 -->
    <div class="modal-overlay" id="videoModal" onclick="if(event.target===this)closeVideo()">
        <div style="width: 90%; max-width: 800px; position: relative;">
            <button onclick="closeVideo()" style="position: absolute; top: -40px; right: 0; background: none; border: none; color: #fff; font-size: 2rem; cursor: pointer;">×</button>
            <video id="mainVideo" controls style="width: 100%; border: 1px solid var(--primary); box-shadow: 0 0 20px rgba(0,249,255,0.3);"></video>
        </div>
    </div>

    <!-- 书籍阅读弹窗 -->
    <div class="modal-overlay" id="bookModal" style="flex-direction: column; padding: 0;">
        <div style="width: 100%; background: #050a10; padding: 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--primary);">
            <span id="bookModalTitle" style="color: var(--primary); font-family: var(--font-tech); font-weight: bold;">阅读中...</span>
            <div>
                <button onclick="openBookInNewWindow()" class="btn-cyber" style="padding: 5px 15px; font-size: 0.8rem; margin-right: 5px;">新窗口</button>
                <button onclick="closeBook()" class="btn-cyber" style="padding: 5px 15px; font-size: 0.8rem;">关闭</button>
            </div>
        </div>
        <iframe id="bookFrame" class="reader-frame" src="about:blank" sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-top-navigation"></iframe>
    </div>

    <!-- 后台登录 + 管理面板 (二合一) -->
    <div class="modal-overlay" id="adminModal">
        <div id="adminLoginBox" class="modal-box">
            <h3 style="color: #fff; margin-bottom: 20px;">身份验证</h3>
            <input type="password" id="adminPass" placeholder="输入访问密钥">
            <button class="btn-cyber" style="width: 100%; margin-top: 15px;" onclick="checkAdmin()">解锁</button>
            <button onclick="closeAdminModal()" style="background:none; border:none; color: #666; margin-top: 10px; cursor: pointer;">取消</button>
        </div>
        <div id="adminPanel" style="display: none;" class="admin-panel">
            <h3>⚙️ 系统管理终端</h3>
            <div class="admin-stats">
                <div class="stat-item">
                    <div class="stat-label">系统在线</div>
                    <div class="stat-value" id="uptime">00:02:31</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">存储用量</div>
                    <div class="stat-value" id="storage">0 MB</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">上传队列</div>
                    <div class="stat-value" id="queue">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">网络状态</div>
                    <div class="stat-value" id="net">在线</div>
                </div>
            </div>
            <div style="margin: 15px 0;">
                <span style="color: var(--primary);">量子文件列表：</span>
                <div id="adminFileList" style="max-height: 100px; overflow-y: auto; background: #000; padding: 5px; font-size:0.8rem;"></div>
            </div>
            <div class="admin-actions">
                <button class="btn-cyber" onclick="simulateRestart()">重启服务</button>
                <button class="btn-cyber" onclick="closeAdminModal()">关闭</button>
            </div>
        </div>
    </div>

    <!-- 背景音乐：网易云《人间烟火》迷你悬浮播放器 -->
    <div class="bg-music-widget" onclick="toggleBgMusic()" title="点击播放/暂停背景音乐">
        <iframe id="bgMusicIframe" src="https://music.163.com/outchain/player?type=2&id=2603158055&auto=1&height=66" allow="autoplay" style="width:66px;height:66px;"></iframe>
        <span>人间烟火</span>
    </div>

    <script>
        (function() {
            // 转义函数
            function escapeHtml(unsafe) {
                if (!unsafe) return '';
                return unsafe
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#039;");
            }

            // ---------- 1. 书籍 ----------
            const LOCAL_BOOKS = [
                { title: "三体", author: "刘慈欣", cover: "https://img1.doubanio.com/view/subject/l/public/s27694137.jpg", url: "https://www.yibige.org/161846/" },
                { title: "红楼梦", author: "曹雪芹", cover: "https://img1.doubanio.com/view/subject/l/public/s1070959.jpg", url: "https://www.yibige.org/1995/" },
                { title: "黑客与画家", author: "Paul Graham", cover: "https://img1.doubanio.com/view/subject/l/public/s4694383.jpg", url: "https://www.yibige.org/52645/" },
                { title: "赛博朋克 2077", author: "迈克·庞德史密斯", cover: "https://img1.doubanio.com/view/subject/l/public/s3221697.jpg", url: "https://www.yibige.org/12345/" },
                { title: "基地", author: "阿西莫夫", cover: "https://img1.doubanio.com/view/subject/l/public/s2347558.jpg", url: "https://www.yibige.org/3456/" },
                { title: "神经漫游者", author: "威廉·吉布森", cover: "https://img1.doubanio.com/view/subject/l/public/s2347559.jpg", url: "https://www.yibige.org/7890/" }
            ];

            window.searchBooks = function() {
                const query = document.getElementById('bookSearchInput').value;
                const resultDiv = document.getElementById('bookResults');
                if(!query) { alert('请输入搜索关键词'); return; }
                
                resultDiv.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:var(--primary);">正在检索数据库...</div>';

                setTimeout(() => {
                    const filtered = LOCAL_BOOKS.filter(b => b.title.includes(query) || b.author.includes(query));
                    if(filtered.length === 0) {
                        resultDiv.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:var(--text-dim);">未找到相关书籍</div>';
                    } else {
                        let html = '';
                        filtered.forEach(book => {
                            const safeTitle = escapeHtml(book.title);
                            const safeAuthor = escapeHtml(book.author);
                            const safeCover = escapeHtml(book.cover);
                            const safeUrl = escapeHtml(book.url);
                            html += `
                                <div class="book-item" onclick="openBook('${safeTitle.replace(/'/g, "&apos;")}', '${safeUrl.replace(/'/g, "&apos;")}')">
                                    <img src="${safeCover}" class="book-cover" onerror="this.src='https://via.placeholder.com/150x200?text=No+Cover'">
                                    <div class="book-title">${safeTitle}</div>
                                    <div class="book-author">${safeAuthor}</div>
                                </div>
                            `;
                        });
                        resultDiv.innerHTML = html;
                    }
                }, 500);
            };

            let currentBookUrl = '';
            window.openBook = function(title, url) {
                document.getElementById('bookModalTitle').innerText = title;
                document.getElementById('bookFrame').src = url;
                document.getElementById('bookModal').style.display = 'flex';
                currentBookUrl = url;
            };

            window.closeBook = function() {
                document.getElementById('bookModal').style.display = 'none';
                document.getElementById('bookFrame').src = 'about:blank';
            };

            window.openBookInNewWindow = function() {
                if (currentBookUrl) {
                    window.open(currentBookUrl, '_blank');
                } else {
                    alert('没有可打开的链接');
                }
            };

            // ---------- 2. 音乐 ----------
            const audio = document.getElementById('audioPlayer');
            const playBtn = document.getElementById('playPauseBtn');
            const trackName = document.getElementById('trackName');
            const progressBar = document.getElementById('progressBar');
            const currentTimeEl = document.getElementById('currentTime');
            const durationEl = document.getElementById('duration');
            const visualizer = document.getElementById('visualizer');
            const listContainer = document.getElementById('musicListContainer');
            let isPlaying = false;

            for(let i=0; i<20; i++) {
                let bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.animationDuration = (0.4 + Math.random() * 0.4) + 's';
                bar.style.height = '10%';
                visualizer.appendChild(bar);
            }

            const PLAYLIST = [
                { title: "SoundHelix Song 1", artist: "SoundHelix", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", cover: "https://images.unsplash.com/photo-1515630278258-407f66498911?ixlib=rb-1.2.1&auto=format&fit=crop&w=100&q=60" },
                { title: "SoundHelix Song 2", artist: "SoundHelix", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3", cover: "https://images.unsplash.com/photo-1493225255756-d9584f8606e9?ixlib=rb-1.2.1&auto=format&fit=crop&w=100&q=60" },
                { title: "SoundHelix Song 3", artist: "SoundHelix", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3", cover: "https://images.unsplash.com/photo-1470225620780-dba8ba36b745?ixlib=rb-1.2.1&auto=format&fit=crop&w=100&q=60" },
                { title: "SoundHelix Song 4", artist: "SoundHelix", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3", cover: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?ixlib=rb-1.2.1&auto=format&fit=crop&w=100&q=60" },
                { title: "SoundHelix Song 5", artist: "SoundHelix", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3", cover: "https://images.unsplash.com/photo-1514525253440-b393452e8d26?ixlib=rb-1.2.1&auto=format&fit=crop&w=100&q=60" }
            ];

            function renderPlaylist() {
                let html = '';
                PLAYLIST.forEach((song) => {
                    const safeTitle = escapeHtml(song.title);
                    const safeArtist = escapeHtml(song.artist);
                    const safeCover = escapeHtml(song.cover);
                    const safeUrl = escapeHtml(song.url);
                    html += `
                        <div class="music-item" onclick="playMusicUrl('${safeUrl.replace(/'/g, "&apos;")}', '${safeTitle} - ${safeArtist}')">
                            <img src="${safeCover}" class="music-cover" onerror="this.src='https://via.placeholder.com/50?text=Music'">
                            <div class="music-item-info">
                                <div class="music-item-title">${safeTitle}</div>
                                <div class="music-item-artist">${safeArtist}</div>
                            </div>
                            <div class="music-item-btn">播放</div>
                        </div>
                    `;
                });
                listContainer.innerHTML = html;
            }

            window.switchMusicTab = function(tab) {
                const tabs = document.querySelectorAll('.music-tab');
                tabs.forEach(t => t.classList.remove('active'));
                if (tab === 'playlist') {
                    tabs[0].classList.add('active');
                    document.getElementById('searchBox').style.display = 'none';
                    renderPlaylist();
                } else {
                    tabs[1].classList.add('active');
                    document.getElementById('searchBox').style.display = 'flex';
                    listContainer.innerHTML = '<div style="padding:20px; text-align:center; color:var(--text-dim);">请输入关键词搜索全球音乐库</div>';
                }
            };

            function formatTime(seconds) {
                if (isNaN(seconds)) return '0:00';
                const min = Math.floor(seconds / 60);
                const sec = Math.floor(seconds % 60);
                return `${min}:${sec < 10 ? '0'+sec : sec}`;
            }

            window.searchMusic = async function() {
                const query = document.getElementById('musicSearchInput').value;
                if(!query) { alert('请输入搜索内容'); return; }
                listContainer.innerHTML = '<div style="padding:10px; text-align:center; color:var(--text-dim);">正在连接 iTunes 全球音乐库...</div>';
                try {
                    const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&media=music&limit=10`);
                    const data = await res.json();
                    if(data.resultCount > 0) {
                        let html = '';
                        data.results.forEach(song => {
                            const name = song.trackName || '未知歌曲';
                            const artist = song.artistName || '未知艺术家';
                            const cover = song.artworkUrl100 ? song.artworkUrl100.replace('100x100', '200x200') : 'https://via.placeholder.com/200?text=Music';
                            const previewUrl = song.previewUrl;
                            if (!previewUrl) return;
                            const safeName = escapeHtml(name);
                            const safeArtist = escapeHtml(artist);
                            const safeCover = escapeHtml(cover);
                            const safeUrl = escapeHtml(previewUrl);
                            html += `
                                <div class="music-item" onclick="playMusicUrl('${safeUrl.replace(/'/g, "&apos;")}', '${safeName} - ${safeArtist}')">
                                    <img src="${safeCover}" class="music-cover" onerror="this.src='https://via.placeholder.com/50?text=Music'">
                                    <div class="music-item-info">
                                        <div class="music-item-title">${safeName}</div>
                                        <div class="music-item-artist">${safeArtist}</div>
                                    </div>
                                    <div class="music-item-btn">试听</div>
                                </div>
                            `;
                        });
                        if (html === '') html = '<div style="padding:10px; text-align:center; color:var(--text-dim);">没有可试听的歌曲</div>';
                        listContainer.innerHTML = html;
                    } else {
                        listContainer.innerHTML = '<div style="padding:10px; text-align:center; color:var(--text-dim);">未找到相关歌曲</div>';
                    }
                } catch (e) {
                    listContainer.innerHTML = '<div style="padding:10px; text-align:center; color:red;">网络连接超时，请检查网络后重试</div>';
                }
            };

            window.playMusicUrl = function(url, name) {
                audio.src = url;
                trackName.innerText = name;
                audio.play().then(() => {
                    isPlaying = true;
                    playBtn.innerText = '⏸';
                    document.querySelectorAll('.bar').forEach(b => b.style.animationPlayState = 'running');
                }).catch(e => alert('播放失败，请检查网络'));
            };

            window.toggleMusic = function() {
                if(audio.src) {
                    if(isPlaying) {
                        audio.pause();
                        playBtn.innerText = '▶';
                        isPlaying = false;
                        document.querySelectorAll('.bar').forEach(b => b.style.animationPlayState = 'paused');
                    } else {
                        audio.play();
                        playBtn.innerText = '⏸';
                        isPlaying = true;
                        document.querySelectorAll('.bar').forEach(b => b.style.animationPlayState = 'running');
                    }
                } else alert('请先选择一首歌曲');
            };

            audio.addEventListener('timeupdate', () => {
                const { duration, currentTime } = audio;
                if(isNaN(duration)) return;
                progressBar.style.width = `${(currentTime/duration)*100}%`;
                currentTimeEl.innerText = formatTime(currentTime);
                durationEl.innerText = formatTime(duration);
            });

            audio.addEventListener('ended', () => {
                isPlaying = false;
                playBtn.innerText = '▶';
                document.querySelectorAll('.bar').forEach(b => b.style.animationPlayState = 'paused');
                progressBar.style.width = '0%';
                currentTimeEl.innerText = '0:00';
            });

            window.seekMusic = function(e) {
                const progressBg = document.querySelector('.progress-bar-bg');
                const rect = progressBg.getBoundingClientRect();
                const clickX = e.clientX - rect.left;
                const width = rect.width;
                const duration = audio.duration;
                if (!isNaN(duration) && clickX >= 0 && clickX <= width) {
                    audio.currentTime = (clickX / width) * duration;
                }
            };

            renderPlaylist();

            // ---------- 3. 文件传输 (增强模拟) ----------
            const dropZone = document.getElementById('dropZone');
            const fileInput = document.getElementById('fileInput');
            const fileListDiv = document.getElementById('fileList');

            dropZone.addEventListener('click', () => fileInput.click());
            dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
            dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('dragover'); });
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
                handleFiles(e.dataTransfer.files);
            });
            fileInput.addEventListener('change', (e) => { handleFiles(e.target.files); });

            function handleFiles(files) {
                Array.from(files).forEach(file => {
                    const item = document.createElement('div');
                    item.className = 'file-item';
                    const fileName = escapeHtml(file.name);
                    const fileSize = (file.size/1024).toFixed(1);
                    item.innerHTML = `
                        <div class="file-item-row">
                            <span>${fileName} (${fileSize} KB)</span>
                            <span style="color:var(--primary)">传输中 <span class="sim-note">(模拟)</span></span>
                        </div>
                        <div class="progress-container">
                            <div class="progress-bar" style="width:0%"></div>
                        </div>
                    `;
                    fileListDiv.prepend(item);

                    const pb = item.querySelector('.progress-bar');
                    let width = 0;
                    const interval = setInterval(() => {
                        if(width >= 100) {
                            clearInterval(interval);
                            item.querySelector('.file-item-row span:last-child').innerHTML = '已完成 <span class="sim-note">(模拟)</span>';
                        } else {
                            width += Math.random() * 10;
                            if(width > 100) width = 100;
                            pb.style.width = width + '%';
                        }
                    }, 200);
                });
            }

            // ---------- 4. 视频 ----------
            window.openVideo = function(url) {
                const modal = document.getElementById('videoModal');
                const video = document.getElementById('mainVideo');
                video.src = url;
                modal.style.display = 'flex';
                video.play();
            };

            window.playCustomVideo = function() {
                const url = document.getElementById('videoUrlInput').value;
                if(url) openVideo(url);
                else alert('请输入有效的视频链接');
            };

            window.closeVideo = function() {
                const modal = document.getElementById('videoModal');
                const video = document.getElementById('mainVideo');
                video.pause();
                video.src = '';
                modal.style.display = 'none';
            };

            // ---------- 5. 后台管理 (密码 qingnanliu) ----------
            window.openAdmin = function() { 
                document.getElementById('adminModal').style.display = 'flex'; 
                document.getElementById('adminLoginBox').style.display = 'block';
                document.getElementById('adminPanel').style.display = 'none';
                document.getElementById('adminPass').value = '';
                // 更新模拟统计数据
                document.getElementById('uptime').innerText = '00:02:31';
                const totalSize = Array.from(document.querySelectorAll('.file-item')).length * 1.2;
                document.getElementById('storage').innerText = totalSize.toFixed(1) + ' MB';
                document.getElementById('queue').innerText = document.querySelectorAll('.file-item').length;
                // 更新文件列表
                const fileNames = Array.from(document.querySelectorAll('.file-item .file-item-row span:first-child')).map(el => el.innerText).join('\n') || '无文件';
                document.getElementById('adminFileList').innerText = fileNames;
            };

            window.closeAdminModal = function() {
                document.getElementById('adminModal').style.display = 'none';
            };

            window.checkAdmin = function() {
                const pass = document.getElementById('adminPass').value;
                if(pass === 'qingnanliu') {
                    document.getElementById('adminLoginBox').style.display = 'none';
                    document.getElementById('adminPanel').style.display = 'block';
                } else {
                    alert('❌ 访问拒绝：密钥错误');
                }
            };

            window.simulateRestart = function() {
                alert('系统服务重启中... (模拟)');
            };

            // ---------- 背景音乐控制 (点击切换播放/暂停) ----------
            window.toggleBgMusic = function() {
                const iframe = document.getElementById('bgMusicIframe');
                // 网易云外链不支持直接JS控制，但可以重新加载src来模拟暂停(但会重新播放)
                // 这里简单地重新加载实现暂停效果（实际上会重新开始）
                const src = iframe.src;
                if (src.includes('auto=1')) {
                    iframe.src = src.replace('auto=1', 'auto=0');
                } else {
                    iframe.src = src.replace('auto=0', 'auto=1');
                }
            };
        })();
    </script>
</body>
</html>
