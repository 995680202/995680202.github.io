<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>尐念·科技影音站</title>
    <style>
        /* === 基础样式 === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* 移除移动端点击高亮 */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            color: #fff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* === 容器 === */
        .container {
            background: rgba(10, 15, 30, 0.8);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 1200px;
            padding: 30px;
            position: relative;
            z-index: 1;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* === 标题区 === */
        .header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }

        .title {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 10px;
            background: linear-gradient(to right, #00c6ff, #0072ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 10px rgba(0, 198, 255, 0.3);
        }

        .subtitle {
            font-size: 1.2rem;
            color: #a0a0c0;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        /* === 主功能区 === */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        @media (min-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .card {
            background: rgba(20, 25, 50, 0.6);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            background: rgba(30, 35, 70, 0.7);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .icon {
            font-size: 3rem;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card h3 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: #fff;
        }

        .card p {
            font-size: 1rem;
            color: #8080b0;
            font-weight: 300;
        }

        /* 状态指示器 */
        .status-indicator {
            margin-top: 15px;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 5px 10px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
        }

        .status-ok {
            color: #00ff9d;
            background: rgba(0, 255, 157, 0.1);
        }

        .status-error {
            color: #ff4d4d;
            background: rgba(255, 77, 77, 0.1);
        }

        /* === 底部工具区 === */
        .tools-section {
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tools-title {
            font-size: 1.2rem;
            color: #fff;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .tools-title i {
            color: #00c6ff;
        }

        .btn {
            background: linear-gradient(to right, #00c6ff, #0072ff);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            letter-spacing: 1px;
            margin: 10px;
            outline: none;
            box-shadow: 0 5px 15px rgba(0, 198, 255, 0.3);
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0, 198, 255, 0.5);
            background: linear-gradient(to right, #0072ff, #00c6ff);
        }

        .btn:active {
            transform: scale(0.95);
        }

        /* === 弹窗样式 (修复遮挡) === */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000; /* 关键：确保层级最高 */
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal {
            background: rgba(15, 20, 40, 0.95);
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 1001; /* 关键：比遮罩层更高 */
        }

        .modal h2 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: #fff;
        }

        .modal input {
            width: 100%;
            padding: 12px 20px;
            margin: 10px 0;
            border: 1px solid #333;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .modal input:focus {
            border-color: #00c6ff;
        }

        .modal-btn {
            background: linear-gradient(to right, #00c6ff, #0072ff);
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            margin: 5px;
        }

        .modal-btn-cancel {
            background: rgba(255, 255, 255, 0.1);
            color: #ff4d4d;
            border: 1px solid #ff4d4d;
        }

        .modal-btn-cancel:hover {
            background: rgba(255, 77, 77, 0.1);
        }

        /* === 视频播放器样式 === */
        .video-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 */
            margin-top: 20px;
            border-radius: 10px;
            overflow: hidden;
            display: none; /* 默认隐藏 */
        }

        .video-container.active {
            display: block;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* === 音乐播放器样式 === */
        .music-player {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            width: 100%;
        }

        .music-icon {
            font-size: 1.5rem;
            color: #00c6ff;
        }

        .music-title {
            font-size: 1rem;
            color: #fff;
            flex: 1;
            text-align: left;
        }

        .music-btn {
            background: rgba(0, 198, 255, 0.2);
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .music-btn:hover {
            background: rgba(0, 198, 255, 0.3);
        }

        /* === 响应式优化 === */
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            .title {
                font-size: 2.5rem;
            }
            .subtitle {
                font-size: 1rem;
            }
            .card {
                padding: 20px;
            }
            .card h3 {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 标题区 -->
        <div class="header">
            <div class="title">尐念·科技影音站</div>
            <div class="subtitle">XIAONIAN // TECH & MEDIA STATION</div>
        </div>

        <!-- 主功能区 -->
        <div class="main-grid">
            <!-- 卡片 1: 搜索服务 -->
            <div class="card" onclick="playMusic()">
                <div class="icon">🎵</div>
                <h3>音乐播放</h3>
                <p>高品质在线音乐试听</p>
                <div class="status-indicator status-ok">服务正常</div>
            </div>

            <!-- 卡片 2: 演示片源 -->
            <div class="card" onclick="showVideo('demo')">
                <div class="icon">🎬</div>
                <h3>演示片源</h3>
                <p>点击预览精彩片段</p>
                <div class="status-indicator status-ok">资源就绪</div>
            </div>

            <!-- 卡片 3: 云端资料库 -->
            <div class="card" onclick="showVideo('cloud')">
                <div class="icon">☁️</div>
                <h3>云端资料库</h3>
                <p>海量资源随时调取</p>
                <div class="status-indicator status-ok">连接正常</div>
            </div>

            <!-- 卡片 4: 后台管理 -->
            <div class="card" onclick="openAdminLogin()">
                <div class="icon">🔐</div>
                <h3>后台管理</h3>
                <p>系统配置与维护入口</p>
                <div class="status-indicator status-ok">安全入口</div>
            </div>
        </div>

        <!-- 底部工具区 -->
        <div class="tools-section">
            <div class="tools-title">
                <i>🔧</i> 快速修复工具
            </div>
            <button class="btn" onclick="diagnoseSystem()">重新诊断网络</button>
        </div>

        <!-- 视频播放器容器 -->
        <div class="video-container" id="videoContainer">
            <video id="videoPlayer" controls autoplay>
                <!-- 默认视频源，稍后会被JS替换 -->
                <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
                您的浏览器不支持 HTML5 视频。
            </video>
        </div>

        <!-- 音乐播放器 -->
        <div class="music-player" id="musicPlayer" style="display:none;">
            <div class="music-icon">🔊</div>
            <div class="music-title" id="musicTitle">本地音乐测试</div>
            <button class="music-btn" onclick="toggleMusic()">暂停</button>
            <button class="music-btn" onclick="document.getElementById('musicPlayer').style.display='none'">关闭</button>
        </div>

        <!-- 后台管理登录弹窗 -->
        <div class="modal-overlay" id="adminModal">
            <div class="modal">
                <h2>后台管理登录</h2>
                <input type="password" id="adminPassword" placeholder="请输入密码" onkeydown="if(event.keyCode===13)loginAdmin()">
                <div style="margin-top:15px;display:flex;justify-content:space-around;">
                    <button class="modal-btn modal-btn-cancel" onclick="closeAdminModal()">取消</button>
                    <button class="modal-btn" onclick="loginAdmin()">登录</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 配置常量
        const CONFIG = {
            // 视频源（替换成你想要的美女视频链接）
            demoVideoUrl: "https://www.w3schools.com/html/mov_bbb.mp4", 
            cloudVideoUrl: "https://www.w3schools.com/html/movie.mp4",
            // 后台管理密码
            adminPassword: "qingnanliu"
        };

        // 1. 播放音乐 (修复了API问题，改为本地播放)
        function playMusic() {
            const musicPlayer = document.getElementById('musicPlayer');
            musicPlayer.style.display = 'flex';
            // 这里可以添加实际的音频播放逻辑，例如使用 new Audio()
            // 由于是静态页面，这里仅做演示
        }

        function toggleMusic() {
            const btn = document.querySelector('.music-btn');
            if (btn.innerText === '暂停') {
                btn.innerText = '播放';
            } else {
                btn.innerText = '暂停';
            }
        }

        // 2. 显示视频
        function showVideo(type) {
            const videoContainer = document.getElementById('videoContainer');
            const videoPlayer = document.getElementById('videoPlayer');
            
            if (type === 'demo') {
                videoPlayer.src = CONFIG.demoVideoUrl;
            } else if (type === 'cloud') {
                videoPlayer.src = CONFIG.cloudVideoUrl;
            }
            
            videoContainer.classList.add('active');
            videoPlayer.play();
        }

        // 3. 后台管理登录
        function openAdminLogin() {
            document.getElementById('adminModal').classList.add('active');
        }

        function closeAdminModal() {
            document.getElementById('adminModal').classList.remove('active');
            document.getElementById('adminPassword').value = '';
        }

        function loginAdmin() {
            const inputPass = document.getElementById('adminPassword').value;
            if (inputPass === CONFIG.adminPassword) {
                alert('登录成功！即将跳转管理页面。');
                // 这里可以跳转到真正的管理页面
                closeAdminModal();
            } else {
                alert('密码错误，请重试！');
            }
        }

        // 4. 系统诊断 (模拟)
        function diagnoseSystem() {
            alert('网络诊断完成！\n当前连接状态：正常');
        }

        // 关闭视频点击外部关闭
        document.addEventListener('click', function(e) {
            const videoContainer = document.getElementById('videoContainer');
            if (videoContainer.classList.contains('active') && !videoContainer.contains(e.target) && e.target !== document.querySelector('.card')) {
                videoContainer.classList.remove('active');
                document.getElementById('videoPlayer').pause();
            }
        });
    </script>
</body>
</html>
