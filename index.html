<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>清南流·科技影音站</title>
    <style>
        :root {
            --primary: #00f3ff;
            --secondary: #bc13fe;
            --bg: #050510;
            --glass: rgba(255, 255, 255, 0.05);
        }
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: #fff;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1a1a3a 0%, #050510 100%);
        }
        /* 顶部导航 */
        header {
            text-align: center;
            padding: 40px 20px;
            animation: glow 2s infinite alternate;
        }
        h1 {
            font-size: 2.5rem;
            margin: 0;
            text-shadow: 0 0 10px var(--primary), 0 0 20px var(--secondary);
            letter-spacing: 2px;
        }
        .subtitle {
            color: #aaa;
            font-size: 0.9rem;
            margin-top: 10px;
        }
        
        /* 容器布局 */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 卡片风格 */
        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.5);
        }
        .card-title {
            color: var(--primary);
            border-bottom: 1px solid rgba(0, 243, 255, 0.3);
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }
        .card-title::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 10px var(--primary);
        }

        /* 输入框与按钮 */
        input {
            width: 70%;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--primary);
            color: #fff;
            border-radius: 8px;
            outline: none;
        }
        button {
            padding: 12px 20px;
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            border: none;
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px var(--primary);
        }

        /* 列表样式 */
        .file-list, .song-list {
            list-style: none;
            padding: 0;
        }
        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
        }
        .item:hover {
            background: rgba(255,255,255,0.05);
            padding-left: 20px;
        }
        .item-info {
            display: flex;
            flex-direction: column;
        }
        .item-name { font-weight: bold; }
        .item-meta { font-size: 0.8rem; color: #888; }
        .action-btn {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 5px 10px;
            font-size: 0.8rem;
        }

        /* 播放器区域 */
        #player-area {
            width: 100%;
            height: 200px;
            background: #000;
            margin-top: 15px;
            border-radius: 8px;
            display: none;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px var(--primary); }
            to { text-shadow: 0 0 20px var(--secondary), 0 0 30px var(--primary); }
        }

        /* 移动端适配 */
        @media (max-width: 600px) {
            input { width: 60%; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<header>
    <h1>清南流·科技影音站</h1>
    <div class="subtitle">QingNanLiu Tech & Media Station</div>
</header>

<div class="container">

    <!-- 音乐模块 -->
    <div class="card">
        <div class="card-title">🎵 在线音乐搜索</div>
        <div style="display:flex; gap:10px;">
            <input type="text" id="music-input" placeholder="输入歌名或歌手...">
            <button onclick="searchMusic()">搜索</button>
        </div>
        <div id="music-results" class="song-list"></div>
        <audio id="audio-player" controls style="width:100%; margin-top:15px; display:none;"></audio>
    </div>

    <!-- 视频模块 -->
    <div class="card">
        <div class="card-title">🎬 视频播放</div>
        <div style="display:flex; gap:10px;">
            <input type="text" id="video-input" placeholder="输入视频链接 (mp4/m3u8)...">
            <button onclick="playVideo()">播放</button>
        </div>
        <video id="video-player" controls style="width:100%; margin-top:15px; display:none; background:#000;"></video>
    </div>

    <!-- 文件仓库模块 -->
    <div class="card">
        <div class="card-title">📂 个人文件库</div>
        <p style="font-size:0.8rem; color:#888;">提示：文件需手动上传至 GitHub 仓库的 /files 文件夹</p>
        <div id="file-list" class="file-list">
            <!-- 文件列表将通过 JS 加载 -->
            <div class="item">加载中...</div>
        </div>
    </div>

</div>

<script>
    // 模拟音乐搜索 (实际使用需要接入 API，此处为演示逻辑)
    function searchMusic() {
        const query = document.getElementById('music-input').value;
        const resultsDiv = document.getElementById('music-results');
        const player = document.getElementById('audio-player');
        
        if(!query) return alert('请输入歌名');

        resultsDiv.innerHTML = '<div class="item">正在搜索...</div>';

        // ⚠️ 注意：由于没有后端，这里只能模拟或使用公开 API
        // 实际项目中建议接入 NetEase Cloud Music API 等
        setTimeout(() => {
            resultsDiv.innerHTML = `
                <div class="item">
                    <div class="item-info">
                        <span class="item-name">${query} - 示例歌曲</span>
                        <span class="item-meta">歌手：未知 | 时长：03:45</span>
                    </div>
                    <button class="action-btn" onclick="alert('演示模式：请接入真实音乐 API')">播放</button>
                </div>
                <div class="item">
                    <div class="item-info">
                        <span class="item-name">${query} (Remix) - 示例舞曲</span>
                        <span class="item-meta">歌手：DJ Demo | 时长：04:20</span>
                    </div>
                    <button class="action-btn" onclick="alert('演示模式：请接入真实音乐 API')">播放</button>
                </div>
            `;
        }, 1000);
    }

    // 视频播放
    function playVideo() {
        const url = document.getElementById('video-input').value;
        const player = document.getElementById('video-player');
        if(!url) return alert('请输入视频链接');
        
        player.style.display = 'block';
        player.src = url;
        player.play();
    }

    // 文件列表加载 (读取 GitHub 仓库内容)
    async function loadFiles() {
        const fileList = document.getElementById('file-list');
        // 替换为你的 GitHub 用户名和仓库名
        const owner = '995680202'; 
        const repo = '995680202.github.io';
        const path = 'files'; // 假设你把文件放在名为 files 的文件夹里

        try {
            // 调用 GitHub API 获取文件列表
            const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`);
            
            if (!response.ok) {
                throw new Error('未找到 files 文件夹或文件夹为空');
            }

            const data = await response.json();
            fileList.innerHTML = '';

            if(data.length === 0) {
                fileList.innerHTML = '<div class="item">文件夹为空，请先上传文件</div>';
                return;
            }

            data.forEach(file => {
                if(file.type === 'file') {
                    const downloadUrl = `https://raw.githubusercontent.com/${owner}/${repo}/main/${path}/${file.name}`;
                    const isImage = /\.(jpg|jpeg|png|gif)$/i.test(file.name);
                    const isVideo = /\.(mp4|webm)$/i.test(file.name);
                    
                    let actionBtn = `<a href="${downloadUrl}" target="_blank" class="action-btn">下载/预览</a>`;
                    
                    // 简单的类型判断
                    let typeName = '文件';
                    if(isImage) typeName = '图片';
                    if(isVideo) typeName = '视频';

                    fileList.innerHTML += `
                        <div class="item">
                            <div class="item-info">
                                <span class="item-name">${file.name}</span>
                                <span class="item-meta">类型：${typeName} | 大小：${(file.size/1024).toFixed(1)} KB</span>
                            </div>
                            ${actionBtn}
                        </div>
                    `;
                }
            });
        } catch (error) {
            console.error(error);
            fileList.innerHTML = `<div class="item" style="color:red">加载失败：请在仓库中创建名为 "files" 的文件夹并上传内容。<br><small>${error.message}</small></div>`;
        }
    }

    // 初始化加载文件
    loadFiles();
</script>

</body>
</html>
