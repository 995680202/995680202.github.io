<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>清南流·科技影音站</title>
    <style>
        :root {
            --primary: #00f3ff;
            --secondary: #bc13fe;
            --accent: #ffe600;
            --bg: #050510;
            --glass: rgba(16, 20, 40, 0.7);
            --border: rgba(0, 243, 255, 0.3);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        /* 动态背景 */
        .cyber-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                linear-gradient(rgba(5, 5, 16, 0.9), rgba(5, 5, 16, 0.9)),
                repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(0, 243, 255, 0.03) 1px, rgba(0, 243, 255, 0.03) 2px),
                repeating-linear-gradient(90deg, transparent, transparent 1px, rgba(188, 19, 254, 0.03) 1px, rgba(188, 19, 254, 0.03) 2px);
            z-index: -1;
            animation: scanline 10s linear infinite;
        }
        
        @keyframes scanline {
            0% { background-position: 0 0; }
            100% { background-position: 0 100%; }
        }

        /* 头部特效 */
        header {
            text-align: center;
            padding: 30px 20px;
            position: relative;
        }

        h1 {
            font-size: 2rem;
            margin: 0;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 
                0 0 5px var(--primary),
                0 0 10px var(--primary),
                0 0 20px var(--secondary);
            animation: glitch 3s infinite;
            position: relative;
            display: inline-block;
        }

        @keyframes glitch {
            0% { text-shadow: 0 0 5px var(--primary), 0 0 10px var(--primary); }
            95% { text-shadow: 0 0 5px var(--primary), 0 0 10px var(--primary); }
            96% { text-shadow: 2px 0 5px var(--secondary), -2px 0 5px var(--primary); transform: skewX(10deg); }
            97% { text-shadow: -2px 0 5px var(--secondary), 2px 0 5px var(--primary); transform: skewX(-10deg); }
            98% { text-shadow: 0 0 5px var(--primary), 0 0 10px var(--primary); transform: skewX(0); }
            100% { text-shadow: 0 0 5px var(--primary), 0 0 10px var(--primary); }
        }

        .subtitle {
            color: var(--primary);
            font-size: 0.8rem;
            letter-spacing: 2px;
            margin-top: 10px;
            opacity: 0.8;
        }

        /* 容器与卡片 */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 15px 80px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            animation: slide 3s infinite;
        }

        @keyframes slide {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .card-title {
            color: var(--primary);
            font-size: 1.2rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(0, 243, 255, 0.5);
        }

        .card-title i { margin-right: 10px; font-style: normal; }

        /* 输入框与按钮优化 */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input, select {
            flex: 1;
            padding: 14px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            color: #fff;
            border-radius: 8px;
            outline: none;
            font-size: 16px; /* 防止 iOS 缩放 */
            transition: all 0.3s;
        }

        input:focus {
            border-color: var(--secondary);
            box-shadow: 0 0 10px rgba(188, 19, 254, 0.3);
        }

        button {
            padding: 14px 24px;
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            border: none;
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            white-space: nowrap;
        }

        button:active {
            transform: scale(0.95);
        }

        button::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button:active::after {
            width: 300px; height: 300px;
        }

        /* 列表样式 */
        .list-container {
            max-height: 400px;
            overflow-y: auto;
            padding-right: 5px;
        }

        /* 自定义滚动条 */
        .list-container::-webkit-scrollbar { width: 6px; }
        .list-container::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); border-radius: 3px; }
        .list-container::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }

        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: all 0.2s;
            border-radius: 8px;
            margin-bottom: 5px;
        }

        .item:hover {
            background: rgba(0, 243, 255, 0.1);
            transform: translateX(5px);
        }

        .item-info {
            flex: 1;
            overflow: hidden;
        }

        .item-name { 
            font-weight: bold; 
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 1rem;
        }

        .item-meta { 
            font-size: 0.75rem; 
            color: #aaa; 
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .action-btn {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 8px 16px;
            font-size: 0.85rem;
            min-width: 80px;
            text-align: center;
        }
        
        .action-btn.danger {
            border-color: #ff4444;
            color: #ff4444;
        }

        /* 播放器样式 */
        .player-wrapper {
            margin-top: 20px;
            background: rgba(0,0,0,0.5);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        audio, video {
            width: 100%;
            border-radius: 8px;
            outline: none;
        }
        
        /* 强化音频控件在手机上的表现 */
        audio::-webkit-media-controls-panel {
            background-color: rgba(30, 30, 50, 0.9);
        }

        .now-playing {
            text-align: center;
            margin-bottom: 10px;
            color: var(--accent);
            font-size: 0.9rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        /* 模态框 (密码/后台) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: #1a1a2e;
            border: 1px solid var(--primary);
            padding: 30px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.2);
            text-align: center;
        }

        .modal h2 { margin-top: 0; color: var(--primary); }

        .admin-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            border: 1px solid var(--primary);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            z-index: 900;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
        }

        /* 标签页切换 */
        .tabs {
            display: flex;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            color: #888;
            transition: 0.3s;
            border-bottom: 2px solid transparent;
        }
        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
            font-weight: bold;
        }

        /* 响应式调整 */
        @media (max-width: 600px) {
            h1 { font-size: 1.6rem; }
            .input-group { flex-direction: column; }
            button { width: 100%; }
            .item { flex-direction: column; align-items: flex-start; gap: 10px; }
            .action-btn { width: 100%; }
        }
    </style>
</head>
<body>

<div class="cyber-bg"></div>

<header>
    <h1>清南流·科技影音站</h1>
    <div class="subtitle">QING NAN LIU // TECH & MEDIA STATION</div>
</header>

<div class="container">

    <!-- 音乐模块 -->
    <div class="card">
        <div class="card-title">🎵 全球音乐搜索</div>
        <div class="input-group">
            <input type="text" id="music-input" placeholder="输入歌名、歌手 (如：周杰伦 七里香)...">
            <button onclick="searchMusic()">搜索</button>
        </div>
        
        <div class="player-wrapper" id="music-player-box" style="display:none;">
            <div class="now-playing" id="now-playing-text">准备播放...</div>
            <audio id="audio-player" controls></audio>
        </div>

        <div class="list-container" id="music-results" style="margin-top: 20px;">
            <div style="text-align:center; color:#666; padding:20px;">点击上方搜索按钮查找音乐</div>
        </div>
    </div>

    <!-- 视频模块 -->
    <div class="card">
        <div class="card-title">🎬 沉浸式影院</div>
        <div class="tabs">
            <div class="tab active" onclick="switchVideoTab('link')">链接播放</div>
            <div class="tab" onclick="switchVideoTab('demo')">演示片源</div>
        </div>

        <div id="video-link-panel">
            <div class="input-group">
                <input type="text" id="video-input" placeholder="粘贴 .mp4 或 .m3u8 链接...">
                <button onclick="playVideo()">播放</button>
            </div>
        </div>

        <div id="video-demo-panel" style="display:none;">
            <div class="list-container">
                <div class="item" onclick="loadDemoVideo('https://www.w3schools.com/html/mov_bbb.mp4', '大雄兔 (Big Buck Bunny)')">
                    <div class="item-info">
                        <div class="item-name">大雄兔 (Big Buck Bunny)</div>
                        <div class="item-meta">开源动画短片 | 1080P</div>
                    </div>
                    <button class="action-btn">播放</button>
                </div>
                <div class="item" onclick="loadDemoVideo('https://www.w3schools.com/html/movie.mp4', '熊的故事')">
                    <div class="item-info">
                        <div class="item-name">熊的故事 (Bear Story)</div>
                        <div class="item-meta">奥斯卡提名短片</div>
                    </div>
                    <button class="action-btn">播放</button>
                </div>
            </div>
        </div>

        <div class="player-wrapper">
            <video id="video-player" controls poster="https://via.placeholder.com/800x450/000000/00f3ff?text=READY+TO+PLAY"></video>
        </div>
    </div>

    <!-- 网盘资源模块 -->
    <div class="card">
        <div class="card-title">☁️ 云端资源库</div>
        <div class="list-container" id="cloud-list">
            <!-- 动态加载 -->
        </div>
    </div>

</div>

<!-- 后台管理按钮 -->
<div class="admin-toggle" onclick="openAdminLogin()">⚙️</div>

<!-- 密码验证模态框 -->
<div id="login-modal" class="modal">
    <div class="modal-content">
        <h2>系统安全验证</h2>
        <p style="color:#aaa; font-size:0.9rem;">请输入管理员密码</p>
        <input type="password" id="admin-pwd" placeholder="Password" style="width:100%; margin: 15px 0;">
        <button onclick="checkPassword()" style="width:100%;">进入系统</button>
        <button onclick="closeModal('login-modal')" style="background:transparent; border:1px solid #666; margin-top:10px; width:100%;">取消</button>
    </div>
</div>

<!-- 后台管理面板模态框 -->
<div id="admin-modal" class="modal">
    <div class="modal-content" style="max-width: 500px; text-align: left;">
        <h2 style="text-align: center;">🛠️ 资源管理后台</h2>
        
        <div style="margin-bottom: 20px;">
            <label style="color:var(--primary); display:block; margin-bottom:5px;">添加网盘资源</label>
            <input type="text" id="res-name" placeholder="资源名称 (例：精选合集)" style="margin-bottom:10px;">
            <input type="text" id="res-url" placeholder="分享链接 (例：pan.baidu.com...)" style="margin-bottom:10px;">
            <select id="res-type" style="margin-bottom:10px; width:100%; padding:12px; background:rgba(0,0,0,0.4); color:#fff; border:1px solid var(--border); border-radius:8px;">
                <option value="baidu">百度网盘</option>
                <option value="ali">阿里云盘</option>
                <option value="quark">夸克网盘</option>
                <option value="other">其他链接</option>
            </select>
            <button onclick="addResource()" style="width:100%;">添加资源</button>
        </div>

        <div style="border-top:1px solid #333; padding-top:15px;">
            <label style="color:#aaa; font-size:0.9rem;">当前资源列表 (点击删除)</label>
            <div class="list-container" id="admin-res-list" style="max-height: 200px; margin-top:10px;"></div>
        </div>

        <button onclick="closeModal('admin-modal')" style="background:#333; width:100%; margin-top:20px;">关闭后台</button>
    </div>
</div>

<script>
    // --- 配置区域 ---
    const ADMIN_PASSWORD = "123456"; // 修改这里的密码
    const STORAGE_KEY = "qnl_resources_v1";

    // --- 初始化 ---
    document.addEventListener('DOMContentLoaded', () => {
        renderCloudList();
        renderAdminList();
    });

    // --- 音乐搜索功能 (调用公开 API) ---
    async function searchMusic() {
        const keyword = document.getElementById('music-input').value.trim();
        const resultsDiv = document.getElementById('music-results');
        const playerBox = document.getElementById('music-player-box');
        const audioPlayer = document.getElementById('audio-player');
        const nowText = document.getElementById('now-playing-text');

        if (!keyword) return alert('请输入搜索内容');

        resultsDiv.innerHTML = '<div style="text-align:center; padding:20px; color:var(--primary)">正在连接星云数据库...</div>';
        
        try {
            // 使用 NetEase Cloud Music 的公开 API 代理
            const response = await fetch(`https://music.163.com/api/search/get/web?csrf_token=&type=1&s=${encodeURIComponent(keyword)}&offset=0&limit=20`);
            const data = await response.json();

            if (data.result && data.result.songs.length > 0) {
                resultsDiv.innerHTML = '';
                data.result.songs.forEach(song => {
                    const artists = song.artists.map(a => a.name).join('/');
                    // 构造播放链接 (注意：由于版权限制，部分歌曲可能无法直接播放，这里使用网易云临时链接)
                    // 实际生产中建议使用后端代理获取真实 MP3 地址，此处为前端演示
                    const playUrl = `https://music.163.com/song/media/outer/url?id=${song.id}.mp3`;
                    
                    const item = document.createElement('div');
                    item.className = 'item';
                    item.innerHTML = `
                        <div class="item-info">
                            <div class="item-name">${song.name}</div>
                            <div class="item-meta">${artists} - ${song.album.name}</div>
                        </div>
                        <button class="action-btn" onclick="playMusic('${playUrl}', '${song.name} - ${artists}')">播放</button>
                    `;
                    resultsDiv.appendChild(item);
                });
            } else {
                resultsDiv.innerHTML = '<div style="text-align:center; padding:20px; color:#666">未找到相关音源</div>';
            }
        } catch (error) {
            console.error(error);
            resultsDiv.innerHTML = '<div style="text-align:center; padding:20px; color:#ff4444">搜索服务暂时不可用<br><small>可能是网络波动或 API 限制</small></div>';
        }
    }

    function playMusic(url, title) {
        const playerBox = document.getElementById('music-player-box');
        const audioPlayer = document.getElementById('audio-player');
        const nowText = document.getElementById('now-playing-text');

        playerBox.style.display = 'block';
        nowText.innerText = "正在缓冲：" + title;
        audioPlayer.src = url;
        
        // 自动播放处理
        audioPlayer.play().catch(e => {
            nowText.innerText = "点击播放按钮开始： " + title;
        });

        // 滚动到播放器
        playerBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    // --- 视频功能 ---
    function switchVideoTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        
        if(tab === 'link') {
            document.getElementById('video-link-panel').style.display = 'block';
            document.getElementById('video-demo-panel').style.display = 'none';
        } else {
            document.getElementById('video-link-panel').style.display = 'none';
            document.getElementById('video-demo-panel').style.display = 'block';
        }
    }

    function playVideo() {
        const url = document.getElementById('video-input').value.trim();
        const player = document.getElementById('video-player');
        if (!url) return alert('请输入有效的视频链接');
        
        player.src = url;
        player.play();
        player.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function loadDemoVideo(url, title) {
        const player = document.getElementById('video-player');
        player.src = url;
        player.play();
        player.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    // --- 网盘资源管理 (LocalStorage) ---
    function getResources() {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    }

    function saveResources(list) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
        renderCloudList();
        renderAdminList();
    }

    function renderCloudList() {
        const list = getResources();
        const container = document.getElementById('cloud-list');
        container.innerHTML = '';

        if (list.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:#666; padding:20px;">暂无资源，请联系管理员添加</div>';
            return;
        }

        const icons = {
            'baidu': '☁️ 百度',
            'ali': '🟦 阿里',
            'quark': '🌀 夸克',
            'other': '🔗 链接'
        };

        list.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `
                <div class="item-info">
                    <div class="item-name">${icons[item.type] || '🔗'} ${item.name}</div>
                    <div class="item-meta" style="color:var(--primary); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${item.url}</div>
                </div>
                <a href="${item.url}" target="_blank" class="action-btn">访问</a>
            `;
            container.appendChild(div);
        });
    }

    // --- 后台管理逻辑 ---
    function openAdminLogin() {
        document.getElementById('login-modal').style.display = 'flex';
        document.getElementById('admin-pwd').value = '';
        document.getElementById('admin-pwd').focus();
    }

    function checkPassword() {
        const pwd = document.getElementById('admin-pwd').value;
        if (pwd === ADMIN_PASSWORD) {
            closeModal('login-modal');
            document.getElementById('admin-modal').style.display = 'flex';
            renderAdminList();
        } else {
            alert('密码错误！访问已被记录');
            document.getElementById('admin-pwd').value = '';
        }
    }

    function closeModal(id) {
        document.getElementById(id).style.display = 'none';
    }

    function addResource() {
        const name = document.getElementById('res-name').value.trim();
        const url = document.getElementById('res-url').value.trim();
        const type = document.getElementById('res-type').value;

        if (!name || !url) return alert('请填写完整信息');

        const list = getResources();
        list.unshift({ name, url, type, time: new Date().getTime() });
        saveResources(list);

        // 清空输入
        document.getElementById('res-name').value = '';
        document.getElementById('res-url').value = '';
        alert('资源添加成功！');
        renderAdminList();
    }

    function renderAdminList() {
        const list = getResources();
        const container = document.getElementById('admin-res-list');
        container.innerHTML = '';

        if (list.length === 0) {
            container.innerHTML = '<div style="color:#666; font-size:0.8rem;">暂无数据</div>';
            return;
        }

        list.forEach((item, index) => {
            const div = document.createElement('div');
            div.style.cssText = "display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid #333; font-size:0.9rem;";
            div.innerHTML = `
                <span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:70%;">${item.name}</span>
                <button class="action-btn danger" style="padding:4px 8px; font-size:0.7rem; min-width:auto;" onclick="deleteResource(${index})">删除</button>
            `;
            container.appendChild(div);
        });
    }

    function deleteResource(index) {
        if(!confirm('确定删除此资源吗？')) return;
        const list = getResources();
        list.splice(index, 1);
        saveResources(list);
    }

    // 点击模态框外部关闭
    window.onclick = function(event) {
        if (event.target.classList.contains('modal')) {
            event.target.style.display = "none";
        }
    }
</script>

</body>
</html>
