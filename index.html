<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>尐念 · 科技影音站</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/gh/hustcc/canvas-nest.js@1.0.1/canvas-nest.min.js" defer></script>
</head>
<body>

<canvas id="canvas-nest" style="position:fixed;top:0;left:0;z-index:-1;"></canvas>

<header class="header">
  <div class="header-glow"></div>
  <div class="header-light"></div>
  <div class="header-content">
    <h1 class="header-title">尐念 · 科技影音站</h1>
    <p class="header-subtitle">995680202.xyz</p>
    <div class="header-divider"></div>
  </div>
</header>

<div class="container">

  <!-- 网易云风格播放器 -->
  <div class="card player-card">
    <h3>🎵 音乐播放器</h3>
    <div class="player-info" id="now-playing">未播放音乐</div>
    <input type="range" id="progress" class="progress-bar" value="0" min="0" max="100">
    <div class="player-controls">
      <button id="prevBtn">⏮ 上一首</button>
      <button id="playBtn">▶ 播放</button>
      <button id="nextBtn">⏭ 下一首</button>
    </div>
    <audio id="main-player">
  </div>

  <!-- 音乐分类下拉 -->
  <div class="card">
    <h2>🎶 音乐库</h2>
    <select id="music-category" class="select-box">
      <option value="all">全部</option>
      <option value="chinese">华语</option>
      <option value="classic">古典</option>
      <option value="pop">流行</option>
      <option value="folk">民谣</option>
    </select>
    <div class="list" id="music-list" style="margin-top:12px;"></div>
  </div>

  <!-- 直播/流媒体 -->
  <div class="card">
    <h2>📺 直播/流媒体</h2>
    <div class="list" id="live-list"></div>
  </div>

  <!-- 文件夹（下拉） -->
  <div class="card">
    <h2>📁 文件夹</h2>
    <select id="folder-select" class="select-box">
      <option value="">请选择文件夹</option>
      <option value="work">工作</option>
      <option value="private">私人（需密码）</option>
    </select>
    <div class="list" id="file-list" style="margin-top:12px;"></div>
  </div>

</div>

<!-- 视频弹窗已删除 -->

<!-- 后台 -->
<div class="admin-btn" onclick="toggleAdmin()">⚙️ 后台</div>
<div class="admin-panel" id="adminPanel">
  <h3>后台管理</h3>
  <input type="password" id="adminPwd" placeholder="密码">
  <button onclick="checkAdmin()">解锁</button>
  <div id="adminContent" style="display:none;margin-top:15px;">
    <h4>🎶 音乐（歌名|链接）</h4>
    <textarea id="musicData" rows="3"></textarea>
    <h4>📺 直播（名称|链接）</h4>
    <textarea id="liveData" rows="3"></textarea>
    <h4>📁 工作文件夹</h4>
    <textarea id="workData" rows="3"></textarea>
    <h4>📁 私人文件夹</h4>
    <textarea id="privateData" rows="3"></textarea>
    <button onclick="saveAllData()">保存并刷新</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
