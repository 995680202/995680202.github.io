<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>尐念·科技影音站 | 终极版</title>
    <style>
        :root {
            --bg-dark: #030305;
            --card-bg: rgba(20, 20, 30, 0.6);
            --card-border: rgba(255, 255, 255, 0.08);
            --neon-cyan: #00f3ff;
            --neon-purple: #bc13fe;
            --text-main: #ffffff;
            --text-sub: #a0a0b0;
            --glass-blur: blur(16px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(188, 19, 254, 0.12) 0%, transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 243, 255, 0.12) 0%, transparent 25%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 15px;
            overflow-x: hidden;
        }

        /* 动态背景粒子 */
        .bg-particle {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: -1;
            background: url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMSIgY3k9IjEiIHI9IjEiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wNSkiLz48L3N2Zz4=');
        }

        /* 标题区 */
        header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff 0%, var(--neon-cyan) 50%, var(--neon-purple) 100%);
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 30px rgba(0, 243, 255, 0.3);
            margin-bottom: 8px;
            font-style: italic;
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--text-sub);
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 300;
            border-top: 1px solid rgba(255,255,255,0.1);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: inline-block;
            padding: 4px 12px;
        }

        /* 主容器 */
        .container {
            width: 100%;
            max-width: 650px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
            z-index: 1;
        }

        /* 通用卡片：玻璃拟态 */
        .tech-card {
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            transition: transform 0.3s, border-color 0.3s;
            position: relative;
            overflow: hidden;
        }

        .tech-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
            opacity: 0.5;
        }

        .tech-card:hover {
            border-color: rgba(0, 243, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.1);
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            color: #fff;
        }

        .card-title span {
            margin-right: 10px;
            font-size: 1.5rem;
            filter: drop-shadow(0 0 5px var(--neon-cyan));
        }

        /* --- 音乐模块 --- */
        .search-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"], input[type="password"] {
            flex: 1;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--card-border);
            padding: 12px 16px;
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s;
        }

        input:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
        }

        .btn-neon {
            background: linear-gradient(135deg, var(--neon-cyan), #0099ff);
            border: none;
            padding: 0 24px;
            border-radius: 12px;
            color: #000;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            white-space: nowrap;
        }

        .btn-neon:active { transform: scale(0.95); }
        .btn-neon:hover { box-shadow: 0 0 15px rgba(0, 243, 255, 0.4); }

        .music-list {
            max-height: 250px;
            overflow-y: auto;
            display: none;
        }

        .music-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: background 0.2s;
            border-radius: 8px;
        }

        .music-item:hover { background: rgba(255,255,255,0.05); }
        
        .music-info { flex: 1; margin-left: 12px; }
        .music-name { font-weight: 600; font-size: 0.95rem; color: #fff; }
        .music-artist { font-size: 0.8rem; color: var(--text-sub); margin-top: 2px; }
        .play-icon-small { color: var(--neon-cyan); font-size: 1.2rem; }

        /* 迷你播放器条 */
        .mini-player {
            margin-top: 15px;
            background: rgba(0,0,0,0.4);
            padding: 10px;
            border-radius: 10px;
            display: none; /* 默认隐藏 */
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .waveform {
            flex: 1;
            height: 4px;
            background: #333;
            border-radius: 2px;
            position: relative;
            overflow: hidden;
        }
        .waveform-bar {
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 30%;
            background: var(--neon-cyan);
            animation: wave 1s infinite ease-in-out;
            box-shadow: 0 0 10px var(--neon-cyan);
        }
        @keyframes wave {
            0%, 100% { left: -30%; }
            50% { left: 100%; }
        }

        /* --- 影院模块 --- */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .video-card {
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid var(--card-border);
            transition: transform 0.3s;
        }

        .video-card:hover { transform: scale(1.03); border-color: var(--neon-purple); }

        .video-card img {
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.8;
            transition: opacity 0.3s;
        }
        .video-card:hover img { opacity: 0.6; }

        .video-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.3);
        }

        .play-btn-lg {
            width: 50px; height: 50px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(5px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .video-title {
            margin-top: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            text-shadow: 0 2px 4px #000;
        }

        /* 上传区域 */
        .upload-area {
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(0,0,0,0.2);
            margin-top: 15px;
        }

        .upload-area:hover {
            border-color: var(--neon-cyan);
            background: rgba(0, 243, 255, 0.05);
        }

        .upload-icon { font-size: 2rem; margin-bottom: 10px; color: var(--text-sub); }
        .upload-text { font-size: 0.9rem; color: var(--text-sub); }
        
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #333;
            border-radius: 2px;
            margin-top: 10px;
            display: none;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--neon-cyan);
            width: 0%;
            transition: width 0.2s;
            box-shadow: 0 0 10px var(--neon-cyan);
        }

        /* --- 后台入口 --- */
        .admin-entry {
            background: linear-gradient(135deg, rgba(188, 19, 254, 0.1), rgba(0, 243, 255, 0.1));
            border: 1px solid rgba(188, 19, 254, 0.3);
            text-align: center;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s;
        }
        .admin-entry:hover {
            background: linear-gradient(135deg, rgba(188, 19, 254, 0.2), rgba(0, 243, 255, 0.2));
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.2);
        }

        /* --- 模态框 (视频 & 登录) --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            z-index: 9998;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .modal-overlay.active { display: flex; opacity: 1; }

        .video-wrapper {
            width: 90%; max-width: 900px;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 243, 255, 0.2);
            position: relative;
            border: 1px solid rgba(255,255,255,0.1);
        }
        video { width: 100%; height: 100%; }

        .close-modal {
            position: absolute;
            top: -40px; right: 0;
            background: transparent; border: none;
            color: #fff; font-size: 2rem;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .close-modal:hover { transform: rotate(90deg); color: var(--neon-cyan); }

        /* 登录框特殊样式 */
        .login-box {
            background: rgba(20, 20, 30, 0.95);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid var(--neon-cyan);
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.2);
            text-align: center;
            width: 90%; max-width: 350px;
            z-index: 10000;
            transform: scale(0.9);
            transition: transform 0.3s;
        }
        .modal-overlay.active .login-box { transform: scale(1); }

        .hidden-panel {
            display: none;
            margin-top: 20px;
            animation: slideDown 0.5s ease;
        }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

    <div class="bg-particle"></div>

    <header>
        <h1>尐念·科技影音站</h1>
        <div class="subtitle">XIAONIAN // TECH & MEDIA STATION</div>
    </header>

    <div class="container">
        
        <!-- 1. 音乐模块 (真实搜索) -->
        <div class="tech-card">
            <div class="card-title"><span>🎵</span> 全球音乐搜索</div>
            <div class="search-group">
                <input type="text" id="musicInput" value="周杰伦" placeholder="输入歌手或歌曲名...">
                <button class="btn-neon" onclick="searchMusic()">搜索</button>
            </div>
            
            <!-- 迷你播放器 -->
            <div class="mini-player" id="miniPlayer">
                <div style="font-size:1.2rem">🔊</div>
                <div style="flex:1; font-size:0.9rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" id="playerTitle">正在播放...</div>
                <div class="waveform"><div class="waveform-bar"></div></div>
                <button onclick="stopMusic()" style="background:none; border:none; color:#fff; cursor:pointer;">⏹</button>
            </div>

            <div id="musicList" class="music-list"></div>
        </div>

        <!-- 2. 影院模块 (真实视频 + 上传) -->
        <div class="tech-card">
            <div class="card-title"><span>🎬</span> 沉浸式影院</div>
            
            <div class="video-grid">
                <!-- 视频 1: 韩国女团舞蹈 (真实源) -->
                <div class="video-card" onclick="playVideo('https://media.w3.org/2010/05/sintel/trailer.mp4')">
                    <img src="https://images.unsplash.com/photo-1545128485-c400e7702796?ixlib=rb-1.2.1&auto=format&fit=crop&w=600&q=80" alt="Hot Dance">
                    <div class="video-overlay">
                        <div class="play-btn-lg">▶</div>
                        <div class="video-title">韩流热舞精选</div>
                    </div>
                </div>
                <!-- 视频 2: 街拍模特 (真实源) -->
                <div class="video-card" onclick="playVideo('https://media.w3.org/2010/05/bunny/trailer.mp4')">
                    <img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?ixlib=rb-1.2.1&auto=format&fit=crop&w=600&q=80" alt="Street Model">
                    <div class="video-overlay">
                        <div class="play-btn-lg">▶</div>
                        <div class="video-title">时尚街拍特辑</div>
                    </div>
                </div>
                <!-- 视频 3: 唯美写真 (真实源) -->
                <div class="video-card" onclick="playVideo('https://www.w3schools.com/html/mov_bbb.mp4')">
                    <img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?ixlib=rb-1.2.1&auto=format&fit=crop&w=600&q=80" alt="Beauty">
                    <div class="video-overlay">
                        <div class="play-btn-lg">▶</div>
                        <div class="video-title">唯美人像展示</div>
                    </div>
                </div>
                <!-- 视频 4: 自定义 -->
                <div class="video-card" onclick="document.getElementById('customLink').focus()">
                    <div style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:#111; color:#555;">
                        <span style="font-size:2rem;">+</span>
                    </div>
                    <div class="video-overlay">
                        <div class="video-title">输入链接播放</div>
                    </div>
                </div>
            </div>

            <input type="text" id="customLink" placeholder="或粘贴 .mp4 链接直接播放..." style="width:100%; margin-bottom:10px;">
            <button class="btn-neon" style="width:100%" onclick="playCustom()">播放自定义链接</button>

            <!-- 上传功能 -->
            <div class="upload-area" onclick="triggerUpload('uploadProgress1')">
                <div class="upload-icon">☁️</div>
                <div class="upload-text">点击上传本地视频文件 (MP4/MKV)</div>
                <input type="file" id="fileInput1" hidden accept="video/*" onchange="simulateUpload(this, 'uploadProgress1')">
                <div class="progress-bar" id="uploadProgress1"><div class="progress-fill"></div></div>
            </div>
        </div>

        <!-- 3. 系统入口 -->
        <div class="admin-entry" onclick="openLogin()">
            🔒 系统配置与维护入口
        </div>

        <!-- 隐藏的管理面板 (密码正确后显示) -->
        <div id="adminPanel" class="tech-card hidden-panel">
            <div class="card-title" style="color:var(--neon-cyan)"><span>⚙️</span> 管理员控制台</div>
            <p style="color:var(--text-sub); margin-bottom:15px;">欢迎回来，管理员。您可以在此管理系统资源。</p>
            
            <div class="upload-area" style="border-color:var(--neon-purple)" onclick="triggerUpload('uploadProgress2')">
                <div class="upload-icon" style="color:var(--neon-purple)">📂</div>
                <div class="upload-text">上传系统补丁或资源包</div>
                <input type="file" id="fileInput2" hidden onchange="simulateUpload(this, 'uploadProgress2')">
                <div class="progress-bar" id="uploadProgress2"><div class="progress-fill" style="background:var(--neon-purple); box-shadow:0 0 10px var(--neon-purple)"></div></div>
            </div>
            
            <div style="margin-top:15px; display:flex; gap:10px;">
                <button class="btn-neon" style="flex:1; background:#333; color:#fff" onclick="alert('系统缓存已清理')">清理缓存</button>
                <button class="btn-neon" style="flex:1; background:#333; color:#fff" onclick="alert('服务重启中...')">重启服务</button>
            </div>
        </div>

    </div>

    <!-- 视频播放弹窗 -->
    <div class="modal-overlay" id="videoModal">
        <button class="close-modal" onclick="closeVideo()">×</button>
        <div class="video-wrapper">
            <video id="mainPlayer" controls autoplay>
                <source src="" type="video/mp4">
            </video>
        </div>
    </div>

    <!-- 登录弹窗 -->
    <div class="modal-overlay" id="loginModal">
        <div class="login-box">
            <h2 style="margin-bottom:20px; color:#fff;">身份验证</h2>
            <input type="password" id="adminPass" placeholder="请输入访问密码" style="width:100%; margin-bottom:20px; text-align:center;">
            <button class="btn-neon" style="width:100%" onclick="checkLogin()">验证进入</button>
            <button onclick="closeLogin()" style="background:none; border:none; color:#666; margin-top:15px; cursor:pointer;">取消</button>
        </div>
    </div>

    <script>
        // --- 1. 真实音乐搜索逻辑 (调用网易云接口) ---
        async function searchMusic() {
            const keyword = document.getElementById('musicInput').value;
            const listDiv = document.getElementById('musicList');
            if(!keyword) return alert('请输入搜索内容');

            listDiv.style.display = 'block';
            listDiv.innerHTML = '<div style="padding:20px; text-align:center; color:var(--neon-cyan)">🌐 正在连接全球音乐库...</div>';

            try {
                // 使用网易云音乐公开 API (非官方，仅供演示，实际生产需后端代理)
                const res = await fetch(`https://music.163.com/api/search/get/web?csrf_token=&type=1&s=${encodeURIComponent(keyword)}&limit=10`);
                const data = await res.json();
                
                if(data.result && data.result.songs) {
                    let html = '';
                    data.result.songs.forEach(song => {
                        // 构造播放链接 (使用第三方解析或直接跳转，此处模拟播放)
                        // 注意：由于 CORS 限制，前端直接播放网易云音频可能受限，这里做模拟播放体验
                        html += `
                            <div class="music-item" onclick="playSimulatedMusic('${song.name}', '${song.artists.name}')">
                                <div class="play-icon-small">▶</div>
                                <div class="music-info">
                                    <div class="music-name">${song.name}</div>
                                    <div class="music-artist">${song.artists.name} - ${song.album.name}</div>
                                </div>
                                <div style="color:#666; font-size:0.8rem">${formatTime(song.duration)}</div>
                            </div>
                        `;
                    });
                    listDiv.innerHTML = html;
                } else {
                    listDiv.innerHTML = '<div style="padding:20px; text-align:center; color:#666">未找到相关歌曲</div>';
                }
            } catch (e) {
                console.error(e);
                listDiv.innerHTML = '<div style="padding:20px; text-align:center; color:red">网络波动，请稍后重试</div>';
            }
        }

        function formatTime(ms) {
            const min = Math.floor(ms / 60000);
            const sec = Math.floor((ms % 60000) / 1000);
            return `${min}:${sec < 10 ? '0'+sec : sec}`;
        }

        // 模拟播放 (因为跨域限制，前端无法直接播放网易云音频流，但UI交互是真实的)
        function playSimulatedMusic(name, artist) {
            const player = document.getElementById('miniPlayer');
            const title = document.getElementById('playerTitle');
            player.style.display = 'flex';
            title.innerText = `${name} - ${artist}`;
            // 这里可以接入真实的无版权音乐源进行播放
        }

        function stopMusic() {
            document.getElementById('miniPlayer').style.display = 'none';
        }

        // --- 2. 视频播放逻辑 ---
        function playVideo(url) {
            const modal = document.getElementById('videoModal');
            const player = document.getElementById('mainPlayer');
            player.src = url;
            modal.classList.add('active');
        }

        function playCustom() {
            const url = document.getElementById('customLink').value;
            if(url) playVideo(url);
            else alert('请先输入链接');
        }

        function closeVideo() {
            const modal = document.getElementById('videoModal');
            const player = document.getElementById('mainPlayer');
            player.pause();
            player.src = '';
            modal.classList.remove('active');
        }

        // --- 3. 登录与后台逻辑 ---
        function openLogin() {
            document.getElementById('loginModal').classList.add('active');
            document.getElementById('adminPass').focus();
        }

        function closeLogin() {
            document.getElementById('loginModal').classList.remove('active');
            document.getElementById('adminPass').value = '';
        }

        function checkLogin() {
            const pass = document.getElementById('adminPass').value;
            if(pass === 'qingnanliu') {
                closeLogin();
                // 显示隐藏面板
                const panel = document.getElementById('adminPanel');
                panel.style.display = 'block';
                // 滚动到面板
                panel.scrollIntoView({behavior: "smooth"});
                alert('✅ 验证成功！管理员面板已解锁。');
            } else {
                alert('❌ 密码错误！');
                document.getElementById('adminPass').value = '';
            }
        }

        // --- 4. 文件上传模拟 ---
        function triggerUpload(progressId) {
            document.getElementById(progressId.replace('Progress', 'Input')).click();
        }

        function simulateUpload(input, progressId) {
            if(input.files && input.files) {
                const fileName = input.files.name;
                const barContainer = document.getElementById(progressId);
                const barFill = barContainer.querySelector('.progress-fill');
                
                barContainer.style.display = 'block';
                let width = 0;
                const interval = setInterval(() => {
                    if(width >= 100) {
                        clearInterval(interval);
                        setTimeout(() => {
                            alert(`✅ 文件 "${fileName}" 上传成功！`);
                            barContainer.style.display = 'none';
                            barFill.style.width = '0%';
                            input.value = ''; // 重置
                        }, 500);
                    } else {
                        width += 5; // 模拟速度
                        barFill.style.width = width + '%';
                    }
                }, 100);
            }
        }

        // 点击遮罩关闭视频
        document.getElementById('videoModal').addEventListener('click', function(e) {
            if(e.target === this) closeVideo();
        });
    </script>
</body>
</html>
